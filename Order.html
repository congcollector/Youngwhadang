<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root {
  --bg: #f7f3f0; --card: #ffffff; --accent: #8b4a4a;
  --text: #1c1c1e; --text2: #6b6b70; --text3: #aeaeb2;
  --sep: rgba(60,60,67,0.12); --green: #34c759; --red: #ff3b30; --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
.hdr { background: rgba(247,243,240,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--sep); padding: 52px 20px 14px; position: sticky; top: 0; z-index: 50; }
.hdr-inner { display: flex; align-items: flex-end; justify-content: space-between; }
.hdr-eye { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 2px; }
.hdr-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.pill { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
.pill-g { background: rgba(139,74,74,0.1); color: var(--accent); }
.pill-a { background: var(--accent); color: white; }
.wrap { max-width: 480px; margin: 0 auto; padding: 20px 0 100px; }
.loading { text-align: center; padding: 80px 20px; color: var(--text2); font-size: 15px; }
.sec { margin-bottom: 28px; }
.sec-hdr { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 20px; margin-bottom: 8px; }
.sec-foot { font-size: 12px; color: var(--text2); padding: 7px 20px 0; line-height: 1.6; }
.card { background: var(--card); border-radius: var(--r); margin: 0 16px; overflow: hidden; }
.row { display: flex; align-items: center; padding: 0 16px; min-height: 46px; border-bottom: 0.5px solid var(--sep); }
.row:last-child { border-bottom: none; }
.row-lbl { font-size: 15px; min-width: 72px; }
.row-req { color: var(--red); font-size: 12px; }
.row-inp { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; font-family: inherit; color: var(--text); text-align: right; padding: 12px 0; }
.row-inp::placeholder { color: var(--text3); }
.notice { background: var(--card); border-radius: var(--r); padding: 14px 16px; margin: 0 16px; font-size: 13px; color: var(--text2); line-height: 1.8; }
.notice strong { color: var(--accent); font-weight: 600; }
.size-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.size-scroll::-webkit-scrollbar { display: none; }
.sz { flex-shrink: 0; width: 128px; background: var(--card); border-radius: var(--r); padding: 14px 10px; text-align: center; border: 2px solid transparent; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.15s; }
.sz.on { border-color: var(--accent); background: rgba(139,74,74,0.05); }
.sz-emoji { font-size: 28px; margin-bottom: 6px; }
.sz-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.sz-cm { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.sz-price { font-size: 14px; font-weight: 700; color: var(--accent); }
.tog-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--sep); min-height: 48px; }
.tog-row:last-child { border-bottom: none; }
.tog-body { flex: 1; }
.tog-lbl { font-size: 15px; }
.tog-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.sw { width: 51px; height: 31px; border-radius: 16px; background: rgba(120,120,128,0.2); position: relative; flex-shrink: 0; transition: background 0.2s; cursor: pointer; }
.sw.on { background: var(--green); }
.sw-k { position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; border-radius: 50%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
.sw.on .sw-k { transform: translateX(20px); }
.pay-wrap { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; }
.pay-chip { padding: 7px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; font-family: inherit; border: none; cursor: pointer; background: rgba(120,120,128,0.1); color: var(--text); transition: all 0.15s; }
.pay-chip.on { background: var(--accent); color: white; }
.price-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 0.5px solid var(--sep); }
.price-row:last-child { border-bottom: none; }
.p-key { font-size: 15px; } .p-val { font-size: 15px; color: var(--text2); }
.p-key-b { font-size: 15px; font-weight: 600; } .p-val-b { font-size: 17px; font-weight: 700; color: var(--accent); }
.btn-main { display: block; width: calc(100% - 32px); margin: 0 16px; padding: 15px; border-radius: var(--r); border: none; background: var(--accent); color: white; font-size: 17px; font-weight: 600; font-family: inherit; cursor: pointer; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.overlay.show { display: flex; }
.sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 0 0 40px; width: 100%; animation: up 0.28s cubic-bezier(0.32,0.72,0,1); max-height: 90vh; overflow-y: auto; }
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sh-handle-wrap { padding: 10px 0 6px; text-align: center; }
.sh-handle { display: inline-block; width: 36px; height: 5px; border-radius: 3px; background: rgba(60,60,67,0.2); }
.sh-title-wrap { padding: 4px 20px 16px; border-bottom: 0.5px solid var(--sep); }
.sh-title { font-size: 17px; font-weight: 600; }
.sh-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
.sh-actions { display: flex; gap: 10px; padding: 16px 16px 0; }
.sh-del { flex:1; padding:13px; border-radius:var(--r); background:rgba(255,59,48,0.1); border:none; color:#cc2a22; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.sh-close { flex:1; padding:13px; border-radius:var(--r); background:rgba(120,120,128,0.12); border:none; color:var(--text2); font-size:14px; font-family:inherit; cursor:pointer; }
.sh-save { flex:1; padding:13px; border-radius:var(--r); background:var(--accent); border:none; color:white; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.det-sec { margin: 16px 16px 0; }
.det-list { background: var(--card); border-radius: var(--r); overflow: hidden; }
.det-row { display: flex; padding: 11px 16px; border-bottom: 0.5px solid var(--sep); gap: 12px; }
.det-row:last-child { border-bottom: none; }
.det-k { font-size: 13px; color: var(--text2); min-width: 68px; }
.det-v { font-size: 14px; flex: 1; line-height: 1.5; }
.st-sec { margin: 12px 16px 0; }
.st-lbl { font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
.st-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.stb { padding: 8px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
.stb-p { background: rgba(255,149,0,0.12); color: #c07000; }
.stb-c { background: rgba(52,199,89,0.12); color: #1a8a3a; }
.stb-d { background: rgba(0,122,255,0.12); color: #0060cc; }
.stb-x { background: rgba(255,59,48,0.12); color: #cc2a22; }
.stb.act { font-weight: 700; box-shadow: 0 0 0 1.5px currentColor inset; }
.stb:not(.act) { opacity: 0.45; }
.memo-sec { margin: 12px 16px 0; }
.memo-ta { width: 100%; background: var(--card); border: none; border-radius: var(--r); padding: 12px 14px; font-size: 14px; font-family: inherit; color: var(--text); resize: none; height: 80px; outline: none; line-height: 1.5; }
.stats { display: flex; gap: 10px; margin: 0 16px 16px; }
.stat { flex: 1; background: var(--card); border-radius: var(--r); padding: 12px 8px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-l { font-size: 10px; color: var(--text2); margin-top: 2px; font-weight: 500; }
.filter { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px; margin-bottom: 14px; scrollbar-width: none; }
.filter::-webkit-scrollbar { display: none; }
.fc { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; background: var(--card); color: var(--text2); white-space: nowrap; cursor: pointer; border: none; font-family: inherit; flex-shrink: 0; }
.fc.on { background: var(--accent); color: white; }
.oc { background: var(--card); border-radius: var(--r); margin: 0 16px 10px; overflow: hidden; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.oc-top { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px 10px; border-bottom: 0.5px solid var(--sep); }
.oc-name { font-size: 16px; font-weight: 600; }
.oc-body { padding: 10px 16px 13px; font-size: 13px; color: var(--text2); line-height: 1.8; }
.oc-foot { display: flex; justify-content: space-between; padding: 10px 16px; border-top: 0.5px solid var(--sep); }
.oc-phone { font-size: 13px; color: var(--text2); }
.oc-total { font-size: 16px; font-weight: 700; color: var(--accent); }
.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.b-pending { background: rgba(255,149,0,0.12); color: #c07000; }
.b-confirmed { background: rgba(52,199,89,0.12); color: #1a8a3a; }
.b-done { background: rgba(0,122,255,0.12); color: #0060cc; }
.b-cancel { background: rgba(255,59,48,0.12); color: #cc2a22; }
.acc-row { display: flex; align-items: center; padding: 13px 16px; cursor: pointer; gap: 10px; min-height: 50px; }
.acc-arrow { font-size: 18px; color: var(--text3); transition: transform 0.22s; flex-shrink: 0; }
.acc-arrow.open { transform: rotate(90deg); }
.acc-body { padding: 4px 16px 14px 56px; border-top: 0.5px solid var(--sep); background: rgba(0,0,0,0.015); }
.acc-item { font-size: 13px; color: var(--text2); line-height: 1.8; padding: 2px 0; }
.success-wrap { text-align: center; padding: 60px 24px 32px; }
.success-icon { font-size: 64px; margin-bottom: 18px; }
.success-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.success-sub { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 28px; }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: rgba(40,40,40,0.92); color: white; padding: 11px 22px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.let-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.let-chip { padding: 5px 11px; border-radius: 20px; border: 1px solid rgba(139,74,74,0.25); background: rgba(139,74,74,0.07); color: var(--accent); font-size: 11px; font-family: inherit; cursor: pointer; line-height: 1.5; }
.let-chip.on { background: var(--accent); color: white; border-color: var(--accent); }
.photo-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.photo-thumb { position: relative; }
.photo-thumb img { width: 76px; height: 76px; border-radius: 12px; object-fit: cover; border: 1.5px solid var(--sep); display: block; }
.photo-del { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; border-radius: 50%; background: rgba(60,60,67,0.75); color: white; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
</style>
</head>

];

function addPhotos(e) {

});

function submit() {

if (!fd.time)         { toast(‘픽업 시간을 선택해주세요’); return; }
if (!fd.size)         { toast(‘케이크 사이즈를 선택해주세요’); return; }
if (!fd.pay)          { toast(‘결제 방법을 선택해주세요’); return; }
var sel = null;
for (var i=0; i<SIZES.length; i++) { if (SIZES[i].id === fd.size) { sel = SIZES[i]; break; } }
var total = sel.price + (fd.choco?3000:0) + (fd.delivery?5000:0);
W(’<div class="loading">주문서 전송 중…</div>’);
addOrder({
id: ‘o_’ + Date.now(),
name: fd.name, phone: fd.phone,
pickup_date: fd.date, pickup_time: fd.time,
cake_size: sel.name, cake_price: sel.price,
design: fd.design||’’, lettering: fd.lettering||’’,
payment: fd.pay, choco_deco: fd.choco,
delivery: fd.delivery, delivery_addr: fd.addr||’’,
total_price: total, status: ‘pending’, memo: ‘’,
photos: JSON.stringify(fd.photos||[]),
created_at: Date.now()
}).then(function() {
fd.done = true; renderGuest();
}).catch(function() {
toast(‘전송 실패, 다시 시도해주세요’); renderGuest();
});
}

function chgStatus(s) {
updateOrder(curId, { status: s }).then(function() {
toast(‘상태 변경됐어요’); openOrder(curId); renderAdmin();
});
}
function doSave() {
var memo = document.getElementById(‘memoTa’).value;
updateOrder(curId, { memo: memo }).then(function() {
toast(‘저장됐어요’); closeSheet(); renderAdmin();
});
}
function doDelete() {

delOrder(curId).then(function() {

});
