<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영화당 · 떡케이크 주문</title>
<style>
:root {
  --bg: #f7f3f0;
  --card: #ffffff;
  --accent: #8b4a4a;
  --accent2: #a05858;
  --text: #1c1c1e;
  --text2: #6b6b70;
  --text3: #aeaeb2;
  --sep: rgba(60,60,67,0.12);
  --green: #34c759;
  --orange: #ff9500;
  --blue: #007aff;
  --red: #ff3b30;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

.hdr { background: rgba(247,243,240,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(–sep); padding: 52px 20px 14px; position: sticky; top: 0; z-index: 50; }
.hdr-inner { display: flex; align-items: flex-end; justify-content: space-between; }
.hdr-eye { font-size: 11px; font-weight: 600; color: var(–accent); letter-spacing: 0.5px; margin-bottom: 2px; }
.hdr-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.pill { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
.pill-g { background: rgba(139,74,74,0.1); color: var(–accent); }
.pill-a { background: var(–accent); color: white; }

.wrap { max-width: 480px; margin: 0 auto; padding: 20px 0 100px; }
.loading { text-align: center; padding: 80px 20px; color: var(–text2); font-size: 15px; }

.sec { margin-bottom: 28px; }
.sec-hdr { font-size: 12px; font-weight: 600; color: var(–text2); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 20px; margin-bottom: 8px; }
.sec-foot { font-size: 12px; color: var(–text2); padding: 7px 20px 0; line-height: 1.6; }

.card { background: var(–card); border-radius: var(–r); margin: 0 16px; overflow: hidden; }
.row { display: flex; align-items: center; padding: 0 16px; min-height: 46px; border-bottom: 0.5px solid var(–sep); }
.row:last-child { border-bottom: none; }
.row-lbl { font-size: 15px; color: var(–text); min-width: 72px; }
.row-req { color: var(–red); font-size: 12px; }
.row-inp { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; font-family: inherit; color: var(–text); text-align: right; padding: 12px 0; }
.row-inp::placeholder { color: var(–text3); }
textarea.row-inp { text-align: left; height: 72px; resize: none; line-height: 1.5; padding: 12px 0; }

.notice { background: var(–card); border-radius: var(–r); padding: 14px 16px; margin: 0 16px; font-size: 13px; color: var(–text2); line-height: 1.8; }
.notice strong { color: var(–accent); font-weight: 600; }

/* SIZE */
.size-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.size-scroll::-webkit-scrollbar { display: none; }
.sz { flex-shrink: 0; width: 128px; background: var(–card); border-radius: var(–r); padding: 14px 10px; text-align: center; border: 2px solid transparent; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.15s; }
.sz.on { border-color: var(–accent); background: rgba(139,74,74,0.05); }
.sz-emoji { font-size: 28px; margin-bottom: 6px; }
.sz-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.sz-cm { font-size: 11px; color: var(–text2); margin-bottom: 6px; }
.sz-price { font-size: 14px; font-weight: 700; color: var(–accent); }

/* TOGGLE */
.tog-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(–sep); min-height: 48px; }
.tog-row:last-child { border-bottom: none; }
.tog-body { flex: 1; }
.tog-lbl { font-size: 15px; }
.tog-sub { font-size: 12px; color: var(–text2); margin-top: 1px; }
.sw { width: 51px; height: 31px; border-radius: 16px; background: rgba(120,120,128,0.2); position: relative; flex-shrink: 0; transition: background 0.2s; cursor: pointer; }
.sw.on { background: var(–green); }
.sw-k { position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; border-radius: 50%; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
.sw.on .sw-k { transform: translateX(20px); }

/* PAY */
.pay-wrap { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; }
.pay-chip { padding: 7px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; font-family: inherit; border: none; cursor: pointer; background: rgba(120,120,128,0.1); color: var(–text); transition: all 0.15s; }
.pay-chip.on { background: var(–accent); color: white; }

/* PRICE */
.price-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 0.5px solid var(–sep); }
.price-row:last-child { border-bottom: none; }
.p-key { font-size: 15px; }
.p-val { font-size: 15px; color: var(–text2); }
.p-key-b { font-size: 15px; font-weight: 600; }
.p-val-b { font-size: 17px; font-weight: 700; color: var(–accent); }

/* BTN */
.btn-main { display: block; width: calc(100% - 32px); margin: 0 16px; padding: 15px; border-radius: var(–r); border: none; background: var(–accent); color: white; font-size: 17px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.15s; letter-spacing: -0.2px; }
.btn-main:active { opacity: 0.8; }

/* OVERLAY */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.overlay.show { display: flex; }
.sheet { background: var(–bg); border-radius: 20px 20px 0 0; padding: 0 0 40px; width: 100%; animation: up 0.28s cubic-bezier(0.32,0.72,0,1); max-height: 90vh; overflow-y: auto; }
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sh-handle-wrap { padding: 10px 0 6px; text-align: center; }
.sh-handle { display: inline-block; width: 36px; height: 5px; border-radius: 3px; background: rgba(60,60,67,0.2); }
.sh-title-wrap { padding: 4px 20px 16px; border-bottom: 0.5px solid var(–sep); }
.sh-title { font-size: 17px; font-weight: 600; }
.sh-sub { font-size: 13px; color: var(–text2); margin-top: 2px; }
.sh-actions { display: flex; gap: 10px; padding: 16px 16px 0; }
.sh-del   { flex:1; padding:13px; border-radius:var(–r); background:rgba(255,59,48,0.1); border:none; color:#cc2a22; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.sh-close { flex:1; padding:13px; border-radius:var(–r); background:rgba(120,120,128,0.12); border:none; color:var(–text2); font-size:14px; font-family:inherit; cursor:pointer; }
.sh-save  { flex:1; padding:13px; border-radius:var(–r); background:var(–accent); border:none; color:white; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }

/* DETAIL */
.det-sec { margin: 16px 16px 0; }
.det-list { background: var(–card); border-radius: var(–r); overflow: hidden; }
.det-row { display: flex; padding: 11px 16px; border-bottom: 0.5px solid var(–sep); gap: 12px; align-items: flex-start; }
.det-row:last-child { border-bottom: none; }
.det-k { font-size: 13px; color: var(–text2); min-width: 68px; padding-top: 1px; }
.det-v { font-size: 14px; color: var(–text); flex: 1; line-height: 1.5; }

/* STATUS */
.st-sec { margin: 12px 16px 0; }
.st-lbl { font-size: 12px; color: var(–text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
.st-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.stb { padding: 8px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.stb-p { background: rgba(255,149,0,0.12); color: #c07000; }
.stb-c { background: rgba(52,199,89,0.12); color: #1a8a3a; }
.stb-d { background: rgba(0,122,255,0.12); color: #0060cc; }
.stb-x { background: rgba(255,59,48,0.12); color: #cc2a22; }
.stb.act { font-weight: 700; box-shadow: 0 0 0 1.5px currentColor inset; }
.stb:not(.act) { opacity: 0.45; }

.memo-sec { margin: 12px 16px 0; }
.memo-ta { width: 100%; background: var(–card); border: none; border-radius: var(–r); padding: 12px 14px; font-size: 14px; font-family: inherit; color: var(–text); resize: none; height: 80px; outline: none; line-height: 1.5; }

/* STATS */
.stats { display: flex; gap: 10px; margin: 0 16px 16px; }
.stat { flex: 1; background: var(–card); border-radius: var(–r); padding: 12px 8px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; color: var(–accent); letter-spacing: -0.5px; }
.stat-l { font-size: 10px; color: var(–text2); margin-top: 2px; font-weight: 500; }

/* FILTER */
.filter { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px; margin-bottom: 14px; scrollbar-width: none; }
.filter::-webkit-scrollbar { display: none; }
.fc { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; background: var(–card); color: var(–text2); white-space: nowrap; cursor: pointer; border: none; font-family: inherit; flex-shrink: 0; transition: all 0.15s; }
.fc.on { background: var(–accent); color: white; }

/* ORDER CARD */
.oc { background: var(–card); border-radius: var(–r); margin: 0 16px 10px; overflow: hidden; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.oc:active { opacity: 0.8; }
.oc-top { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px 10px; border-bottom: 0.5px solid var(–sep); }
.oc-name { font-size: 16px; font-weight: 600; }
.oc-body { padding: 10px 16px 13px; font-size: 13px; color: var(–text2); line-height: 1.8; }
.oc-foot { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 0.5px solid var(–sep); }
.oc-phone { font-size: 13px; color: var(–text2); }
.oc-total { font-size: 16px; font-weight: 700; color: var(–accent); }

.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.b-pending   { background: rgba(255,149,0,0.12); color: #c07000; }
.b-confirmed { background: rgba(52,199,89,0.12); color: #1a8a3a; }
.b-done      { background: rgba(0,122,255,0.12); color: #0060cc; }
.b-cancel    { background: rgba(255,59,48,0.12); color: #cc2a22; }

/* ACCORDION */
.acc-row { display: flex; align-items: center; padding: 13px 16px; cursor: pointer; gap: 10px; min-height: 50px; }
.acc-arrow { font-size: 18px; color: var(–text3); transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; }
.acc-arrow.open { transform: rotate(90deg); }
.acc-body { padding: 4px 16px 14px 56px; border-top: 0.5px solid var(–sep); background: rgba(0,0,0,0.015); }
.acc-item { font-size: 13px; color: var(–text2); line-height: 1.8; padding: 2px 0; }

/* SUCCESS */
.success-wrap { text-align: center; padding: 60px 24px 32px; }
.success-icon { font-size: 64px; margin-bottom: 18px; }
.success-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.success-sub { font-size: 15px; color: var(–text2); line-height: 1.7; margin-bottom: 28px; }

/* TOAST */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: rgba(40,40,40,0.92); color: white; padding: 11px 22px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* LETTERING CHIPS */
.let-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.let-chip { padding: 5px 11px; border-radius: 20px; border: 1px solid rgba(139,74,74,0.25); background: rgba(139,74,74,0.07); color: var(–accent); font-size: 11px; font-family: inherit; cursor: pointer; text-align: left; line-height: 1.5; transition: all 0.15s; }
.let-chip.on { background: var(–accent); color: white; border-color: var(–accent); }

/* ADDRESS INPUT */
.addr-wrap { padding: 12px 16px; border-top: 0.5px solid var(–sep); }
.addr-inp { width: 100%; border: 1.5px solid var(–sep); border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(–text); background: var(–bg); outline: none; transition: border-color 0.2s; }
.addr-inp:focus { border-color: var(–accent); }

/* PHOTO */
.photo-row { border-top: 0.5px solid var(–sep); padding: 12px 16px; }
.photo-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.photo-thumb { position: relative; }
.photo-thumb img { width: 76px; height: 76px; border-radius: 12px; object-fit: cover; border: 1.5px solid var(–sep); display: block; }
.photo-del { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; border-radius: 50%; background: rgba(60,60,67,0.75); color: white; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-add-label { width: 76px; height: 76px; border-radius: 12px; border: 1.5px dashed var(–sep); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; background: var(–bg); }

.empty { text-align: center; padding: 60px 20px; color: var(–text2); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-eye">영화당 · Younghwadang</div>
      <div class="hdr-title">🌸 떡케이크 주문</div>
    </div>
    <div class="pill" id="modePill"></div>
  </div>
</div>

<div class="wrap" id="wrap"></div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ──
const SUPA = 'https://pithlzhuqezeesprcbze.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';
const H    = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

function api(path, method, body) {
  return fetch(SUPA + path, { method: method || 'GET', headers: H, body: body ? JSON.stringify(body) : undefined });
}

// ── DB ──
async function getOrders() {
  const r = await api('/cake_orders?order=created_at.desc');
  return r.ok ? r.json() : [];
}
async function addOrder(o) {
  const r = await api('/cake_orders', 'POST', o);
  if (!r.ok) throw new Error(await r.text());
}
async function updateOrder(id, patch) {
  await api('/cake_orders?id=eq.' + id, 'PATCH', patch);
}
async function delOrder(id) {
  await api('/cake_orders?id=eq.' + id, 'DELETE');
}
async function getPhotos() {
  const r = await api('/cake_photos2?id=eq.main');
  if (!r.ok) return {};
  const d = await r.json();
  if (!d.length) return {};
  try { return JSON.parse(d[0].data); } catch(e) { return {}; }
}
async function savePhotos(data) {
  await api('/cake_photos2?id=eq.main', 'DELETE');
  await api('/cake_photos2', 'POST', { id: 'main', data: JSON.stringify(data) });
}

// ── 상태 ──
const IS_ADMIN = location.hash === '#admin-younghwadang';
const SIZES = [
  { id:'s1',  e:'🎂', name:'1호',      cm:'지름 15cm',  price:55000 },
  { id:'s2',  e:'🎂', name:'2호',      cm:'지름 18cm',  price:70000 },
  { id:'sn',  e:'🔢', name:'숫자케이크', cm:'세로 7cm',   price:90000 },
  { id:'s2t', e:'✨', name:'2단케이크', cm:'2호 + 미니', price:130000 },
];
const PAYS = ['계좌이체', '굿뜨래페이', '카드'];
const ST = { pending:'확인중', confirmed:'예약확정', done:'픽업완료', cancel:'취소' };

let fd = { name:'', phone:'', date:'', time:'', size:'', design:'', lettering:'', pay:'', choco:false, delivery:false, addr:'', photos:[], done:false };
let acc = { storage:false, transport:false };
let photos = {}; // 케이크 사진
let curId = null;
let adminFilter = 'all';
let adminTab = 'orders';

// 모드 표시
const pill = document.getElementById('modePill');
pill.textContent = IS_ADMIN ? '사장님 🔑' : '주문하기';
pill.className = 'pill ' + (IS_ADMIN ? 'pill-a' : 'pill-g');

function W(h) { document.getElementById('wrap').innerHTML = h; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function showSheet(h) {
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').className = 'overlay show';
}
function closeSheet() { document.getElementById('overlay').className = 'overlay'; }

// ── 손님 화면 ──
function renderGuest() {
  if (fd.done) { renderSuccess(); return; }
  const sel = SIZES.find(s => s.id === fd.size);
  const total = (sel?.price||0) + (fd.choco?3000:0) + (fd.delivery?5000:0);

  W(`
  <div class="sec">
    <div class="sec-hdr">주문 안내</div>
    <div class="notice">
      주문서 제출 후 <strong>010-5496-0736</strong>으로 확인 연락드려요.<br>
      입금 계좌: <strong>농협 3511-2979-4311-3 (김은영)</strong>
    </div>
  </div>

  <div class="sec">
    <div class="sec-hdr">기본 정보</div>
    <div class="card">
      <div class="row">
        <div class="row-lbl">성함 <span class="row-req">*</span></div>
        <input class="row-inp" placeholder="주문자 성함" value="${fd.name}" oninput="fd.name=this.value">
      </div>
      <div class="row">
        <div class="row-lbl">전화번호 <span class="row-req">*</span></div>
        <input class="row-inp" placeholder="010-0000-0000" type="tel" value="${fd.phone}" oninput="fd.phone=this.value">
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-hdr">픽업 일정</div>
    <div class="card">
      <div class="row">
        <div class="row-lbl">날짜 <span class="row-req">*</span></div>
        <input class="row-inp" type="date" value="${fd.date}" oninput="fd.date=this.value">
      </div>
      <div class="row">
        <div class="row-lbl">시간 <span class="row-req">*</span></div>
        <input class="row-inp" type="time" value="${fd.time}" oninput="fd.time=this.value">
      </div>
    </div>
    <div class="sec-foot">픽업 약 3시간 전 제작 시작 · 예약 시간에 맞춰 방문해주세요</div>
  </div>

  <div class="sec">
    <div class="sec-hdr">케이크 사이즈</div>
    <div class="size-scroll">
      ${SIZES.map(s => {
        const p = photos[s.id] || [];
        return `<div class="sz ${fd.size===s.id?'on':''}" onclick="fd.size='${s.id}';renderGuest()">
          ${p.length ? `<img src="${p[0]}" style="width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:6px;" onerror="this.style.display='none'">` : `<div class="sz-emoji">${s.e}</div>`}
          <div class="sz-name">${s.name}</div>
          <div class="sz-cm">${s.cm}</div>
          <div class="sz-price">${s.price.toLocaleString()}원</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="sec">
    <div class="sec-hdr">추가 옵션</div>
    <div class="card">
      <div class="tog-row">
        <div class="tog-body">
          <div class="tog-lbl">🍫 초콜릿 장식 <span style="font-size:11px;color:var(--accent);background:rgba(139,74,74,0.1);padding:1px 7px;border-radius:8px;margin-left:4px;">+3,000원</span></div>
          <div class="tog-sub">아기천사 등 화이트초콜릿 장식</div>
        </div>
        <div class="sw ${fd.choco?'on':''}" onclick="fd.choco=!fd.choco;renderGuest()"><div class="sw-k"></div></div>
      </div>
      <div class="tog-row">
        <div class="tog-body">
          <div class="tog-lbl">🚗 배달 요청 <span style="font-size:11px;color:var(--accent);background:rgba(139,74,74,0.1);padding:1px 7px;border-radius:8px;margin-left:4px;">+5,000원</span></div>
          <div class="tog-sub">부여 전 지역</div>
        </div>

        <div class="tog-lbl" style="flex:1;">픽업 주의사항</div>
        <div class="acc-arrow ${acc.transport?'open':''}">›</div>
      </div>
      ${acc.transport ? `<div class="acc-body">
        <div class="acc-item">⏰ 픽업 약 3시간 전 제작 시작</div>
        <div class="acc-item">🧑‍🤝‍🧑 동행자와 함께 조수석에서 손으로 받쳐 이동</div>
        <div class="acc-item">🚚 걱정되신다면 배달도 가능해요 (5,000원)</div>
      </div>` : ''}
    </div>
  </div>

  <div class="sec">
    <div class="sec-hdr">디자인</div>
    <div class="card">
      <div style="padding:14px 16px 10px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px;">원하는 디자인</div>
        <textarea class="row-inp" style="border:1.5px solid var(--sep);border-radius:10px;padding:10px 12px;background:var(--bg);width:100%;height:72px;text-align:left;" placeholder="색감, 스타일을 적어주세요" oninput="fd.design=this.value">${fd.design}</textarea>

```
  </div>
  <div class="photo-row">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;">📎 참고 사진 <span style="font-size:11px;color:var(--text2);font-weight:400;">최대 3장</span></div>
    <div class="photo-grid">
      ${(fd.photos||[]).map((p,i) => `
        <div class="photo-thumb">
          <img src="${p}">
          <button class="photo-del" onclick="fd.photos.splice(${i},1);renderGuest()">✕</button>
        </div>`).join('')}
      ${(fd.photos||[]).length < 3 ? `
      <label class="photo-add-label">
        <span style="font-size:22px;color:var(--text2);">+</span>
        <span style="font-size:10px;color:var(--text2);">추가</span>
        <input type="file" accept="image/*" multiple style="display:none;" onchange="addPhotos(event)">
      </label>` : ''}
    </div>

  </div>

  <div class="sec">
    <div class="sec-hdr">레터링</div>
    <div class="card">
      <div style="padding:14px 16px 10px;">
        <div class="let-chips">
          ${['어머님의 60년 세월을 존경하고 사랑합니다','지금처럼 건강하고 오래 곁에 있어주세요','아버님의 세 번째 스무 살을 축하드립니다','팔팔한 80세 팔순을 축하드립니다','늘 건강하고 행복하게 함께해요 사랑합니다'].map(t =>
          `<button class="let-chip ${fd.lettering===t?'on':''}" onclick="fd.lettering=fd.lettering==='${t.replace(/'/g,"\\'")}' ? '' : '${t.replace(/'/g,"\\'")}';renderGuest()">${t}</button>`).join('')}

      </div>

${sel ? `

  <div class="sec">
    <div class="sec-hdr">결제 금액</div>
    <div class="card">

      ${fd.choco ? `<div class="price-row"><span class="p-key">초콜릿 장식</span><span class="p-val">+3,000원</span></div>` : ''}
      ${fd.delivery ? `<div class="price-row"><span class="p-key">배달</span><span class="p-val">+5,000원</span></div>` : ''}

function renderSuccess() {
W(`<div class="success-wrap">
<div class="success-icon">🌸</div>
<div class="success-title">주문서가 전달됐어요</div>
<div class="success-sub">확인 후 <strong>010-5496-0736</strong>으로 연락드릴게요 💛</div>
<div class="notice" style="text-align:left;margin:0 0 24px;">
💳 입금 계좌<br>
<strong>농협 3511-2979-4311-3 (김은영)</strong><br>
<span style="font-size:12px;color:var(--text2);">입금 확인 후 예약 확정돼요</span>
</div>
<button class="btn-main" onclick="fd={name:'',phone:'',date:'',time:'',size:'',design:'',lettering:'',pay:'',choco:false,delivery:false,addr:'',photos:[],done:false};renderGuest()">새 주문서 작성</button>

  </div>`);
}

function addPhotos(e) {
const files = Array.from(e.target.files).slice(0, 3 - (fd.photos||[]).length);
let n = 0;
files.forEach(f => {
const r = new FileReader();
r.onload = ev => {
fd.photos.push(ev.target.result);
if (++n === files.length) renderGuest();
};
r.readAsDataURL(f);
});
}

async function submit() {
if (!fd.name.trim())  { toast(‘성함을 입력해주세요’); return; }
if (!fd.phone.trim()) { toast(‘전화번호를 입력해주세요’); return; }
if (!fd.date)         { toast(‘픽업 날짜를 선택해주세요’); return; }
if (!fd.time)         { toast(‘픽업 시간을 선택해주세요’); return; }
if (!fd.size)         { toast(‘케이크 사이즈를 선택해주세요’); return; }
if (!fd.pay)          { toast(‘결제 방법을 선택해주세요’); return; }
const sel = SIZES.find(s => s.id === fd.size);
const total = sel.price + (fd.choco?3000:0) + (fd.delivery?5000:0);
W(’<div class="loading">주문서 전송 중…</div>’);
try {
await addOrder({
id: ‘o_’ + Date.now(),
name: fd.name, phone: fd.phone,
pickup_date: fd.date, pickup_time: fd.time,
cake_size: sel.name, cake_price: sel.price,
design: fd.design||’’, lettering: fd.lettering||’’,
payment: fd.pay, choco_deco: fd.choco,
delivery: fd.delivery, delivery_addr: fd.addr||’’,
total_price: total, status: ‘pending’, memo: ‘’,
photos: JSON.stringify(fd.photos||[]),
created_at: Date.now()
});
fd.done = true; renderGuest();
} catch(e) {
toast(‘전송 실패, 다시 시도해주세요’);
renderGuest();
}
}

// ── 어드민 화면 ──
async function renderAdmin() {
if (adminTab === ‘photos’) { await renderPhotoManager(); return; }
W(’<div class="loading">주문 목록 불러오는 중…</div>’);
let orders;
try { orders = await getOrders(); } catch(e) { W(’<div class="empty"><div class="empty-icon">⚠️</div><div>불러오기 실패</div></div>’); return; }
if (!Array.isArray(orders)) orders = [];

const filt = adminFilter === ‘all’ ? orders : orders.filter(o => o.status === adminFilter);
const revenue = orders.filter(o => o.status !== ‘cancel’).reduce((s,o) => s + (o.total_price||0), 0);

let h = `

  <div class="sec" style="padding-top:8px;">
    <div class="stats">
      <div class="stat"><div class="stat-n">${orders.length}</div><div class="stat-l">전체</div></div>
      <div class="stat"><div class="stat-n" style="color:#c07000;">${orders.filter(o=>o.status==='pending').length}</div><div class="stat-l">확인중</div></div>
      <div class="stat"><div class="stat-n" style="color:#1a8a3a;">${orders.filter(o=>o.status==='confirmed').length}</div><div class="stat-l">확정</div></div>
      <div class="stat"><div class="stat-n" style="font-size:14px;padding-top:4px;">${Math.round(revenue/10000)}만원</div><div class="stat-l">매출</div></div>
    </div>
    <div class="filter">
      ${['all','pending','confirmed','done','cancel'].map(f => {
        const labels = {all:'전체',pending:'확인중',confirmed:'예약확정',done:'픽업완료',cancel:'취소'};
        const cnt = f==='all' ? orders.length : orders.filter(o=>o.status===f).length;
        return `<button class="fc ${adminFilter===f?'on':''}" onclick="adminFilter='${f}';renderAdmin()">${labels[f]} ${cnt}</button>`;
      }).join('')}
      <button class="fc" onclick="adminTab='photos';renderAdmin()" style="background:rgba(139,74,74,0.1);color:var(--accent);">🖼 사진 관리</button>
    </div>
  </div>`;

if (!filt.length) {
h += `<div class="empty"><div class="empty-icon">🌸</div><div>해당 주문이 없어요</div></div>`;
} else {
h += filt.map(o => {
const d = new Date(o.created_at);
const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
return `<div class="oc" onclick="openOrder('${o.id}')"> <div class="oc-top"> <div class="oc-name">${o.name}</div> <div style="display:flex;align-items:center;gap:7px;"> <div class="badge b-${o.status}">${ST[o.status]}</div> <div style="font-size:12px;color:var(--text2);">${ds}</div> </div> </div> <div class="oc-body">📅 ${o.pickup_date} ${o.pickup_time}<br>🎂 ${o.cake_size}${o.choco_deco?' · 초콜릿':''}${o.delivery?' · 배달':''}<br>💳 ${o.payment}</div> <div class="oc-foot"><div class="oc-phone">${o.phone}</div><div class="oc-total">${(o.total_price||0).toLocaleString()}원</div></div> </div>`;
}).join(’’);
}
W(h);
}

async function openOrder(id) {
let orders;
try { orders = await getOrders(); } catch(e) { return; }
const o = orders.find(x => x.id === id);
if (!o) return;
curId = id;

let photoArr = [];
try { photoArr = JSON.parse(o.photos || ‘[]’); } catch(e) {}

showSheet(`<div class="sh-handle-wrap"><div class="sh-handle"></div></div> <div class="sh-title-wrap"> <div class="sh-title">${o.name}님 주문</div> <div class="sh-sub">${o.pickup_date} ${o.pickup_time} 픽업</div> </div> <div class="det-sec"> <div class="det-list"> <div class="det-row"><div class="det-k">이름</div><div class="det-v">${o.name}</div></div> <div class="det-row"><div class="det-k">전화번호</div><div class="det-v">${o.phone}</div></div> <div class="det-row"><div class="det-k">픽업</div><div class="det-v">${o.pickup_date} ${o.pickup_time}</div></div> <div class="det-row"><div class="det-k">케이크</div><div class="det-v">${o.cake_size}${o.choco_deco?' + 초콜릿':''}${o.delivery?' + 배달':''}</div></div> <div class="det-row"><div class="det-k">디자인</div><div class="det-v">${o.design||'—'}</div></div> ${photoArr.length ?`<div class="det-row"><div class="det-k">참고사진</div><div class="det-v" style="display:flex;gap:6px;flex-wrap:wrap;">${photoArr.map(p=>`<img src="${p}" style="width:60px;height:60px;border-radius:8px;object-fit:cover;">`).join(’’)}</div></div>`: ''} <div class="det-row"><div class="det-k">레터링</div><div class="det-v">${o.lettering||'—'}</div></div> <div class="det-row"><div class="det-k">결제</div><div class="det-v">${o.payment}</div></div> <div class="det-row"><div class="det-k">금액</div><div class="det-v" style="font-weight:700;color:var(--accent);">${(o.total_price||0).toLocaleString()}원</div></div> </div> </div> <div class="st-sec"> <div class="st-lbl">상태 변경</div> <div class="st-btns"> <button class="stb stb-p ${o.status==='pending'?'act':''}"   onclick="changeStatus('pending')">확인중</button> <button class="stb stb-c ${o.status==='confirmed'?'act':''}" onclick="changeStatus('confirmed')">예약확정</button> <button class="stb stb-d ${o.status==='done'?'act':''}"      onclick="changeStatus('done')">픽업완료</button> <button class="stb stb-x ${o.status==='cancel'?'act':''}"    onclick="changeStatus('cancel')">취소</button> </div> </div> <div class="memo-sec"> <div class="st-lbl" style="margin-bottom:8px;">메모</div> <textarea class="memo-ta" id="memoTa">${o.memo||''}</textarea> </div> <div class="sh-actions"> <button class="sh-del"   onclick="doDelete()">삭제</button> <button class="sh-close" onclick="closeSheet()">닫기</button> <button class="sh-save"  onclick="doSave()">저장</button> </div>`);
}

async function changeStatus(s) {
await updateOrder(curId, { status: s });
toast(‘상태 변경됐어요’);
openOrder(curId);
renderAdmin();
}
async function doSave() {
const memo = document.getElementById(‘memoTa’).value;
await updateOrder(curId, { memo });
toast(‘저장됐어요’); closeSheet(); renderAdmin();
}
async function doDelete() {
if (!confirm(‘삭제할까요?’)) return;
await delOrder(curId);
closeSheet(); toast(‘삭제됐어요’); renderAdmin();
}

async function renderPhotoManager() {
W(’<div class="loading">사진 불러오는 중…</div>’);
photos = await getPhotos();
let h = `

  <div class="sec" style="padding-top:8px;">
    <div style="padding:0 16px 12px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:16px;font-weight:600;">🖼 케이크 사진 관리</div>
      <button class="fc on" onclick="adminTab='orders';renderAdmin()">← 주문 목록</button>
    </div>`;

for (const s of SIZES) {
const p = photos[s.id] || [];
h += `<div class="card" style="margin-bottom:12px;"> <div style="padding:12px 16px;border-bottom:0.5px solid var(--sep);font-size:14px;font-weight:600;">${s.e} ${s.name}</div> <div style="padding:12px 16px;"> <div class="photo-grid"> ${p.map((img, i) =>`
<div class="photo-thumb">
<img src="${img}" style="width:72px;height:72px;border-radius:10px;object-fit:cover;border:1px solid var(--sep);">
<button class="photo-del" onclick="delPhoto('${s.id}',${i})">✕</button>
</div>`).join('')} ${p.length < 8 ? `
<label class="photo-add-label" style="width:72px;height:72px;">
<span style="font-size:20px;color:var(--text2);">+</span>
<span style="font-size:10px;color:var(--text2);">추가</span>
<input type="file" accept="image/*" multiple style="display:none;" onchange="addPhoto(event,'${s.id}')">
</label>` : ''} </div> </div> </div>`;
}
h += `</div>`;
W(h);
}

async function addPhoto(e, sizeId) {
const files = Array.from(e.target.files).slice(0, 8 - (photos[sizeId]||[]).length);
if (!files.length) return;
W(’<div class="loading">업로드 중…</div>’);
const newImgs = await Promise.all(files.map(f => new Promise(res => {
const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(f);
})));
photos[sizeId] = […(photos[sizeId]||[]), …newImgs];
await savePhotos(photos);
toast(‘추가됐어요 ✅’);
renderPhotoManager();
}

async function delPhoto(sizeId, idx) {
if (!confirm(‘삭제할까요?’)) return;
photos[sizeId] = (photos[sizeId]||[]).filter((_,i) => i !== idx);
await savePhotos(photos);
toast(‘삭제됐어요’);
renderPhotoManager();
}

// ── 시작 ──
async function init() {
if (IS_ADMIN) {
await renderAdmin();
} else {
photos = await getPhotos().catch(() => ({}));
renderGuest();
}
}
init();
</script>
