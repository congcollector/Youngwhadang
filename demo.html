<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>케이크 주문서 데모 · 무료 체험</title>
<style>
:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --text: #1c1c1e;
  --text2: #8e8e93;
  --text3: #c7c7cc;
  --sep: rgba(60,60,67,0.1);
  --r: 13px;
  --cake: #6b4c3b;
  --cake2: rgba(107,76,59,0.08);
  --hwa: #3a5a7a;
  --hwa2: rgba(58,90,122,0.08);
  --green: #34c759;
  --red: #ff3b30;
  --blue: #007aff;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { background:#f2f2f7; background:var(--bg); font-family:-apple-system,sans-serif; color:#1c1c1e; color:var(--text); -webkit-font-smoothing:antialiased; font-size:16px; }

/* ── 헤더 ── */
.hdr { background:#f2f2f7; background:rgba(242,242,247,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:0.5px solid var(–sep); padding:52px 20px 0; position:sticky; top:0; z-index:50; }
.hdr-top { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px; }
.hdr-eye { font-size:11px; font-weight:500; color:var(–text2); letter-spacing:0.3px; margin-bottom:2px; }
.hdr-ttl { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
.pill { font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; }
.pill-g { background:var(–cake2); color:var(–cake); }
.pill-a { background:var(–cake); color:#fff; }
.hdr-tabs { display:flex; border-top:0.5px solid var(–sep); }
.hdr-tab { flex:1; padding:11px 0; text-align:center; font-size:14px; font-weight:500; color:var(–text2); border-bottom:2px solid transparent; cursor:pointer; transition:all 0.15s; }
.hdr-tab.cake.on, .hdr-tab.on.cake { color:#6b4c3b; color:var(–cake); border-bottom-color:#6b4c3b; border-bottom-color:var(–cake); font-weight:600; }
.hdr-tab.hwa.on, .hdr-tab.on.hwa { color:#3a5a7a; color:var(–hwa); border-bottom-color:#3a5a7a; border-bottom-color:var(–hwa); font-weight:600; }

/* ── 레이아웃 ── */
.wrap { max-width:480px; margin:0 auto; padding:24px 0 100px; }
.loading { text-align:center; padding:80px 20px; color:var(–text2); font-size:15px; }

/* ── 섹션 ── */
.sec { margin-bottom:32px; }
.sec-hdr { font-size:13px; font-weight:600; color:var(–text2); letter-spacing:0.2px; padding:0 20px; margin-bottom:8px; }
.sec-foot { font-size:12px; color:var(–text2); padding:8px 20px 0; line-height:1.6; }

/* ── 카드 ── */
.card { background:#ffffff; background:var(–card); border-radius:13px; border-radius:var(–r); margin:0 16px; overflow:hidden; }

/* ── 행 입력 ── */
.row { display:flex; align-items:center; padding:0 16px; min-height:48px; border-bottom:0.5px solid var(–sep); }
.row:last-child { border-bottom:none; }
.row-lbl { font-size:15px; min-width:72px; color:var(–text); }
.req { color:var(–red); font-size:12px; margin-left:2px; }
.inp { flex:1; border:none; outline:none; background:transparent; font-size:15px; font-family:inherit; color:var(–text); text-align:right; padding:12px 0; }
.inp::placeholder { color:var(–text3); }

/* ── 주문 안내 ── */
.notice { background:#ffffff; background:var(–card); border-radius:13px; border-radius:var(–r); padding:16px; margin:0 16px; font-size:14px; color:#8e8e93; color:var(–text2); line-height:1.7; } .notice strong { color:#1c1c1e; color:var(–text); font-weight:600; }
.notice strong { color:var(–text); font-weight:600; }

/* ── 사이즈 슬라이드 ── */
.sz-scroll { display:flex; gap:10px; overflow-x:auto; padding:0 16px 4px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.sz-scroll::-webkit-scrollbar { display:none; }
.sz { flex-shrink:0; width:130px; background:#ffffff; background:var(–card); border-radius:var(–r); padding:14px 12px; text-align:center; border:2px solid transparent; cursor:pointer; transition:all 0.15s; }
.sz.on-cake { border-color:var(–cake); background:var(–cake2); }
.sz.on-hwa { border-color:var(–hwa); background:var(–hwa2); }
.sz-e { font-size:26px; margin-bottom:6px; }
.sz-n { font-size:13px; font-weight:600; margin-bottom:2px; color:var(–text); }
.sz-c { font-size:11px; color:var(–text2); margin-bottom:6px; }
.sz-p { font-size:14px; font-weight:700; }
.sz-p-cake { color:var(–cake); }
.sz-p-hwa { color:var(–hwa); }

/* ── 토글 ── */
.tog { display:flex; align-items:center; padding:13px 16px; border-bottom:0.5px solid var(–sep); gap:12px; min-height:52px; }
.tog:last-child { border-bottom:none; }
.tog-bd { flex:1; }
.tog-l { font-size:15px; color:var(–text); }
.tog-s { font-size:13px; color:var(–text2); margin-top:2px; }
.sw { width:51px; height:31px; border-radius:16px; background:rgba(120,120,128,0.16); position:relative; flex-shrink:0; transition:background 0.2s; cursor:pointer; }
.sw.on-cake { background:var(–cake); }
.sw.on-hwa { background:var(–hwa); }
.sw-k { position:absolute; top:2px; left:2px; width:27px; height:27px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.18); transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
.sw.on-cake .sw-k, .sw.on-hwa .sw-k { transform:translateX(20px); }

/* ── 결제 칩 ── */
.pay-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.pc { padding:8px 18px; border-radius:20px; font-size:14px; font-weight:500; font-family:inherit; border:1.5px solid rgba(60,60,67,0.1); cursor:pointer; background:#f2f2f7; background:var(–bg); color:var(–text); transition:all 0.15s; }
.pc.on-cake { background:var(–cake); color:#fff; border-color:var(–cake); }
.pc.on-hwa { background:var(–hwa); color:#fff; border-color:var(–hwa); }

/* ── 가격 ── */
.pr { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:0.5px solid var(–sep); }
.pr:last-child { border-bottom:none; }
.pk { font-size:15px; color:var(–text); }
.pv { font-size:15px; color:var(–text2); }
.pkb { font-size:15px; font-weight:600; color:var(–text); }
.pvb-cake { font-size:17px; font-weight:700; color:var(–cake); }
.pvb-hwa { font-size:17px; font-weight:700; color:var(–hwa); }

/* ── 버튼 ── */
.btn-cake { display:block; width:calc(100% - 32px); margin:0 16px; padding:16px; border-radius:var(–r); border:none; background:var(–cake); color:#fff; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; letter-spacing:-0.2px; }
.btn-hwa { display:block; width:calc(100% - 32px); margin:0 16px; padding:16px; border-radius:var(–r); border:none; background:var(–hwa); color:#fff; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; letter-spacing:-0.2px; }

/* ── 시트 ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.36); z-index:200; display:none; align-items:flex-end; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
.overlay.show { display:flex; }
.sheet { background:#f2f2f7; background:var(–bg); border-radius:20px 20px 0 0; padding:0 0 40px; width:100%; animation:up 0.3s cubic-bezier(0.32,0.72,0,1); max-height:90vh; overflow-y:auto; }
@keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sh-hw { padding:10px 0 6px; text-align:center; }
.sh-h { display:inline-block; width:36px; height:5px; border-radius:3px; background:rgba(60,60,67,0.18); }
.sh-tw { padding:4px 20px 16px; border-bottom:0.5px solid var(–sep); }
.sh-t { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
.sh-s { font-size:13px; color:var(–text2); margin-top:3px; }
.sh-act { display:flex; gap:10px; padding:16px 16px 0; }
.sh-del { flex:1; padding:14px; border-radius:var(–r); background:rgba(255,59,48,0.08); border:none; color:var(–red); font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.sh-cls { flex:1; padding:14px; border-radius:var(–r); background:rgba(120,120,128,0.1); border:none; color:var(–text2); font-size:14px; font-family:inherit; cursor:pointer; }
.sh-sav-cake { flex:1; padding:14px; border-radius:var(–r); background:var(–cake); border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.sh-sav-hwa { flex:1; padding:14px; border-radius:var(–r); background:var(–hwa); border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }

/* ── 디테일 행 ── */
.dl { background:var(–card); border-radius:var(–r); overflow:hidden; }
.dr { display:flex; padding:11px 16px; border-bottom:0.5px solid var(–sep); gap:12px; }
.dr:last-child { border-bottom:none; }
.dk { font-size:13px; color:var(–text2); min-width:64px; padding-top:1px; }
.dv { font-size:14px; flex:1; line-height:1.5; }

/* ── 상태 배지 ── */
.stb { padding:7px 14px; border-radius:20px; border:none; font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; transition:all 0.15s; }
.stb-p { background:rgba(255,149,0,0.1); color:#b86800; }
.stb-c { background:rgba(52,199,89,0.1); color:#1f8a3a; }
.stb-d { background:rgba(0,122,255,0.1); color:#0060c7; }
.stb-x { background:rgba(255,59,48,0.1); color:var(–red); }
.stb.act { font-weight:700; box-shadow:0 0 0 1.5px currentColor inset; }
.stb:not(.act) { opacity:0.4; }
.memo-ta { width:100%; background:var(–card); border:none; border-radius:var(–r); padding:13px 14px; font-size:14px; font-family:inherit; color:var(–text); resize:none; height:80px; outline:none; line-height:1.5; }

/* ── 어드민 통계 ── */
.stats { display:flex; gap:10px; }
.stat { flex:1; background:#ffffff; background:var(–card); border-radius:13px; border-radius:var(–r); padding:14px 10px; text-align:center; }
.stat-n { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.stat-l { font-size:11px; color:var(–text2); margin-top:3px; font-weight:500; }

/* ── 필터 ── */
.flt { display:flex; gap:8px; overflow-x:auto; padding:0 16px; margin-bottom:14px; scrollbar-width:none; }
.flt::-webkit-scrollbar { display:none; }
.fc { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; background:#ffffff; background:var(–card); color:var(–text2); white-space:nowrap; cursor:pointer; border:none; font-family:inherit; flex-shrink:0; transition:all 0.15s; }
.fc.on-cake { background:var(–cake); color:#fff; }
.fc.on-hwa { background:var(–hwa); color:#fff; }

/* ── 주문 카드 ── */
.oc { background:#ffffff; background:var(–card); border-radius:var(–r); margin:0 16px 10px; overflow:hidden; cursor:pointer; }
.oc-top { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:0.5px solid var(–sep); }
.oc-nm { font-size:16px; font-weight:600; letter-spacing:-0.2px; }
.oc-bd { padding:10px 16px 12px; font-size:13px; color:var(–text2); line-height:1.8; }
.oc-ft { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-top:0.5px solid var(–sep); }
.oc-ph { font-size:13px; color:var(–text2); }
.oc-tt-cake { font-size:16px; font-weight:700; color:var(–cake); }
.oc-tt-hwa { font-size:16px; font-weight:700; color:var(–hwa); }
.oc-cake { border-left:3px solid var(–cake); }
.oc-hwa { border-left:3px solid var(–hwa); }

/* ── 배지 ── */
.badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
.b-pending { background:rgba(255,149,0,0.1); color:#b86800; }
.b-confirmed { background:rgba(52,199,89,0.1); color:#1f8a3a; }
.b-done { background:rgba(0,122,255,0.1); color:#0060c7; }
.b-cancel { background:rgba(255,59,48,0.1); color:var(–red); }

/* ── 아코디언 ── */
.acc-row { display:flex; align-items:center; padding:14px 16px; cursor:pointer; gap:12px; min-height:52px; }
.arr { font-size:16px; color:var(–text3); transition:transform 0.22s; flex-shrink:0; }
.arr.open { transform:rotate(90deg); }
.acc-bd { padding:4px 16px 14px 52px; border-top:0.5px solid var(–sep); }
.acc-it { font-size:13px; color:var(–text2); line-height:1.9; padding:1px 0; }

/* ── 성공 화면 ── */
.succ { text-align:center; padding:64px 24px 32px; }
.succ-ic { font-size:56px; margin-bottom:20px; }
.succ-t { font-size:24px; font-weight:700; letter-spacing:-0.5px; margin-bottom:8px; }
.succ-s { font-size:15px; color:var(–text2); line-height:1.7; margin-bottom:28px; }

/* ── 토스트 ── */
.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:rgba(28,28,30,0.92); color:#fff; padding:12px 22px; border-radius:20px; font-size:14px; font-weight:500; z-index:400; opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }

/* ── 레터링 칩 ── */
.lc { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.lc-btn-cake { padding:6px 12px; border-radius:20px; border:1px solid rgba(107,76,59,0.2); background:var(–cake2); color:var(–cake); font-size:12px; font-family:inherit; cursor:pointer; line-height:1.5; transition:all 0.15s; }
.lc-btn-cake.on { background:var(–cake); color:#fff; border-color:var(–cake); }

/* ── 어드민 탭 ── */
.adm-tabs { display:flex; gap:8px; padding:0 16px; margin-bottom:16px; }
.adm-tab { flex:1; padding:11px; border-radius:var(–r); border:none; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; text-align:center; transition:all 0.15s; }
.adm-tab-cake { background:var(–cake2); color:var(–cake); }
.adm-tab-cake.on { background:var(–cake); color:#fff; }
.adm-tab-hwa { background:var(–hwa2); color:var(–hwa); }
.adm-tab-hwa.on { background:var(–hwa); color:#fff; }

/* ── 설정 탭 ── */
.cfg-tabs { display:flex; border-bottom:0.5px solid var(–sep); margin-bottom:16px; }
.cfg-tab { flex:1; padding:12px 0; text-align:center; font-size:14px; font-weight:500; color:var(–text2); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
.cfg-tab-cake.on { color:var(–cake); border-bottom-color:var(–cake); }
.cfg-tab-hwa.on { color:var(–hwa); border-bottom-color:var(–hwa); }

/* ── 빈 화면 ── */
.empty { text-align:center; padding:64px 20px; color:var(–text2); }

/* ── 옵션 칩 ── */
.opt-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.opt-chip { padding:8px 16px; border-radius:20px; font-size:14px; font-weight:500; font-family:inherit; border:1.5px solid rgba(60,60,67,0.1); cursor:pointer; background:#f2f2f7; background:var(–bg); color:var(–text); transition:all 0.15s; }
.opt-chip.on-hwa { background:var(–hwa); color:#fff; border-color:var(–hwa); }
.opt-chip.on-cake { background:var(–cake); color:#fff; border-color:var(–cake); }
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-eye" id="hdrEye">데모 · Demo Store</div>
      <div class="hdr-ttl" id="hdrTtl">🎂 주문서 데모</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="pill" id="modePill"></div>
      <button id="settingsBtn" style="display:none;padding:6px 12px;border-radius:20px;background:rgba(139,74,74,0.1);border:none;color:#8b4a4a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;" onclick="showSettings()">⚙️</button>
    </div>
  </div>
  <div class="hdr-tabs" id="hdrTabs">
    <div class="hdr-tab cake on" onclick="switchTab('cake')">떡케이크</div>
    <div class="hdr-tab hwa" onclick="switchTab('hwa')">화과자</div>
  </div>
</div>

<div style="background:linear-gradient(135deg,#8b4a4a,#4a6b8b);color:white;text-align:center;padding:10px 16px;font-size:13px;line-height:1.6;">
  🎯 <strong>데모 버전</strong> · 실제 주문은 저장되지 않아요<br>
  <span style="font-size:11px;opacity:0.85;">사장님 어드민 체험: 주소창에 <strong>#admin-demo</strong> 추가</span>
</div>
<div class="wrap" id="wrap"><div class="loading">불러오는 중...</div></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ── 데모 모드 (DB 없이 메모리 저장) ──
let _demoOrders = [
  {id:'demo1', type:'cake', name:'김민지', phone:'010-1234-5678',
   pickup_date:'2026-04-10', pickup_time:'14:00', cake_size:'2호', cake_price:70000,
   design:'핑크 파스텔톤', lettering:'생일 축하해 사랑해♥', payment:'계좌이체',
   choco_deco:true, delivery:false, delivery_addr:'', total_price:73000,
   status:'confirmed', memo:'너무 기대돼요!', photos:'[]', sizes:'{}', created_at:Date.now()-3600000},
  {id:'demo2', type:'cake', name:'이준호', phone:'010-9876-5432',
   pickup_date:'2026-04-11', pickup_time:'11:00', cake_size:'1호', cake_price:55000,
   design:'민트 계열', lettering:'', payment:'굿뜨래페이',
   choco_deco:false, delivery:false, delivery_addr:'', total_price:55000,
   status:'pending', memo:'', photos:'[]', sizes:'{}', created_at:Date.now()-7200000},
  {id:'demo3', type:'hwa', name:'박서연', phone:'010-5555-6666',
   pickup_date:'2026-04-12', pickup_time:'15:00', cake_size:'15구', cake_price:64000,
   method:'pickup', packing:'["p_bojagi"]', packing_text:'사랑하는 엄마께',
   payment:'카드', total_price:72000,
   status:'pending', memo:'', created_at:Date.now()-1800000}
];
let _demoSettings = null;

async function api() { return {ok:true, json:async function(){return[];}}; }
async function getOrders(type) {
  await new Promise(function(r){setTimeout(r,300);});
  return _demoOrders.filter(function(o){ return o.type===type; });
}
async function addOrder(o) { _demoOrders.unshift(o); }
async function updateOrder(id,p) {
  const i = _demoOrders.findIndex(function(o){ return o.id===id; });
  if (i>=0) _demoOrders[i] = Object.assign({}, _demoOrders[i], p);
}
async function delOrder(id) {
  _demoOrders = _demoOrders.filter(function(o){ return o.id!==id; });
}
async function loadSettings() {
  if (_demoSettings) CFG = Object.assign({}, DEFAULT_CFG, _demoSettings);
}
async function saveSettings(data) {
  _demoSettings = JSON.parse(JSON.stringify(data));
  CFG = Object.assign({}, DEFAULT_CFG, data);
}

// ── 기본 설정 ──
const DEFAULT_CFG = {
  // 떡케이크
  shop_name:'🎂 샘플 케이크샵', shop_phone:'010-0000-0000',
  bank_account:'농협 000-0000-0000', bank_holder:'홍길동',
  pickup_notice:'픽업 약 3시간 전 제작 시작 · 예약 확정 후 상세 주소 안내드려요',
  storage_tips:['📌 당일 섭취 권장','🌸 앙금꽃 → 냉장 보관 (최대 1주일)','🍡 떡 → 냉동 후 자연해동'],
  transport_tips:['⏰ 픽업 약 3시간 전 제작 시작','🧑\u200d🤝\u200d🧑 동행자와 함께 조수석에서 손으로 받쳐 이동','🚚 배달 가능 (5,000원)'],
  sizes:[
    {id:'s1',e:'🎂',name:'1호',cm:'지름 15cm',price:55000},

function toggleCakeSize(id) {
  if (!fd.sizes) fd.sizes = {};
  if (fd.sizes[id]) { delete fd.sizes[id]; } else { fd.sizes[id] = 1; }
  renderCake();
}
function changeCakeQty(id, delta) {
  if (!fd.sizes) fd.sizes = {};
  const cur = fd.sizes[id] || 0;
  const next = cur + delta;
  if (next <= 0) { delete fd.sizes[id]; } else { fd.sizes[id] = next; }
  renderCake();
}
function toggleHwaSize(id) {
  if (!hf.sizes) hf.sizes = {};
  if (hf.sizes[id]) { delete hf.sizes[id]; } else { hf.sizes[id] = 1; }
  renderHwa();
}
function changeHwaQty(id, delta) {
  if (!hf.sizes) hf.sizes = {};

async function submitCake() {
  if (!fd.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!fd.phone.trim()) { toast('전화번호를 입력해주세요'); return; }
  if (!fd.date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (!fd.time) { toast('픽업 시간을 선택해주세요'); return; }
  const hasSel = fd.sizes && Object.keys(fd.sizes).some(function(k){ return fd.sizes[k]>0; });
  if (!hasSel) { toast('케이크 사이즈를 선택해주세요'); return; }
  if (!fd.pay) { toast('결제 방법을 선택해주세요'); return; }
  let cakeSub = 0;
  const sizeNames = [];
  CFG.sizes.forEach(function(s){ const q=fd.sizes[s.id]||0; if(q>0){cakeSub+=s.price*q; sizeNames.push(s.name+' x'+q);} });
  const total = cakeSub + (fd.choco?CFG.choco_price:0) + (fd.method==='delivery'?CFG.delivery_price:0);
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'c_'+Date.now(), type:'cake',
      name:fd.name, phone:fd.phone,
      pickup_date:fd.date, pickup_time:fd.time,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      design:fd.design||'', lettering:fd.lettering||'',
      payment:fd.pay, choco_deco:fd.choco,
      delivery:fd.method==='delivery', delivery_addr:fd.method==='delivery'?fd.addr||'':'',
      total_price:total, status:'pending', memo:'',
      photos:JSON.stringify(fd.photos||[]),
      created_at:Date.now()
    });
    fd.done = true; renderCake();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderCake(); }
}

async function submitHwa() {
  if (!hf.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!hf.phone.trim()) { toast('연락처를 입력해주세요'); return; }
  const hasHwaSel = hf.sizes && Object.keys(hf.sizes).some(function(k){ return hf.sizes[k]>0; });
  if (!hasHwaSel) { toast('화과자 수량을 선택해주세요'); return; }
  if (hf.method==='pickup' && !hf.pickup_date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (hf.method==='ship' && !hf.ship_addr.trim()) { toast('배송 주소를 입력해주세요'); return; }
  if (!hf.pay) { toast('결제 방법을 선택해주세요'); return; }
  let hwaSub = 0;
  const hwaSizeNames = [];
  CFG.hwa_sizes.forEach(function(s){ const q=hf.sizes[s.id]||0; if(q>0){hwaSub+=s.price*q; hwaSizeNames.push(s.name+' x'+q);} });
  let total = hwaSub;
  hf.packing.forEach(function(pid) {
    const p = CFG.hwa_packing.find(function(x){ return x.id===pid; });
    if (p) total += p.price;
  });
  if (hf.method==='ship') total += CFG.hwa_delivery_price;
  if (hf.method==='delivery') total += CFG.hwa_delivery_price;
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'h_'+Date.now(), type:'hwa',
      name:hf.name, phone:hf.phone,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      method:hf.method,
      pickup_date:hf.method==='pickup'?hf.pickup_date:hf.ship_date,

function resizeImage(file, maxW, maxH, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function addDesignPhotos(e) {
  const files = Array.from(e.target.files).slice(0, 3-(fd.photos||[]).length);
  let n = 0;
  if (!files.length) return;
  if (!fd.photos) fd.photos = [];
  files.forEach(function(f) {
    resizeImage(f, 1200, 1200, function(data) {
      fd.photos.push(data);
      if (++n === files.length) renderCake();
    });
  });
}

  resizeImage(file, 1200, 1200, function(data) {
    if (!CFG.size_photos) CFG.size_photos = {};
    const sizeId = CFG.sizes[idx].id;

    h += '<div class="dr"><div class="dk">설명<\/div><div class="dv"><textarea id="cfg_design_desc" style="border:none;outline:none;font-size:13px;font-family:inherit;color:#1c1c1e;background:transparent;width:100%;resize:none;height:50px;line-height:1.5;">'+(CFG.design_desc||'')+'<\/textarea><\/div><\/div>';

      if (photos.length < 3) {

    });
    h += '<\/div>';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
    h += '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.4px;">포장 옵션<\/div>';
    h += '<button onclick="addHwaPackingOption()" style="padding:4px 10px;border-radius:10px;background:rgba(58,90,122,0.08);border:none;color:#3a5a7a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;">+ 추가<\/button>';
    h += '<\/div>';
    h += '<div class="dl" style="margin-bottom:14px;">';
    CFG.hwa_packing.forEach(function(p,i) {
      h += '<div style="padding:12px 16px;border-bottom:0.5px solid rgba(60,60,67,0.1);">';
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;">';
      h += '<input id="cfg_hwa_pk_name_'+i+'" style="border:1px solid rgba(60,60,67,0.1);border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;color:#1c1c1e;background:#f2f2f7;width:120px;" value="'+p.name+'">';
      h += '<input id="cfg_hwa_pk_price_'+i+'" type="number" style="border:1px solid rgba(60,60,67,0.1);border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;color:#1c1c1e;background:#f2f2f7;width:70px;" value="'+p.price+'">';
      h += '<input id="cfg_hwa_pk_desc_'+i+'" style="border:1px solid rgba(60,60,67,0.1);border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;color:#1c1c1e;background:#f2f2f7;flex:1;min-width:100px;" placeholder="서브텍스트" value="'+(p.desc||'')+'">';
      h += '<button onclick="removeHwaPackingOption('+i+')" style="width:24px;height:24px;border-radius:50%;background:rgba(255,59,48,0.1);border:none;color:#cc2a22;font-size:14px;cursor:pointer;flex-shrink:0;">✕<\/button>';
      h += '<\/div>';
      h += '<input id="cfg_hwa_pk_popup_'+i+'" style="width:100%;border:1px solid rgba(60,60,67,0.1);border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;color:#1c1c1e;background:#f2f2f7;margin-bottom:8px;" placeholder="팝업 설명 문구" value="'+(p.popup_desc||'')+'">';
      h += '<div style="display:flex;gap:8px;align-items:center;">';
      if (p.photo) {
        h += '<div style="position:relative;"><img src="'+p.photo+'" style="width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid rgba(60,60,67,0.1);">';
        h += '<button onclick="removeHwaPkPhoto('+i+')" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:rgba(60,60,67,0.75);color:white;border:none;font-size:10px;cursor:pointer;">✕<\/button><\/div>';
      } else {
        h += '<label style="width:64px;height:64px;border-radius:8px;border:1.5px dashed rgba(60,60,67,0.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:#f2f2f7;"><span style="font-size:18px;color:#8e8e93;">+<\/span><span style="font-size:9px;color:#8e8e93;">팝업사진<\/span><input type="file" accept="image/*" style="display:none;" onchange="addHwaPkPhoto(event,'+i+')"><\/label>';
      }
      h += '<\/div><\/div>';
    });
    h += '<\/div>';
    h += '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;">택배비<\/div>';
    h += '<div class="dl" style="margin-bottom:14px;">';
    h += '<div class="dr"><div class="dk">택배비<\/div><div class="dv"><input id="cfg_hwa_delivery" type="number" style="border:none;outline:none;font-size:14px;font-family:inherit;color:#1c1c1e;background:transparent;width:100%;text-align:right;" value="'+CFG.hwa_delivery_price+'"><\/div><\/div>';
    h += '<\/div>';
    h += '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;">택배 포장 안내<\/div>';
    h += '<div class="dl" style="margin-bottom:14px;">';
    h += '<div class="dr" style="flex-direction:column;gap:8px;">';
    h += '<div style="font-size:12px;color:#8e8e93;font-weight:500;">설명 문구<\/div>';
    h += '<textarea id="cfg_ship_desc" style="width:100%;border:1px solid rgba(60,60,67,0.1);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#1c1c1e;background:#f2f2f7;resize:none;height:90px;outline:none;line-height:1.6;">'+(CFG.ship_packing_desc||'')+'<\/textarea>';
    h += '<div style="font-size:12px;color:#8e8e93;font-weight:500;">사진<\/div>';
    if (CFG.ship_packing_photo) {
      h += '<div style="position:relative;display:inline-block;"><img src="'+CFG.ship_packing_photo+'" style="width:120px;height:90px;border-radius:8px;object-fit:cover;border:1px solid rgba(60,60,67,0.1);">';
      h += '<button onclick="removeShipPackingPhoto()" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:rgba(60,60,67,0.75);color:white;border:none;font-size:10px;cursor:pointer;">✕<\/button><\/div>';
    } else {
      h += '<label style="width:120px;height:90px;border-radius:8px;border:1.5px dashed rgba(60,60,67,0.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:#f2f2f7;"><span style="font-size:22px;color:#8e8e93;">📦<\/span><span style="font-size:10px;color:#8e8e93;">사진 추가<\/span><input type="file" accept="image/*" style="display:none;" onchange="addShipPackingPhoto(event)"><\/label>';
    }
    h += '<\/div><\/div>';
    h += '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;">보관 방법<\/div>';
    h += '<div class="dl" style="margin-bottom:14px;">';
    CFG.hwa_storage.forEach(function(t,i) {
      h += '<div class="dr"><div class="dk">보관'+(i+1)+'<\/div><div class="dv"><input id="cfg_hwa_storage_'+i+'" style="border:none;outline:none;font-size:13px;font-family:inherit;color:#1c1c1e;background:transparent;width:100%;" value="'+t+'"><\/div><\/div>';
    });
    h += '<\/div>';
    h += '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;">주문 안내 문구<\/div>';
    h += '<div class="dl" style="margin-bottom:14px;">';
    h += '<div class="dr"><div class="dk">안내<\/div><div class="dv"><textarea id="cfg_hwa_notice" style="border:none;outline:none;font-size:13px;font-family:inherit;color:#1c1c1e;background:transparent;width:100%;resize:none;height:50px;line-height:1.5;">'+(CFG.hwa_notice||'')+'<\/textarea><\/div><\/div>';
    h += '<\/div>';
  }
  h += '<\/div>';
  h += '<div class="sh-act"><button class="sh-cls" onclick="closeSheet()">닫기<\/button><button class="sh-sav-'+(cfgTab==='cake'?'cake':'hwa')+'" onclick="saveSettingsFromForm()">저장<\/button><\/div>';
  showSheet(h);
}

async function saveSettingsFromForm() {
  const newCFG = Object.assign({}, CFG);
  if (cfgTab === 'cake') {
    newCFG.shop_name = document.getElementById('cfg_shop_name').value;
    newCFG.shop_phone = document.getElementById('cfg_phone').value;
    newCFG.bank_account = document.getElementById('cfg_account').value;
    newCFG.bank_holder = document.getElementById('cfg_holder').value;
    newCFG.pickup_notice = document.getElementById('cfg_pickup').value;
    newCFG.choco_price = parseInt(document.getElementById('cfg_choco') ? document.getElementById('cfg_choco').value : '3000')||3000;
    newCFG.delivery_price = parseInt(document.getElementById('cfg_delivery') ? document.getElementById('cfg_delivery').value : '5000')||5000;
    const optEls = CFG.extra_options || [];
    newCFG.extra_options = optEls.map(function(opt, oi) {
      return {
        id: opt.id || ('opt_'+oi),
        name: document.getElementById('cfg_opt_name_'+oi) ? document.getElementById('cfg_opt_name_'+oi).value : opt.name,
        price: parseInt(document.getElementById('cfg_opt_price_'+oi) ? document.getElementById('cfg_opt_price_'+oi).value : opt.price) || opt.price,
        desc: document.getElementById('cfg_opt_desc_'+oi) ? document.getElementById('cfg_opt_desc_'+oi).value : (opt.desc||''),
        active: true
      };
    });
    newCFG.design_desc = document.getElementById('cfg_design_desc') ? document.getElementById('cfg_design_desc').value : CFG.design_desc;
    newCFG.design_placeholder = document.getElementById('cfg_design_ph') ? document.getElementById('cfg_design_ph').value : CFG.design_placeholder;
    newCFG.sizes = CFG.sizes.map(function(s,i) {
      return {id:s.id, e:s.e, name:document.getElementById('cfg_sz_name_'+i).value, cm:document.getElementById('cfg_sz_cm_'+i).value, price:parseInt(document.getElementById('cfg_sz_price_'+i).value)||s.price};
    });
    newCFG.storage_tips = CFG.storage_tips.map(function(_,i){ return document.getElementById('cfg_storage_'+i).value; });
    newCFG.transport_tips = CFG.transport_tips.map(function(_,i){ return document.getElementById('cfg_transport_'+i).value; });
    newCFG.lets = CFG.lets.map(function(_,i){ return document.getElementById('cfg_let_'+i).value; });
  } else {
    newCFG.hwa_sizes = CFG.hwa_sizes.map(function(s,i) {
      return {id:s.id, name:document.getElementById('cfg_hwa_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_price_'+i).value)||s.price, desc:document.getElementById('cfg_hwa_desc_'+i).value};
    });
    newCFG.hwa_photos = CFG.hwa_photos || {};
    newCFG.hwa_packing = CFG.hwa_packing.map(function(p,i) {
      return {id:p.id, name:document.getElementById('cfg_hwa_pk_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_pk_price_'+i).value)||p.price, desc:document.getElementById('cfg_hwa_pk_desc_'+i)?document.getElementById('cfg_hwa_pk_desc_'+i).value:(p.desc||''), popup_desc:document.getElementById('cfg_hwa_pk_popup_'+i)?document.getElementById('cfg_hwa_pk_popup_'+i).value:(p.popup_desc||''), photo:p.photo||''};
    });
    newCFG.hwa_sizes = CFG.hwa_sizes.map(function(s,i) {
      return {id:s.id, name:document.getElementById('cfg_hwa_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_price_'+i).value)||s.price, desc:document.getElementById('cfg_hwa_desc_'+i).value};
    });
    newCFG.hwa_delivery_price = parseInt(document.getElementById('cfg_hwa_delivery').value)||4000;
    newCFG.hwa_storage = CFG.hwa_storage.map(function(_,i){ return document.getElementById('cfg_hwa_storage_'+i).value; });
    newCFG.hwa_notice = document.getElementById('cfg_hwa_notice').value;
    const shipDesc = document.getElementById('cfg_ship_desc');
    if (shipDesc) newCFG.ship_packing_desc = shipDesc.value;
    newCFG.ship_packing_photo = CFG.ship_packing_photo || '';
  }
  await saveSettings(newCFG);
  CFG = newCFG;
  toast('설정이 저장됐어요 ✅');
  closeSheet();
  if (IS_ADMIN) renderAdmin(); else { if(curTab==='cake') renderCake(); else renderHwa(); }
}

// ── 시작 ──
function render() {
  if (IS_ADMIN) renderAdmin();
  else { if (curTab==='cake') renderCake(); else renderHwa(); }
}

loadSettings().then(function(){ render(); }).catch(function(){ render(); });
</script>
