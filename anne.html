<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동탄 빨간머리앤 · 케이크 주문</title>
<style>
:root {
  --bg: #faf7f4;
  --bg2: #f0ebe4;
  --card: #ffffff;
  --text: #2c1f14;
  --text2: #9a8878;
  --text3: #c8bdb4;
  --sep: rgba(44,31,20,0.08);
  --r: 16px;
  --acc: #b07050;
  --acc2: rgba(176,112,80,0.08);
  --green: #34c759;
  --red: #ff3b30;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { background:#faf7f4; font-family:-apple-system,'Apple SD Gothic Neo',sans-serif; color:#2c1f14; -webkit-font-smoothing:antialiased; }

/* ── 헤더 ── */
.hdr { background:rgba(250,247,244,0.94); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-bottom:0.5px solid rgba(44,31,20,0.1); padding:54px 20px 0; position:sticky; top:0; z-index:50; }
.hdr-inner { max-width:480px; margin:0 auto; }
.hdr-top { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:12px; }
.hdr-eye { font-size:11px; font-weight:500; color:#c8bdb4; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.hdr-ttl { font-size:26px; font-weight:700; letter-spacing:-0.8px; }
.pill { font-size:12px; font-weight:600; padding:5px 13px; border-radius:20px; }
.pill-g { background:rgba(176,112,80,0.1); color:#b07050; }
.pill-a { background:#b07050; color:#fff; }

/* ── 레이아웃 ── */
.wrap { max-width:480px; margin:0 auto; padding:28px 0 110px; }

/* ── 섹션 ── */
.sec { margin-bottom:28px; }
.sec-hdr { font-size:11px; font-weight:600; color:#9a8878; letter-spacing:0.8px; text-transform:uppercase; padding:0 20px; margin-bottom:8px; }
.sec-foot { font-size:12px; color:#c8bdb4; padding:8px 20px 0; line-height:1.6; }

/* ── 카드 ── */
.card { background:#fff; border-radius:var(–r); margin:0 16px; overflow:hidden; box-shadow:0 1px 0 rgba(44,31,20,0.06),0 2px 8px rgba(44,31,20,0.04); }

/* ── 행 입력 ── */
.row { display:flex; align-items:center; padding:0 16px; min-height:52px; border-bottom:0.5px solid rgba(44,31,20,0.07); }
.row:last-child { border-bottom:none; }
.row-lbl { font-size:15px; min-width:72px; color:#2c1f14; }
.req { color:#ff3b30; font-size:11px; margin-left:2px; }
.inp { flex:1; border:none; outline:none; background:transparent; font-size:15px; font-family:inherit; color:#2c1f14; text-align:right; padding:14px 0; }
.inp::placeholder { color:#d4cdc8; }

/* ── 케이크 카드 ── */
.cake-card { background:#fff; border-radius:14px; margin:0 16px 10px; padding:16px; box-shadow:0 1px 0 rgba(44,31,20,0.06),0 2px 8px rgba(44,31,20,0.04); cursor:pointer; border:1.5px solid transparent; transition:all 0.18s; }
.cake-card.on { border-color:#b07050; background:rgba(176,112,80,0.05); }
.cake-card:active { transform:scale(0.98); }
.cake-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.cake-card-name { font-size:16px; font-weight:600; letter-spacing:-0.3px; }
.cake-card-desc { font-size:12px; color:#9a8878; margin-top:2px; line-height:1.5; }
.cake-card-tag { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; background:rgba(176,112,80,0.1); color:#b07050; }
.cake-card-tag-event { background:rgba(255,149,0,0.1); color:#b06800; }

/* ── 사이즈 칩 ── */
.sz-scroll { display:flex; gap:8px; overflow-x:auto; padding:4px 16px 6px; scrollbar-width:none; }
.sz-scroll::-webkit-scrollbar { display:none; }
.sz-chip { flex-shrink:0; padding:9px 18px; border-radius:22px; font-size:14px; font-weight:500; border:1.5px solid rgba(44,31,20,0.12); background:transparent; color:#2c1f14; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.sz-chip:active { transform:scale(0.96); }
.sz-chip.on { border-color:#b07050; background:rgba(176,112,80,0.08); color:#b07050; font-weight:600; }
.sz-chip.disabled { opacity:0.35; cursor:default; }

/* ── 맛 선택 ── */
.flavor-wrap { display:flex; gap:8px; padding:12px 16px; }
.flavor-btn { flex:1; padding:12px; border-radius:12px; border:1.5px solid rgba(44,31,20,0.12); background:transparent; color:#2c1f14; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; text-align:center; transition:all 0.15s; }
.flavor-btn.on { border-color:#b07050; background:rgba(176,112,80,0.08); color:#b07050; font-weight:600; }

/* ── 토글 ── */
.tog { display:flex; align-items:center; padding:14px 16px; border-bottom:0.5px solid rgba(44,31,20,0.07); gap:12px; min-height:54px; cursor:pointer; }
.tog:last-child { border-bottom:none; }
.tog-bd { flex:1; }
.tog-l { font-size:15px; color:#2c1f14; }
.tog-s { font-size:12px; color:#c8bdb4; margin-top:2px; }
.sw { width:51px; height:31px; border-radius:16px; background:rgba(120,120,128,0.14); position:relative; flex-shrink:0; transition:background 0.22s; }
.sw.on { background:#b07050; }
.sw-k { position:absolute; top:2px; left:2px; width:27px; height:27px; border-radius:50%; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.15); transition:transform 0.24s cubic-bezier(0.34,1.56,0.64,1); }
.sw.on .sw-k { transform:translateX(20px); }

/* ── 레터링 ── */
.lettering-wrap { padding:14px 16px; }
.lettering-input { width:100%; border:1.5px solid rgba(44,31,20,0.1); border-radius:12px; padding:12px 14px; font-size:15px; font-family:inherit; color:#2c1f14; background:#faf7f4; outline:none; resize:none; line-height:1.5; }
.lettering-input:focus { border-color:#b07050; }
.lettering-count { font-size:12px; color:#9a8878; margin-top:6px; text-align:right; }
.lettering-count.warn { color:#ff3b30; font-weight:600; }

/* ── 시간 칩 ── */
.time-chip { flex-shrink:0; padding:8px 14px; border-radius:22px; font-size:13px; font-weight:500; cursor:pointer; border:1.5px solid rgba(44,31,20,0.12); background:transparent; color:#2c1f14; white-space:nowrap; transition:all 0.15s; }
.time-chip.on { border-color:#b07050; background:rgba(176,112,80,0.08); color:#b07050; font-weight:600; }

/* ── 가격 ── */
.price-row { display:flex; justify-content:space-between; align-items:center; padding:13px 16px; border-bottom:0.5px solid rgba(44,31,20,0.07); }
.price-row:last-child { border-bottom:none; }
.pk { font-size:15px; color:#2c1f14; }
.pv { font-size:15px; color:#9a8878; }
.pkb { font-size:15px; font-weight:600; }
.pvb { font-size:17px; font-weight:700; color:#b07050; }

/* ── 결제 칩 ── */
.pay-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.pay-chip { padding:9px 18px; border-radius:22px; font-size:14px; font-weight:500; font-family:inherit; border:1.5px solid rgba(44,31,20,0.12); cursor:pointer; background:#faf7f4; color:#2c1f14; transition:all 0.15s; }
.pay-chip.on { background:#b07050; color:#fff; border-color:#b07050; }

/* ── 안내문구 ── */
.notice { background:#fff; border-radius:var(–r); padding:16px 18px; margin:0 16px; font-size:14px; color:#9a8878; line-height:1.75; box-shadow:0 1px 0 rgba(44,31,20,0.06),0 2px 8px rgba(44,31,20,0.04); }
.notice strong { color:#2c1f14; font-weight:600; }

/* ── 버튼 ── */
.btn-main { display:block; width:calc(100% - 32px); margin:0 16px; padding:17px; border-radius:14px; border:none; background:#b07050; color:#fff; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; letter-spacing:-0.3px; transition:opacity 0.15s,transform 0.12s; box-shadow:0 4px 16px rgba(176,112,80,0.3); }
.btn-main:active { opacity:.88; transform:scale(0.99); }

/* ── 오버레이/시트 ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200; display:none; align-items:flex-end; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.overlay.show { display:flex; }
.sheet { background:#faf7f4; border-radius:22px 22px 0 0; padding:0 0 44px; width:100%; animation:sheetUp 0.32s cubic-bezier(0.32,0.72,0,1); max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sh-hw { padding:12px 0 6px; text-align:center; }
.sh-h  { display:inline-block; width:36px; height:4px; border-radius:2px; background:rgba(44,31,20,0.15); }

/* ── 성공 ── */
.succ { text-align:center; padding:64px 24px 32px; }
.succ-ic { font-size:54px; margin-bottom:20px; }
.succ-t { font-size:24px; font-weight:700; letter-spacing:-0.5px; margin-bottom:8px; }
.succ-s { font-size:15px; color:#9a8878; line-height:1.7; margin-bottom:28px; }

/* ── 토스트 ── */
.toast { position:fixed; bottom:34px; left:50%; transform:translateX(-50%); background:rgba(44,31,20,0.9); color:#fff; padding:12px 22px; border-radius:22px; font-size:14px; font-weight:500; z-index:400; opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }

/* ── 어드민 주문카드 ── */
.order-card { background:#fff; border-radius:16px; margin:0 16px 10px; overflow:hidden; cursor:pointer; border-left:3px solid #b07050; box-shadow:0 1px 0 rgba(44,31,20,0.05),0 2px 12px rgba(44,31,20,0.05); transition:all 0.2s; }

/* ── 반응형 ── */
@media (min-width:768px) {
.wrap { max-width:600px; padding:32px 0 120px; }
.hdr { padding:56px 28px 0; }
.hdr-inner { max-width:600px; }
.card { margin:0 20px; }
.btn-main { width:calc(100% - 40px); margin:0 20px; }
}
@media (min-width:1024px) {
body { background:#ede8e0; }
.wrap { max-width:680px; }
.hdr-inner { max-width:680px; }
.overlay { align-items:center; justify-content:center; }
.sheet { border-radius:22px; max-width:600px; max-height:88vh; margin:0 auto; }
}
</style>

</head>

<script>
// ── Supabase ──
const SUPA = 'https://pithlzhuqezeesprcbze.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';

const IS_ADMIN = location.hash === '#admin-anne';

// ── API ──
async function api(path, method='GET', body=null) {
  const opts = { method, headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'} };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPA+path, opts);
}
async function getOrders() {
  const r = await api('/anne_orders?order=pickup_date.asc,pickup_time.asc');
  return r.ok ? r.json() : [];
}
async function addOrder(data) {
  return api('/anne_orders', 'POST', data);
}
async function updateOrder(id, data) {
  return api('/anne_orders?id=eq.'+id, 'PATCH', data);
}
async function delOrder(id) {
  return api('/anne_orders?id=eq.'+id, 'DELETE');
}

// ── CFG (Supabase cake_photos2 공유) ──
const DEFAULT_CFG = {
  shop_name: '동탄 빨간머리앤',
  shop_phone: '010-4228-9853',
  kakao_id: 'anne6139823',
  bank_account: '신한 110-360-768887',
  bank_holder: '최지윤',
  pickup_notice: '아침 9시 ~ 저녁 11시 픽업 가능 · 동시간대 케이크가 많으면 10~15분 늦어질 수 있어요',
  open_time: '09:00',
  close_time: '23:00',
  event_345_on: false,  // 이달의 케이크 345 이벤트
  event_notice: '미니 30,000원 / 1호 40,000원 / 2호 50,000원',
  menus: [
    { id:'fruit', name:'🍊 미니생과일', desc:'신선한 제철 과일 토핑', flavors:[], sizes:['미니'], prices:{미니:33000}, emoji:'🍊' },
    { id:'strawberry', name:'🍓 미니딸기', desc:'딸기 듬뿍 미니케이크', flavors:[], sizes:['미니'], prices:{미니:35000}, emoji:'🍓' },
    { id:'dome', name:'🌸 생화돔케이크', desc:'생화로 꾸민 돔형 케이크', flavors:['우유','딸기'], sizes:['미니','1호','2호'], prices:{우유:{미니:32000,'1호':43000,'2호':55000},딸기:{미니:36000,'1호':52000,'2호':65000}}, emoji:'🌸' },
    { id:'halmalhwa', name:'💬 할말은많은데케이크', desc:'미니 사이즈만 가능 · 레터링 특화', flavors:['우유','딸기'], sizes:['미니'], prices:{우유:{미니:32000},딸기:{미니:36000}}, emoji:'💬' },
    { id:'hydrangea', name:'💙 수국케이크', desc:'수국 꽃장식 · 1호까지 가능', flavors:['우유','딸기'], sizes:['미니','1호'], prices:{우유:{미니:33000,'1호':45000},딸기:{미니:38000,'1호':60000}}, emoji:'💙' },
  ],
  lettering_limit: { 미니:12, '1호':12, '2호':15, '3호':20 },
  payment_methods: ['계좌이체','지역화폐','카드'],
};

let CFG = {...DEFAULT_CFG};

async function loadCFG() {
  try {
    const r = await Promise.race([
      fetch(SUPA+'/cake_photos2?shop=eq.anne&select=cfg', {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}),
      new Promise(function(_, reject){ setTimeout(function(){ reject('timeout'); }, 4000); })
    ]);
    if (r.ok) {
      const arr = await r.json();
      if (arr.length && arr[0].cfg) CFG = Object.assign({}, DEFAULT_CFG, arr[0].cfg);
    }
  } catch(e) {
    // CFG 없으면 DEFAULT_CFG 그대로 사용
  }
}
async function saveCFG(newCFG) {
  const r = await fetch(SUPA+'/cake_photos2?shop=eq.anne', {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  const arr = r.ok ? await r.json() : [];
  if (arr.length) {
    await fetch(SUPA+'/cake_photos2?shop=eq.anne', {method:'PATCH', headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'}, body:JSON.stringify({cfg:newCFG})});
  } else {
    await fetch(SUPA+'/cake_photos2', {method:'POST', headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}, body:JSON.stringify({shop:'anne',cfg:newCFG})});
  }
}

// ── 전역 상태 ──
let fd = { name:'', phone:'', menu_id:'', size:'', flavor:'', lettering:'', candles:0, add_flower:false, add_choco:false, design_memo:'', pickup_date:'', pickup_time:'', payment:'', photos:[], done:false };
let adminOrders = [];
let adminSelDate = null;
let adminWeekOffset = 0;
let aFilter = 'all';
let curId = null;

// ── 유틸 ──
function W(h) { document.getElementById('wrap').innerHTML = h; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}
function showSheet(h) {
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').className = 'overlay show';
}
function closeSheet() { document.getElementById('overlay').className = 'overlay'; }

function pickTime(el) {
  fd.pickup_time = el.getAttribute('data-t');
  renderOrder();
}

function buildTimeChips(curVal) {
  const slots = [];
  const open = CFG.open_time || '09:00';
  const close = CFG.close_time || '23:00';
  for (let h = 9; h <= 23; h++) {
    for (let m = 0; m < 60; m += 30) {
      const t = (h<10?'0':'')+h+':'+(m===0?'00':m);
      if (t >= open && t <= close) slots.push(t);
    }
  }
  let html = '<div style="display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;">';
  slots.forEach(function(t) {
    const isOn = curVal === t;
    html += '<div data-t="'+t+'" onclick="pickTime(this)" class="time-chip'+(isOn?' on':'')+'">'+ t+'</div>';
  });
  html += '</div>';
  return html;
}

// ── 가격 계산 ──
function calcPrice() {
  if (!fd.menu_id) return 0;
  const menu = CFG.menus.find(function(m){ return m.id === fd.menu_id; });
  if (!menu) return 0;

  let base = 0;
  // 이벤트 345 적용
  if (CFG.event_345_on) {
    const ep = {미니:30000,'1호':40000,'2호':50000};
    base = ep[fd.size] || 0;
  } else if (!menu.flavors.length) {
    base = menu.prices[fd.size] || 0;
  } else {
    if (!fd.flavor || !fd.size) return 0;
    base = (menu.prices[fd.flavor] && menu.prices[fd.flavor][fd.size]) || 0;
  }

  // 계좌이체 선택 시 10% 할인
  if (base > 0 && fd.payment === '계좌이체') {
    return Math.floor(base * 0.9 / 100) * 100; // 100원 단위 절사
  }
  return base;
}

// ── 레터링 글자수 제한 ──
function getLetterLimit() {
  if (!fd.menu_id || !fd.size) return 99;
  // 할말은많은데: 고정+자유 합쳐서
  if (fd.menu_id === 'halmalhwa') return 18;
  return CFG.lettering_limit[fd.size] || 15;
}

// ── 주문서 렌더 ──
function renderOrder() {
  if (fd.done) { renderSuccess(); return; }

  const menu = CFG.menus.find(function(m){ return m.id === fd.menu_id; });
  const price = calcPrice();
  let h = '';

  // ── 안내 ──
  h += '<div class="sec"><div class="sec-hdr">안내</div>';
  h += '<div class="notice">';
  h += '<strong>📌 100% 주문제작 · 입금 후 제작 시작</strong><br>';
  h += '사전예약 시 10% 할인가 적용 · 당일 픽업은 정가 결제<br>';
  h += '아침 9시 ~ 저녁 11시 픽업 가능';
  if (CFG.event_345_on) {
    h += '<br><br><strong>🎉 이달의 케이크 345 이벤트</strong><br>'+CFG.event_notice;
  }
  h += '</div></div>';

  // ── 주문자 ──
  h += '<div class="sec"><div class="sec-hdr">주문자 <span class="req">*</span></div><div class="card">';
  h += '<div class="row"><div class="row-lbl">이름</div><input class="inp" placeholder="이름" value="'+fd.name+'" oninput="fd.name=this.value"></div>';
  h += '<div class="row"><div class="row-lbl">연락처</div><input class="inp" type="tel" placeholder="010-0000-0000" value="'+fd.phone+'" oninput="fd.phone=this.value"></div>';
  h += '</div></div>';

  // ── 케이크 선택 ──

function selectMenu(id) { fd.menu_id = id; fd.size = ‘’; fd.flavor = ‘’; renderOrder(); }
function selectSize(sz)  { fd.size = sz; renderOrder(); }
function selectFlavor(fl){ fd.flavor = fl; renderOrder(); }

function addPhoto(input) {
if (!input.files || !input.files[0]) return;
const file = input.files[0];
const reader = new FileReader();
reader.onload = function(e) {
if (!fd.photos) fd.photos = [];
fd.photos.push(e.target.result);
renderOrder();
};
reader.readAsDataURL(file);
}
function removePhoto(i) {
fd.photos.splice(i, 1);
renderOrder();
}

// ── 제출 ──
async function submitOrder() {
if (!fd.name.trim()) { toast(‘이름을 입력해주세요’); return; }
if (!fd.phone.trim()) { toast(‘연락처를 입력해주세요’); return; }
if (!fd.menu_id) { toast(‘케이크를 선택해주세요’); return; }
if (!fd.size) { toast(‘사이즈를 선택해주세요’); return; }
const menu = CFG.menus.find(function(m){ return m.id===fd.menu_id; });
if (menu && menu.flavors.length && !fd.flavor) { toast(‘맛을 선택해주세요’); return; }
if (!fd.pickup_date) { toast(‘픽업 날짜를 선택해주세요’); return; }
if (!fd.pickup_time) { toast(‘픽업 시간을 선택해주세요’); return; }
if (!fd.payment) { toast(‘결제 방법을 선택해주세요’); return; }

const price = calcPrice();
const btn = document.querySelector(’.btn-main’);
if (btn) { btn.disabled = true; btn.textContent = ‘제출 중…’; }

try {
const r = await addOrder({
name: fd.name.trim(),
phone: fd.phone.trim(),
cake_type: fd.menu_id,
cake_flavor: fd.flavor || null,
cake_size: fd.size,
lettering: fd.lettering || null,
candles: fd.candles || 0,
add_flower: fd.add_flower,
add_choco: fd.add_choco,
design_memo: fd.design_memo || null,
pickup_date: fd.pickup_date,
pickup_time: fd.pickup_time,
payment: fd.payment,
total_price: price,
photos: [],
status: ‘pending’,
is_event: CFG.event_345_on || false,
});
if (!r.ok) throw new Error();
fd.done = true;
renderSuccess();
} catch(e) {
toast(‘오류가 발생했어요. 다시 시도해주세요.’);
if (btn) { btn.disabled = false; btn.textContent = ‘주문서 제출하기’; }
}
}

function renderSuccess() {
W(’<div class="succ">’
+’<div class="succ-ic">🎂</div>’
+’<div class="succ-t">주문서가 전달됐어요!</div>’
+’<div class="succ-s">입금 후 확인 연락 주시면<br>예약이 완료됩니다 🌸<br><br>’
+’<strong>신한 110-360-768887 최지윤</strong><br>’
+‘입금 후 카카오톡 또는 문자로<br>입금자 성함 꼭 알려주세요!</div>’
+’<button class="btn-main" onclick="location.reload()">새 주문서 작성</button>’
+’</div>’);
}

function renderAdminView() {
const accent = ‘#b07050’;

const t = new Date();
adminSelDate = t.getFullYear()+’-’+String(t.getMonth()+1).padStart(2,‘0’)+’-’+String(t.getDate()).padStart(2,‘0’);
}

const selD = new Date(adminSelDate+‘T00:00:00’);
const dow = selD.getDay();
const mondayOffset = dow===0 ? -6 : 1-dow;
const weekStart = new Date(selD);
weekStart.setDate(selD.getDate()+mondayOffset+adminWeekOffset*7);

const weekDays = [];
for (let i=0;i<7;i++) {
const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);

h += ‘<div style="text-align:center;padding:72px 20px;">’;
h += ‘<div style="font-size:44px;margin-bottom:16px;">🎂</div>’;
h += ‘<div style="font-size:16px;font-weight:600;color:#2c1f14;margin-bottom:6px;">’+selLabel+’</div>’;
h += ‘<div style="font-size:14px;color:#c8bdb4;">주문이 없어요</div></div>’;
} else {
const sorted = tabOrders.slice().sort(function(a,b){return (a.pickup_time||’’).localeCompare(b.pickup_time||’’);});
sorted.forEach(function(o) {
const sc = {pending:{bg:‘rgba(255,149,0,0.1)’,c:’#b06800’,l:‘확인중’},confirmed:{bg:‘rgba(52,199,89,0.1)’,c:’#1a7a33’,l:‘예약확정’},done:{bg:‘rgba(44,31,20,0.07)’,c:’#8a837c’,l:‘픽업완료’},cancel:{bg:‘rgba(255,59,48,0.08)’,c:’#ff3b30’,l:‘취소’}}[o.status]||{bg:‘rgba(255,149,0,0.1)’,c:’#b06800’,l:‘확인중’};
const menu = CFG.menus.find(function(m){return m.id===o.cake_type;});
const menuName = menu ? menu.emoji+’ ‘+menu.name.replace(/[🍊🍓🌸💬💙]\s*/,’’) : o.cake_type;
h += ‘<div class="order-card" onclick="openOrder(\''+o.id+'\')">’;
h += ‘<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 14px 8px;">’;
h += ‘<div style="display:flex;align-items:center;gap:8px;">’;
h += ‘<div style="font-size:16px;font-weight:700;letter-spacing:-0.3px;">’+o.name+’</div>’;
if (o.pickup_time) h += ‘<div style="font-size:13px;color:#c8bdb4;font-weight:500;">’+o.pickup_time+’</div>’;
h += ‘</div>’;
h += ‘<div style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:'+sc.bg+';color:'+sc.c+';">’+sc.l+’</div>’;
h += ‘</div>’;
h += ‘<div style="padding:0 14px 10px;font-size:13px;color:#9a8878;line-height:1.7;">’+menuName+’ · ‘+o.cake_size+(o.cake_flavor?’ · ‘+o.cake_flavor:’’);
if (o.lettering) h += ‘<br>✏️ ‘+o.lettering;
h += ‘</div>’;
h += ‘<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:0.5px solid rgba(44,31,20,0.07);">’;
h += ‘<div style="font-size:13px;color:#c8bdb4;">’+o.phone+’</div>’;
h += ‘<div style="font-size:16px;font-weight:700;color:#b07050;letter-spacing:-0.3px;">’+(o.total_price||0).toLocaleString()+‘원</div>’;
h += ‘</div></div>’;
});
}
h += ‘<div style="height:40px;"></div>’;
W(h);
}

async function openOrder(id) {
const o = adminOrders.find(function(x){return x.id===id;});
if (!o) return;
curId = id;
const accent = ‘#b07050’;
const menu = CFG.menus.find(function(m){return m.id===o.cake_type;});
const menuName = menu ? menu.name : o.cake_type;
const statusList = [
{k:‘pending’,   l:‘확인중’,   bg:‘rgba(255,149,0,0.1)’,  c:’#b06800’},
{k:‘confirmed’, l:‘예약확정’, bg:‘rgba(52,199,89,0.1)’,  c:’#1a7a33’},
{k:‘done’,      l:‘픽업완료’, bg:‘rgba(0,122,255,0.1)’,  c:’#0060c7’},
{k:‘cancel’,    l:‘취소’,     bg:‘rgba(255,59,48,0.08)’, c:’#ff3b30’}
];

let h = ‘<div class="sh-hw"><div class="sh-h"></div></div>’;
h += ‘<div style="padding:8px 20px 14px;border-bottom:0.5px solid rgba(44,31,20,0.08);display:flex;align-items:flex-start;justify-content:space-between;">’;
h += ‘<div><div style="font-size:20px;font-weight:700;letter-spacing:-0.4px;">’+o.name+’</div><div style="font-size:13px;color:#9a8878;margin-top:2px;">’+o.phone+’</div></div>’;
h += ‘<div style="text-align:right;"><div style="font-size:22px;font-weight:700;color:'+accent+';letter-spacing:-0.5px;">’+(o.total_price||0).toLocaleString()+‘원</div>’+(o.is_event?’<div style="font-size:11px;color:#b06800;margin-top:2px;">345 이벤트 적용</div>’:’’)+’</div>’;
h += ‘</div>’;

// 상태
h += ‘<div style="padding:14px 16px 12px;border-bottom:0.5px solid rgba(44,31,20,0.08);">’;
h += ‘<div style="font-size:11px;font-weight:600;color:#c8bdb4;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:10px;">상태</div>’;
h += ‘<div style="display:flex;gap:7px;flex-wrap:wrap;">’;
statusList.forEach(function(s) {
const isOn = o.status===s.k;
h += ‘<button onclick="chgStatus(\''+id+'\',\''+s.k+'\')" style="padding:8px 16px;border-radius:22px;border:1.5px solid '+(isOn?s.c:'rgba(44,31,20,0.1)')+';background:'+(isOn?s.bg:'transparent')+';color:'+(isOn?s.c:'#9a8878')+';font-size:13px;font-weight:'+(isOn?'700':'500')+';font-family:inherit;cursor:pointer;">’+s.l+’</button>’;
});
h += ‘</div></div>’;

// 주문 정보
h += ‘<div style="padding:14px 16px 0;">’;
h += ‘<div style="font-size:11px;font-weight:600;color:#c8bdb4;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:10px;">주문 정보</div>’;
h += ‘<div style="background:#faf7f4;border-radius:14px;overflow:hidden;">’;
h += ‘<div style="display:flex;padding:11px 14px;border-bottom:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">픽업</div><div style="font-size:13px;font-weight:500;">’+o.pickup_date+’ ‘+o.pickup_time+’</div></div>’;
h += ‘<div style="display:flex;padding:11px 14px;border-bottom:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">케이크</div><div style="font-size:13px;font-weight:500;">’+menuName+’ · ‘+o.cake_size+(o.cake_flavor?’ · ‘+o.cake_flavor:’’)+’</div></div>’;
if (o.lettering) h += ‘<div style="display:flex;padding:11px 14px;border-bottom:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">레터링</div><div style="font-size:13px;font-weight:500;">’+o.lettering+’</div></div>’;
if (o.candles) h += ‘<div style="display:flex;padding:11px 14px;border-bottom:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">초</div><div style="font-size:13px;font-weight:500;">’+o.candles+‘개</div></div>’;
const opts = [o.add_flower?‘💐 생화 추가’:null, o.add_choco?‘🍫 초코시트’:null].filter(Boolean);
if (opts.length) h += ‘<div style="display:flex;padding:11px 14px;border-bottom:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">옵션</div><div style="font-size:13px;font-weight:500;">’+opts.join(’ · ‘)+’</div></div>’;
if (o.design_memo) h += ‘<div style="display:flex;padding:11px 14px;border-bottom:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">디자인</div><div style="font-size:13px;line-height:1.6;flex:1;">’+o.design_memo+’</div></div>’;
h += ‘<div style="display:flex;padding:11px 14px;"><div style="font-size:13px;color:#c8bdb4;min-width:64px;">결제</div><div style="font-size:13px;font-weight:500;">’+o.payment+’</div></div>’;
h += ‘</div></div>’;

// 메모
h += ‘<div style="padding:14px 16px 0;">’;
h += ‘<div style="font-size:11px;font-weight:600;color:#c8bdb4;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:8px;">메모</div>’;
h += ‘<textarea id="memoTa" style="width:100%;background:#faf7f4;border:none;border-radius:12px;padding:12px 14px;font-size:13px;font-family:inherit;color:#2c1f14;resize:none;height:72px;outline:none;line-height:1.5;" placeholder="내부 메모">’+(o.memo||’’)+’</textarea></div>’;

// 버튼
h += ‘<div style="display:flex;gap:10px;padding:14px 16px 0;">’;
h += ‘<button onclick="saveOrder(\''+id+'\')" style="flex:1;padding:14px;border-radius:14px;background:#b07050;border:none;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">저장하기</button>’;
h += ‘<button onclick="closeSheet()" style="padding:14px 18px;border-radius:14px;background:rgba(44,31,20,0.07);border:none;color:#9a8878;font-size:14px;font-family:inherit;cursor:pointer;">닫기</button>’;
h += ‘</div><div style="height:8px;"></div>’;

showSheet(h);
}

async function chgStatus(id, s) {
await updateOrder(id, {status:s});
const o = adminOrders.find(function(x){return x.id===id;});
if (o) o.status = s;
toast(‘상태 변경됐어요’);
openOrder(id);
renderAdminView();
}

async function saveOrder(id) {
const memo = document.getElementById(‘memoTa’);
await updateOrder(id, {memo: memo ? memo.value : ‘’});
const o = adminOrders.find(function(x){return x.id===id;});
if (o && memo) o.memo = memo.value;
toast(‘저장됐어요’);
closeSheet();
renderAdminView();
}

// ── 설정 ──
function showSettings() {
let h = ‘<div class="sh-hw"><div class="sh-h"></div></div>’;
h += ‘<div style="padding:8px 20px 14px;border-bottom:0.5px solid rgba(44,31,20,0.08);display:flex;align-items:center;justify-content:space-between;">’;
h += ‘<div style="font-size:17px;font-weight:600;">⚙️ 설정</div>’;
h += ‘<div onclick="closeSheet()" style="width:30px;height:30px;border-radius:50%;background:rgba(44,31,20,0.07);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#9a8878;">✕</div>’;
h += ‘</div>’;
h += ‘<div style="padding:16px 20px;">’;

// 345 이벤트 토글
h += ‘<div style="font-size:11px;font-weight:600;color:#c8bdb4;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">이달의 케이크 345 이벤트</div>’;
h += ‘<div style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 0 rgba(44,31,20,0.06);">’;
h += ‘<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(CFG.event_345_on?'12px':'0')+';">’;
h += ‘<div style="font-size:15px;font-weight:500;">이벤트 활성화</div>’;
h += ‘<div onclick="toggleEvent()" style="width:51px;height:31px;border-radius:16px;background:'+(CFG.event_345_on?'#b07050':'rgba(120,120,128,0.14)')+';position:relative;cursor:pointer;transition:background 0.22s;flex-shrink:0;">’;
h += ‘<div style="position:absolute;top:2px;left:'+(CFG.event_345_on?'22px':'2px')+';width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:left 0.24s;"></div></div>’;
h += ‘</div>’;
if (CFG.event_345_on) {
h += ‘<input id="eventNotice" style="width:100%;border:1.5px solid rgba(44,31,20,0.1);border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;background:#faf7f4;outline:none;" value="'+CFG.event_notice+'" placeholder="이벤트 안내 문구">’;
}
h += ‘</div>’;

// 운영 시간
h += ‘<div style="font-size:11px;font-weight:600;color:#c8bdb4;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">픽업 운영 시간</div>’;
h += ‘<div style="background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:16px;box-shadow:0 1px 0 rgba(44,31,20,0.06);display:flex;align-items:center;gap:10px;">’;
h += ‘<select id="openTime" style="flex:1;border:1px solid rgba(44,31,20,0.1);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;background:#faf7f4;text-align:center;">’;
for (let hh=6;hh<=23;hh++) for (let mm=0;mm<60;mm+=30) { const t=(hh<10?‘0’:’’)+hh+’:’+(mm===0?‘00’:mm); h += ‘<option value=”’+t+’”’+(CFG.open_time===t?’ selected’:’’)+’>’+t+’</option>’; }
h += ‘</select><span style="color:#c8bdb4;">~</span>’;
h += ‘<select id="closeTime" style="flex:1;border:1px solid rgba(44,31,20,0.1);border-radius:8px;padding:6px 10px;font-size:14px;font-family:inherit;background:#faf7f4;text-align:center;">’;
for (let hh=6;hh<=23;hh++) for (let mm=0;mm<60;mm+=30) { const t=(hh<10?‘0’:’’)+hh+’:’+(mm===0?‘00’:mm); h += ‘<option value=”’+t+’”’+(CFG.close_time===t?’ selected’:’’)+’>’+t+’</option>’; }
h += ‘</select></div>’;

h += ‘<div style="display:flex;justify-content:center;gap:10px;padding-top:4px;">’;
h += ‘<button onclick="closeSheet()" style="flex:1;max-width:140px;padding:14px;border-radius:14px;background:rgba(44,31,20,0.07);border:none;color:#9a8878;font-size:14px;font-family:inherit;cursor:pointer;">닫기</button>’;
h += ‘<button onclick="saveSettings()" style="flex:1;max-width:140px;padding:14px;border-radius:14px;background:#b07050;border:none;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">저장</button>’;
h += ‘</div>’;
h += ‘</div>’;
showSheet(h);
}

function toggleEvent() {
CFG.event_345_on = !CFG.event_345_on;
showSettings();
}

async function saveSettings() {
const openSel = document.getElementById(‘openTime’);
const closeSel = document.getElementById(‘closeTime’);
const eventNotice = document.getElementById(‘eventNotice’);
if (openSel) CFG.open_time = openSel.value;
if (closeSel) CFG.close_time = closeSel.value;
if (eventNotice) CFG.event_notice = eventNotice.value;
await saveCFG(CFG);
toast(‘저장됐어요 ✅’);
closeSheet();
}

// ── 초기화 ──
const pill = document.getElementById(‘modePill’);
pill.textContent = IS_ADMIN ? ‘사장님 🔑’ : ‘주문하기’;
pill.className = ’pill ’ + (IS_ADMIN ? ‘pill-a’ : ‘pill-g’);
if (IS_ADMIN) {
document.getElementById(‘settingsBtn’).style.display = ‘block’;
}

// 무조건 5초 안에 렌더링
var rendered = false;
function doRender() {
if (rendered) return;
rendered = true;
if (IS_ADMIN) renderAdmin();
else renderOrder();
}
setTimeout(doRender, 5000); // 최대 5초 대기
loadCFG().then(doRender).catch(doRender);
</script>
