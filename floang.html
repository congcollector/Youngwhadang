<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플로앙 · 앙금플라워 떡케이크 주문</title>
<style>
:root {
  --bg: #f5f2ef;
  --bg2: #ede8e3;
  --card: #ffffff;
  --text: #1a1714;
  --text2: #8a837c;
  --text3: #c4bdb7;
  --sep: rgba(50,40,35,0.08);
  --r: 16px;
  --accent: #7a4f3a;
  --accent2: rgba(122,79,58,0.07);
  --green: #34c759;
  --red: #ff3b30;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body {
  background:#f5f2ef;
  font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
  color:#1a1714;
  -webkit-font-smoothing:antialiased;
  font-size:16px;
}

/* ── 헤더 ── */
.hdr {
background:rgba(245,242,239,0.94);
backdrop-filter:blur(24px) saturate(1.8);
-webkit-backdrop-filter:blur(24px) saturate(1.8);
border-bottom:0.5px solid rgba(50,40,35,0.1);
padding:54px 20px 0;
position:sticky; top:0; z-index:50;
width:100%;
}
.hdr-inner {
max-width:480px; margin:0 auto;
}
.hdr-top { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:12px; }
.hdr-eye { font-size:11px; font-weight:500; color:#b8a99e; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.hdr-ttl { font-size:26px; font-weight:700; letter-spacing:-0.8px; color:#1a1714; }
.pill { font-size:12px; font-weight:600; padding:5px 13px; border-radius:20px; }
.pill-g { background:rgba(122,79,58,0.08); color:#7a4f3a; }
.pill-a { background:#7a4f3a; color:#fff; }
.hdr-tabs { display:flex; border-top:0.5px solid rgba(50,40,35,0.08); }
.hdr-tab {
flex:1; padding:12px 0; text-align:center;
font-size:14px; font-weight:500; color:#b8a99e;
border-bottom:2px solid transparent; cursor:pointer;
transition:color 0.2s, border-color 0.2s;
}
.hdr-tab.cake.on, .hdr-tab.on.cake {
color:#7a4f3a; border-bottom-color:#7a4f3a; font-weight:600;
}

/* ── 레이아웃 ── */
.wrap { max-width:480px; margin:0 auto; padding:28px 0 110px; }
.loading { text-align:center; padding:80px 20px; color:#b8a99e; font-size:15px; }

/* ── 섹션 ── */
.sec { margin-bottom:28px; }
.sec-hdr {
font-size:11px; font-weight:600; color:#b8a99e;
letter-spacing:0.8px; text-transform:uppercase;
padding:0 20px; margin-bottom:8px;
}

/* ── 카드 ── */
.card {
background:#fff;
border-radius:var(–r);
margin:0 16px;
overflow:hidden;
box-shadow:0 1px 0 rgba(50,40,35,0.06), 0 2px 8px rgba(50,40,35,0.04);
}

/* ── 행 입력 ── */
.row { display:flex; align-items:center; padding:0 16px; min-height:52px; border-bottom:0.5px solid rgba(50,40,35,0.07); }
.row:last-child { border-bottom:none; }
.row-lbl { font-size:15px; min-width:72px; color:#1a1714; font-weight:400; }
.req { color:#ff3b30; font-size:11px; margin-left:2px; }
.inp { flex:1; border:none; outline:none; background:transparent; font-size:15px; font-family:inherit; color:#1a1714; text-align:right; padding:14px 0; }
.inp::placeholder { color:#d4cdc8; }

/* ── 주문 안내 ── */
.notice {
background:#fff;
border-radius:var(–r);
padding:16px 18px;
margin:0 16px;
font-size:14px; color:#8a837c; line-height:1.75;
box-shadow:0 1px 0 rgba(50,40,35,0.06), 0 2px 8px rgba(50,40,35,0.04);
}
.notice strong { color:#1a1714; font-weight:600; }

/* ── 사이즈 슬라이드 ── */
.sz-scroll {
display:flex; gap:10px; overflow-x:auto;
padding:4px 16px 6px;
scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.sz-scroll::-webkit-scrollbar { display:none; }
.sz {
flex-shrink:0; width:124px;
background:#fff;
border-radius:14px;
padding:14px 12px; text-align:center;
border:1.5px solid transparent;
cursor:pointer;
transition:all 0.18s cubic-bezier(0.4,0,0.2,1);
box-shadow:0 1px 0 rgba(50,40,35,0.06), 0 2px 8px rgba(50,40,35,0.04);
}
.sz:active { transform:scale(0.97); }
.sz.on-cake {
border-color:#7a4f3a;
background:rgba(122,79,58,0.05);
}
.sz-e { font-size:24px; margin-bottom:7px; }
.sz-n { font-size:13px; font-weight:600; margin-bottom:2px; color:#1a1714; }
.sz-c { font-size:11px; color:#b8a99e; margin-bottom:7px; }
.sz-p { font-size:14px; font-weight:700; }
.sz-p-cake { color:#7a4f3a; }

/* ── 토글 스위치 ── */
.tog {
display:flex; align-items:center; padding:14px 16px;
border-bottom:0.5px solid rgba(50,40,35,0.07); gap:12px; min-height:54px;
}
.tog:last-child { border-bottom:none; }
.tog-bd { flex:1; }
.tog-l { font-size:15px; color:#1a1714; }
.tog-s { font-size:12px; color:#b8a99e; margin-top:2px; }
.sw {
width:51px; height:31px; border-radius:16px;
background:rgba(120,120,128,0.14);
position:relative; flex-shrink:0;
transition:background 0.22s; cursor:pointer;
}
.sw.on-cake { background:#7a4f3a; }
.sw-k {
position:absolute; top:2px; left:2px;
width:27px; height:27px; border-radius:50%;
background:#fff;
box-shadow:0 2px 6px rgba(0,0,0,0.15), 0 0.5px 1px rgba(0,0,0,0.1);
transition:transform 0.24s cubic-bezier(0.34,1.56,0.64,1);
}
.sw.on-cake .sw-k { transform:translateX(20px); }

/* ── 결제 칩 ── */
.pay-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.pc {
padding:9px 18px; border-radius:22px;
font-size:14px; font-weight:500; font-family:inherit;
border:1.5px solid rgba(50,40,35,0.12);
cursor:pointer; background:#f5f2ef; color:#1a1714;
transition:all 0.15s;
}
.pc:active { transform:scale(0.96); }
.pc.on-cake { background:#7a4f3a; color:#fff; border-color:#7a4f3a; }

/* ── 가격 ── */
.pr { display:flex; justify-content:space-between; align-items:center; padding:13px 16px; border-bottom:0.5px solid rgba(50,40,35,0.07); }
.pr:last-child { border-bottom:none; }
.pk { font-size:15px; color:#1a1714; }
.pv { font-size:15px; color:#b8a99e; }
.pkb { font-size:15px; font-weight:600; color:#1a1714; }
.pvb-cake { font-size:17px; font-weight:700; color:#7a4f3a; }

/* ── 버튼 ── */
.btn-cake {
display:block; width:calc(100% - 32px); margin:0 16px;
padding:17px; border-radius:14px; border:none;
background:#7a4f3a; color:#fff;
font-size:17px; font-weight:600; font-family:inherit;
cursor:pointer; letter-spacing:-0.3px;
transition:opacity 0.15s, transform 0.12s;
box-shadow:0 4px 16px rgba(122,79,58,0.25);
}
.btn-cake:active { opacity:0.88; transform:scale(0.99); }

/* ── 시트 ── */
.overlay {
position:fixed; inset:0;
background:rgba(0,0,0,0.3);
z-index:200; display:none; align-items:flex-end;
backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
}
.overlay.show { display:flex; }
.sheet {
background:#f5f2ef;
border-radius:22px 22px 0 0;
padding:0 0 44px; width:100%;
animation:sheetUp 0.32s cubic-bezier(0.32,0.72,0,1);
max-height:92vh; overflow-y:auto;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sh-hw { padding:12px 0 6px; text-align:center; }
.sh-h { display:inline-block; width:36px; height:4px; border-radius:2px; background:rgba(50,40,35,0.15); }
.sh-tw { padding:4px 20px 16px; border-bottom:0.5px solid rgba(50,40,35,0.08); }
.sh-t { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
.sh-s { font-size:13px; color:#b8a99e; margin-top:3px; }
.sh-act { display:flex; gap:10px; padding:16px 16px 0; }
.sh-del { flex:1; padding:14px; border-radius:14px; background:rgba(255,59,48,0.07); border:none; color:#ff3b30; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.sh-cls { flex:1; padding:14px; border-radius:14px; background:rgba(120,120,128,0.09); border:none; color:#8a837c; font-size:14px; font-family:inherit; cursor:pointer; }
.sh-sav-cake { flex:1; padding:14px; border-radius:14px; background:#7a4f3a; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }

/* ── 디테일 행 ── */
.dl { background:#fff; border-radius:var(–r); overflow:hidden; box-shadow:0 1px 0 rgba(50,40,35,0.06); }
.dr { display:flex; padding:12px 16px; border-bottom:0.5px solid rgba(50,40,35,0.07); gap:12px; }
.dr:last-child { border-bottom:none; }
.dk { font-size:13px; color:#b8a99e; min-width:64px; padding-top:1px; }
.dv { font-size:14px; flex:1; line-height:1.5; }

/* ── 상태 배지 ── */
.badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }
.b-pending { background:rgba(255,149,0,0.1); color:#b06800; }
.b-confirmed { background:rgba(52,199,89,0.1); color:#1a7a33; }
.b-done { background:rgba(0,122,255,0.1); color:#0060c7; }
.b-cancel { background:rgba(255,59,48,0.1); color:#ff3b30; }

/* ── 어드민 통계 ── */
.stat { flex:1; background:#fff; border-radius:14px; padding:14px 10px; text-align:center; box-shadow:0 1px 0 rgba(50,40,35,0.06), 0 2px 8px rgba(50,40,35,0.04); }
.stat-n { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.stat-l { font-size:11px; color:#b8a99e; margin-top:3px; font-weight:500; }

/* ── 필터 칩 ── */
.flt { display:flex; gap:7px; overflow-x:auto; padding:0 16px; margin-bottom:14px; scrollbar-width:none; }
.flt::-webkit-scrollbar { display:none; }
.fc {
padding:7px 15px; border-radius:22px;
font-size:13px; font-weight:500;
background:#fff; color:#8a837c;
white-space:nowrap; cursor:pointer;
border:none; font-family:inherit; flex-shrink:0;
transition:all 0.15s;
box-shadow:0 1px 0 rgba(50,40,35,0.06);
}
.fc.on-cake { background:#7a4f3a; color:#fff; }

/* ── 주문 카드 ── */
.order-card-cake {
background:#fff; border-radius:var(–r);
margin:0 16px 10px; overflow:hidden; cursor:pointer;
border-left:3px solid #7a4f3a;
box-shadow:0 1px 0 rgba(50,40,35,0.06), 0 2px 8px rgba(50,40,35,0.04);
transition:box-shadow 0.2s;
}
.order-card-cake:active { box-shadow:0 1px 2px rgba(50,40,35,0.08); }
.order-price-cake { font-size:16px; font-weight:700; color:#7a4f3a; }

/* ── 세그먼트 탭 ── */
.seg-btn {
flex:1; padding:9px 0; border:none; border-radius:11px;
font-size:14px; font-family:inherit; cursor:pointer;
transition:all 0.18s cubic-bezier(0.4,0,0.2,1);
letter-spacing:-0.2px;
}

/* ── 아코디언 ── */
.acc-row {
display:flex; align-items:center; padding:15px 16px;
cursor:pointer; gap:12px; min-height:52px;
}
.arr { font-size:14px; color:#c4bdb7; transition:transform 0.22s; flex-shrink:0; }
.arr.open { transform:rotate(90deg); }
.acc-bd { padding:4px 16px 14px 52px; border-top:0.5px solid rgba(50,40,35,0.07); }
.acc-it { font-size:13px; color:#8a837c; line-height:1.9; padding:1px 0; }
.acc-icon-cake {
width:30px; height:30px; border-radius:8px;
background:rgba(122,79,58,0.08);
display:flex; align-items:center; justify-content:center;
font-size:12px; flex-shrink:0; color:#7a4f3a; font-weight:600;
}

/* ── 수량 버튼 ── */
.qty-btn-cake {
width:26px; height:26px; border-radius:50%;
border:1.5px solid #7a4f3a;
font-size:16px; cursor:pointer;
display:flex; align-items:center; justify-content:center;
line-height:1; transition:all 0.12s;
}
.qty-btn-cake:active { transform:scale(0.92); }
.qty-btn-minus-cake { background:transparent; color:#7a4f3a; }
.qty-btn-plus-cake { background:#7a4f3a; color:#fff; border-color:#7a4f3a; }
.qty-num-cake { font-size:14px; font-weight:700; color:#7a4f3a; min-width:16px; text-align:center; }

/* ── 옵션 칩 ── */
.opt-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.opt-chip {
padding:9px 16px; border-radius:22px;
font-size:14px; font-weight:500; font-family:inherit;
border:1.5px solid rgba(50,40,35,0.12);
cursor:pointer; background:#f5f2ef; color:#1a1714;
transition:all 0.15s;
}
.opt-chip:active { transform:scale(0.96); }
.opt-chip.on-cake { background:#7a4f3a; color:#fff; border-color:#7a4f3a; }

/* ── 레터링 칩 ── */
.lc { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.lc-btn-cake {
padding:7px 13px; border-radius:22px;
border:1.5px solid rgba(122,79,58,0.18);
background:rgba(122,79,58,0.05); color:#7a4f3a;
font-size:12px; font-family:inherit; cursor:pointer;
line-height:1.5; transition:all 0.15s;
}
.lc-btn-cake.on { background:#7a4f3a; color:#fff; border-color:#7a4f3a; }

/* ── 성공 화면 ── */
.succ { text-align:center; padding:64px 24px 32px; }
.succ-ic { font-size:54px; margin-bottom:20px; }
.succ-t { font-size:24px; font-weight:700; letter-spacing:-0.5px; margin-bottom:8px; }
.succ-s { font-size:15px; color:#8a837c; line-height:1.7; margin-bottom:28px; }

/* ── 토스트 ── */
.toast {
position:fixed; bottom:34px; left:50%; transform:translateX(-50%);
background:rgba(26,23,20,0.9); color:#fff;
padding:12px 22px; border-radius:22px;
font-size:14px; font-weight:500; z-index:400;
opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap;
backdrop-filter:blur(8px);
}
.toast.show { opacity:1; }

/* ── 빈 화면 ── */
.empty { text-align:center; padding:64px 20px; color:#b8a99e; }

/* ── 상태 버튼 ── */
.status-btn { padding:13px; border-radius:14px; font-size:14px; font-family:inherit; cursor:pointer; transition:all 0.15s; }
.status-btn-on-p { border:2px solid #b06800; background:rgba(255,149,0,0.08); color:#b06800; font-weight:600; }
.status-btn-off-p { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.status-btn-on-c { border:2px solid #1a7a33; background:rgba(52,199,89,0.08); color:#1a7a33; font-weight:600; }
.status-btn-off-c { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.status-btn-on-d { border:2px solid #0060c7; background:rgba(0,122,255,0.08); color:#0060c7; font-weight:600; }
.status-btn-off-d { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.status-btn-on-x { border:2px solid #ff3b30; background:rgba(255,59,48,0.08); color:#ff3b30; font-weight:600; }
.status-btn-off-x { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.save-btn-cake { flex:2; padding:14px; border-radius:14px; background:#7a4f3a; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.cfg-save-cake { flex:1; padding:13px; border-radius:14px; background:#7a4f3a; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.pill-btn { padding:7px 15px; border-radius:22px; font-size:13px; white-space:nowrap; cursor:pointer; border:none; font-family:inherit; flex-shrink:0; transition:all 0.15s; }
.btn-active-cake { background:#7a4f3a !important; color:#fff !important; font-weight:600 !important; }
.btn-inactive { background:transparent; color:#8a837c; font-weight:400; }
.btn-inactive-w { background:#fff; color:#8a837c; font-weight:400; }
.memo-ta { width:100%; background:#fff; border:none; border-radius:var(–r); padding:13px 14px; font-size:14px; font-family:inherit; color:#1a1714; resize:none; height:80px; outline:none; line-height:1.5; }

/* ── 어드민 탭 ── */
.adm-tab { flex:1; padding:9px; border-radius:11px; border:none; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; text-align:center; transition:all 0.18s; }
.adm-tab-cake { background:rgba(122,79,58,0.07); color:#7a4f3a; }
.adm-tab-cake.on { background:#7a4f3a; color:#fff; }

/* ── 설정 탭 ── */
.cfg-tabs { display:flex; border-bottom:0.5px solid rgba(50,40,35,0.08); margin-bottom:16px; }
.cfg-tab { flex:1; padding:12px 0; text-align:center; font-size:14px; font-weight:500; color:#b8a99e; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
.cfg-tab-cake.on { color:#7a4f3a; border-bottom-color:#7a4f3a; }

/* ── 반응형 ── */

/* 태블릿 세로 (768px+) */
@media (min-width: 768px) {
.wrap { max-width:600px; padding:32px 0 120px; }
.hdr { padding:56px 28px 0; }
.hdr-inner { max-width:600px; }
.hdr-ttl { font-size:28px; }
.card { margin:0 20px; }
.sz-scroll { padding:4px 20px 6px; }
.sz { width:140px; }
.sec-hdr { padding:0 24px; }
.btn-cake { width:calc(100% - 40px); margin:0 20px; padding:18px; font-size:18px; }
.notice { margin:0 20px; }
.pay-wrap { padding:16px 20px; }
.opt-wrap { padding:16px 20px; }
.flt { padding:0 20px; }
.order-card-cake { margin:0 20px 10px; }
}

/* 태블릿 가로 / 작은 데스크탑 (1024px+) */
@media (min-width: 1024px) {
body { background:#ede8e3; }
.wrap { max-width:680px; padding:40px 0 120px; }
.hdr { padding:48px 32px 0; }
.hdr-inner { max-width:680px; }
.hdr-ttl { font-size:28px; }
.card { margin:0 24px; border-radius:18px; }
.sz { width:148px; padding:16px 14px; }
.sz-scroll { padding:4px 24px 6px; gap:12px; }
.sec-hdr { padding:0 28px; font-size:12px; }
.btn-cake { width:calc(100% - 48px); margin:0 24px; border-radius:16px; }
.notice { margin:0 24px; border-radius:18px; }
.row { min-height:54px; }
.overlay { align-items:center; justify-content:center; }
.sheet {
border-radius:22px;
max-width:600px;
width:100%;
max-height:88vh;
margin:0 auto;
animation:sheetFade 0.22s ease;
}
@keyframes sheetFade { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
.flt { padding:0 24px; }
.order-card-cake { margin:0 24px 10px; border-radius:18px; }
.stats { padding:0 24px; }
.adm-tabs { padding:0 24px; }
}

/* 데스크탑 (1280px+) */
@media (min-width: 1280px) {
.wrap { max-width:720px; }
.hdr-inner { max-width:720px; }
.sheet { max-width:640px; }
.sz { width:156px; }
}
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-inner"><div class="hdr-top">
    <div>
      <div class="hdr-eye" id="hdrEye">Floang · 방배동 앙금플라워</div>
      <div class="hdr-ttl" id="hdrTtl">🌸 케이크 주문</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="pill" id="modePill"></div>
      <button id="settingsBtn" style="display:none;padding:6px 12px;border-radius:20px;background:rgba(139,74,74,0.1);border:none;color:#8b4a4a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;" onclick="showSettings()">⚙️</button>
    </div>
  </div>
  <div class="hdr-tabs" id="hdrTabs">
    <div class="hdr-tab cake on" onclick="switchTab('cake')">떡케이크</div>

async function submitCake() {
  if (!fd.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!fd.phone.trim()) { toast('전화번호를 입력해주세요'); return; }
  if (!fd.date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (!fd.time) { toast('픽업 시간을 선택해주세요'); return; }
  const hasSel = fd.sizes && Object.keys(fd.sizes).some(function(k){ return fd.sizes[k]>0; });
  if (!hasSel) { toast('케이크 사이즈를 선택해주세요'); return; }
  if (!fd.style) { toast('스타일을 선택해주세요'); return; }
  if (!fd.taste) { toast('맛을 선택해주세요'); return; }
  if (!fd.pay) { toast('결제 방법을 선택해주세요'); return; }
  let cakeSub = 0;
  const sizeNames = [];
  CFG.sizes.forEach(function(s){ const q=fd.sizes[s.id]||0; if(q>0){cakeSub+=s.price*q; sizeNames.push(s.name+' x'+q);} });
  const total = cakeSub + (fd.choco?CFG.choco_price:0) + (fd.method==='delivery'?CFG.delivery_price:0);
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'c_'+Date.now(), type:'cake',
      name:fd.name, phone:fd.phone,
      pickup_date:fd.date, pickup_time:fd.time,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      design:(fd.style?'스타일:'+fd.style+' / ':'')+( fd.taste?'맛:'+fd.taste+' / ':'')+( fd.design||''), lettering:'',
      payment:fd.pay, choco_deco:fd.choco,
      delivery:fd.method==='delivery', delivery_addr:fd.method==='delivery'?fd.addr||'':'',
      total_price:total, status:'pending', memo:'',
      photos:JSON.stringify(fd.photos||[]),
      created_at:Date.now()
    });
    fd.done = true; renderCake();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderCake(); }
}

function togglePacking(pid) {
  const idx = hf.packing.indexOf(pid);
  if (idx >= 0) hf.packing.splice(idx,1); else hf.packing.push(pid);
  renderHwa();
}

function renderHwaSuccess() {

async function submitHwa() {
  if (!hf.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!hf.phone.trim()) { toast('연락처를 입력해주세요'); return; }
  const hasHwaSel = hf.sizes && Object.keys(hf.sizes).some(function(k){ return hf.sizes[k]>0; });
  if (!hasHwaSel) { toast('화과자 수량을 선택해주세요'); return; }
  if (hf.method==='pickup' && !hf.pickup_date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (hf.method==='ship' && !hf.ship_addr.trim()) { toast('배송 주소를 입력해주세요'); return; }
  if (!hf.pay) { toast('결제 방법을 선택해주세요'); return; }
  let hwaSub = 0;
  const hwaSizeNames = [];
  CFG.hwa_sizes.forEach(function(s){ const q=hf.sizes[s.id]||0; if(q>0){hwaSub+=s.price*q; hwaSizeNames.push(s.name+' x'+q);} });
  let total = hwaSub;
  hf.packing.forEach(function(pid) {
    const p = CFG.hwa_packing.find(function(x){ return x.id===pid; });
    if (p) total += p.price;
  });
  if (hf.method==='ship') total += CFG.hwa_delivery_price;
  if (hf.method==='delivery') total += CFG.hwa_delivery_price;
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'h_'+Date.now(), type:'hwa',
      name:hf.name, phone:hf.phone,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      method:hf.method,
      pickup_date:hf.method==='pickup'?hf.pickup_date:hf.ship_date,
      pickup_time:hf.pickup_time||'',
      delivery_addr:hf.method==='ship'?hf.ship_addr:'',
      packing:JSON.stringify(hf.packing),
      packing_text:hf.packing_text||'',
      payment:hf.pay,
      total_price:total, status:'pending', memo:'',
      created_at:Date.now()
    });
    hf.done = true; renderHwa();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderHwa(); }
}

async function renderAdmin() {
  W('<div class="loading">불러오는 중...</div>');
  try {
    adminOrders = await getOrders('cake');
    if (!Array.isArray(adminOrders)) adminOrders = [];
  } catch(e) { adminOrders = []; }
  renderAdminView();
}

function renderAdminView() {
  const orders = adminOrders;

  // 선택된 날짜 기본값: 오늘
  if (!adminSelDate) {
    const t = new Date();
    adminSelDate = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  }

  // 주간 날짜 계산
  const selD = new Date(adminSelDate+'T00:00:00');
  const dow = selD.getDay(); // 0=일
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const weekStart = new Date(selD);
  weekStart.setDate(selD.getDate() + mondayOffset + adminWeekOffset * 7);

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    weekDays.push({ date: ds, day: d, label: ['일','월','화','수','목','금','토'][d.getDay()] });
  }

  const today = (function(){ const t=new Date(); return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); })();

  // 선택된 날짜의 주문
  const dayOrders = orders.filter(function(o){ return o.pickup_date === adminSelDate; });
  const tabOrders = adminTab === 'all' ? dayOrders
    : dayOrders.filter(function(o){ return o.status === adminTab; });

  // 날짜별 주문 수 맵
  const orderCountMap = {};
  orders.forEach(function(o){
    if (!orderCountMap[o.pickup_date]) orderCountMap[o.pickup_date] = 0;
    orderCountMap[o.pickup_date]++;
  });

  const monthLabel = (selD.getMonth()+1)+'월';
  const weekTotalCount = weekDays.reduce(function(s,d){ return s+(orderCountMap[d.date]||0); }, 0);

  let h = '';

  // ── 주간 캘린더 헤더 ──
  h += '<div style="background:rgba(245,242,239,0.96);position:sticky;top:52px;z-index:40;border-bottom:0.5px solid rgba(50,40,35,0.1);">';

  // 월 + 주 이동
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;">';
  h += '<div style="display:flex;align-items:center;gap:12px;">';
  h += '<button onclick="adminWeekOffset--;renderAdminView()" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(50,40,35,0.07);color:#1a1714;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">‹<\/button>';
  h += '<div style="font-size:17px;font-weight:700;letter-spacing:-0.3px;">'+monthLabel+'<\/div>';
  h += '<button onclick="adminWeekOffset++;renderAdminView()" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(50,40,35,0.07);color:#1a1714;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">›<\/button>';
  h += '<\/div>';
  h += '<div style="font-size:12px;color:#b8a99e;">이번주 '+weekTotalCount+'건<\/div>';
  h += '<\/div>';

  // 주간 날짜 칸
  h += '<div style="display:flex;padding:0 8px 12px;gap:4px;">';
  weekDays.forEach(function(d) {
    const isToday = d.date === today;
    const isSel = d.date === adminSelDate;
    const cnt = orderCountMap[d.date] || 0;
    const bg = isSel ? '#7a4f3a' : 'transparent';
    const textColor = isSel ? '#fff' : (isToday ? '#7a4f3a' : '#1a1714');
    const labelColor = isSel ? 'rgba(255,255,255,0.65)' : '#b8a99e';

    h += '<div onclick="adminSelDate=\''+d.date+'\';adminTab=\'all\';renderAdminView()" style="flex:1;text-align:center;padding:7px 2px;border-radius:12px;cursor:pointer;background:'+bg+';transition:all 0.15s;">';
    h += '<div style="font-size:10px;color:'+labelColor+';margin-bottom:3px;font-weight:500;pointer-events:none;">'+d.label+'<\/div>';
    h += '<div style="font-size:17px;font-weight:700;color:'+textColor+';pointer-events:none;">'+d.day.getDate()+'<\/div>';
    if (cnt > 0) {
      h += '<div style="width:5px;height:5px;border-radius:50%;background:'+(isSel?'rgba(255,255,255,0.6)':'#7a4f3a')+';margin:3px auto 0;pointer-events:none;"><\/div>';
    } else {
      h += '<div style="width:5px;height:5px;margin:3px auto 0;pointer-events:none;"><\/div>';
    }
    h += '<\/div>';
  });
  h += '<\/div>';

  // 상태 탭
  const pendingCnt = dayOrders.filter(function(o){return o.status==='pending';}).length;
  const confirmedCnt = dayOrders.filter(function(o){return o.status==='confirmed';}).length;
  const doneCnt = dayOrders.filter(function(o){return o.status==='done';}).length;

  h += '<div style="display:flex;border-top:0.5px solid rgba(50,40,35,0.08);">';
  [
    {k:'all', l:'전체', cnt:dayOrders.length},
    {k:'pending', l:'확인중', cnt:pendingCnt},
    {k:'confirmed', l:'예약확정', cnt:confirmedCnt},
    {k:'done', l:'픽업완료', cnt:doneCnt}
  ].forEach(function(t) {
    const isOn = adminTab === t.k;
    h += '<div onclick="adminTab=\''+t.k+'\';renderAdminView()" style="flex:1;text-align:center;padding:10px 0;font-size:12px;font-weight:'+(isOn?'700':'500')+';color:'+(isOn?'#7a4f3a':'#b8a99e')+';border-bottom:2px solid '+(isOn?'#7a4f3a':'transparent')+';cursor:pointer;transition:all 0.15s;">';
    h += t.l+(t.cnt>0?' '+t.cnt:'');
    h += '<\/div>';
  });
  h += '<\/div><\/div>';

  // ── 날짜 헤더 ──
  const selDateObj = new Date(adminSelDate+'T00:00:00');
  const dayNames = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const selDateLabel = (selDateObj.getMonth()+1)+'월 '+selDateObj.getDate()+'일 '+dayNames[selDateObj.getDay()];
  const isSelToday = adminSelDate === today;

  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px;">';
  h += '<div style="font-size:17px;font-weight:700;letter-spacing:-0.3px;">'+selDateLabel+'<\/div>';
  h += '<div style="display:flex;align-items:center;gap:8px;">';
  if (isSelToday) h += '<div style="background:#7a4f3a;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;">오늘<\/div>';
  if (tabOrders.length > 0) h += '<div style="background:rgba(122,79,58,0.1);color:#7a4f3a;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;">'+tabOrders.length+'건<\/div>';
  h += '<\/div><\/div>';

  // ── 주문 목록 ──
  if (tabOrders.length === 0) {
    h += '<div style="text-align:center;padding:60px 20px;">';
    h += '<div style="font-size:36px;margin-bottom:12px;">🌸<\/div>';
    h += '<div style="font-size:15px;color:#b8a99e;">'+selDateLabel+'<br>주문이 없어요<\/div>';
    h += '<\/div>';
  } else {
    // 픽업 시간순 정렬
    const sorted = tabOrders.slice().sort(function(a,b){
      return (a.pickup_time||'').localeCompare(b.pickup_time||'');
    });

    sorted.forEach(function(o) {
      const statusColors = {
        pending: {bg:'rgba(255,149,0,0.1)', c:'#b06800', l:'확인중'},
        confirmed: {bg:'rgba(52,199,89,0.1)', c:'#1a7a33', l:'예약확정'},
        done: {bg:'rgba(50,40,35,0.07)', c:'#8a837c', l:'픽업완료'},
        cancel: {bg:'rgba(255,59,48,0.08)', c:'#ff3b30', l:'취소'}
      };
      const sc = statusColors[o.status] || statusColors.pending;

      h += '<div style="background:#fff;border-radius:16px;margin:0 16px 10px;overflow:hidden;cursor:pointer;border-left:3px solid #7a4f3a;box-shadow:0 1px 0 rgba(50,40,35,0.06),0 2px 8px rgba(50,40,35,0.04);" onclick="openOrder(\''+o.id+'\')">';

      // 상단: 이름 + 시간 + 상태
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 14px 8px;">';
      h += '<div style="display:flex;align-items:center;gap:8px;">';
      h += '<div style="font-size:16px;font-weight:700;">'+o.name+'<\/div>';
      if (o.pickup_time) h += '<div style="font-size:13px;color:#b8a99e;font-weight:500;">'+o.pickup_time+'<\/div>';
      h += '<\/div>';
      h += '<div style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:'+sc.bg+';color:'+sc.c+';">'+sc.l+'<\/div>';
      h += '<\/div>';

      // 주문 핵심 정보
      const designInfo = o.design || '';
      h += '<div style="padding:0 14px 10px;font-size:13px;color:#8a837c;line-height:1.7;">'+o.cake_size;
      if (designInfo) h += '<br>'+designInfo;
      h += '<\/div>';

      // 하단: 연락처 + 금액
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:0.5px solid rgba(50,40,35,0.07);">';
      h += '<div style="font-size:13px;color:#b8a99e;">'+o.phone+'<\/div>';
      h += '<div style="font-size:16px;font-weight:700;color:#7a4f3a;">'+(o.total_price||0).toLocaleString()+'원<\/div>';
      h += '<\/div><\/div>';
    });
  }

  // 하단 여백
  h += '<div style="height:40px;"><\/div>';
  W(h);
}

function resizeImage(file, maxW, maxH, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 드래그 정렬
function initDragSort(listId, itemClass) {
  const list = document.getElementById(listId);
  if (!list) return;
  let dragEl = null;
  let touchStartY = 0;
  let touchEl = null;

  list.querySelectorAll('.'+itemClass).forEach(function(item) {
    // 마우스 드래그
    item.addEventListener('dragstart', function(e) {
      dragEl = item;
      setTimeout(function(){ item.style.opacity='0.4'; }, 0);
    });
    item.addEventListener('dragend', function() {
      item.style.opacity='1';
      dragEl = null;
    });
    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (!dragEl || dragEl === item) return;
      const rect = item.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      if (e.clientY < mid) {
        list.insertBefore(dragEl, item);
      } else {
        list.insertBefore(dragEl, item.nextSibling);
      }
    });

    // 터치 드래그 (모바일)
    item.addEventListener('touchstart', function(e) {
      touchEl = item;
      touchStartY = e.touches[0].clientY;
      setTimeout(function(){ item.style.background='rgba(122,79,58,0.05)'; }, 200);
    }, {passive:true});
    item.addEventListener('touchmove', function(e) {
      if (!touchEl) return;
      const y = e.touches[0].clientY;
      const items = list.querySelectorAll('.'+itemClass);
      items.forEach(function(other) {
        if (other === touchEl) return;
        const rect = other.getBoundingClientRect();
        const mid = rect.top + rect.height/2;
        if (y > rect.top && y < rect.bottom) {
          if (y < mid) list.insertBefore(touchEl, other);
          else list.insertBefore(touchEl, other.nextSibling);
        }
      });
    }, {passive:true});
    item.addEventListener('touchend', function() {
      if (touchEl) touchEl.style.background='#fff';
      touchEl = null;
    });
  });
}

function addCfgSzPhoto(i, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    if (!CFG.size_photos) CFG.size_photos = {};
    const id = CFG.sizes[i].id;

    if (CFG.size_photos[id].length < 3) {
      CFG.size_photos[id].push(e.target.result);
      showSettings();

  };
  reader.readAsDataURL(file);
}
function removeCfgSzPhoto(i, j) {
  const id = CFG.sizes[i].id;
  if (CFG.size_photos && CFG.size_photos[id]) {

  }
}

function addCfgOptPhoto(oi, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const max = 1200;
      if (w > max) { h = h*max/w; w = max; }
      if (h > max) { w = w*max/h; h = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      CFG.extra_options[oi].photo = canvas.toDataURL('image/jpeg', 0.92);
      showSettings();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeCfgOptPhoto(oi) {
  CFG.extra_options[oi].photo = '';
  showSettings();
}

async function saveSettingsFromForm() {
  const newCFG = Object.assign({}, CFG);

  // 가게 정보
  newCFG.shop_name = document.getElementById('cfg_shop_name').value;
  newCFG.shop_phone = document.getElementById('cfg_phone').value;
  newCFG.bank_account = document.getElementById('cfg_account').value;
  newCFG.bank_holder = document.getElementById('cfg_holder').value;
  newCFG.pickup_notice = document.getElementById('cfg_pickup').value;
  newCFG.cake_notice = document.getElementById('cfg_cake_notice').value;

  // 사이즈 (DOM 순서 기준으로 저장)
  const sizeItems = document.querySelectorAll('.cfg-drag-item');
  newCFG.sizes = Array.from(sizeItems).map(function(el) {
    const i = parseInt(el.dataset.idx);
    const s = CFG.sizes[i];
    return {
      id: s.id,
      e: document.getElementById('cfg_sz_e_'+i) ? document.getElementById('cfg_sz_e_'+i).value : s.e,
      name: document.getElementById('cfg_sz_name_'+i).value,
      cm: document.getElementById('cfg_sz_cm_'+i).value,
      price: parseInt(document.getElementById('cfg_sz_price_'+i).value)||s.price
    };
  });

  // 옵션 (DOM 순서 기준)
  const optItems = document.querySelectorAll('.cfg-drag-opt');
  newCFG.extra_options = Array.from(optItems).map(function(el) {
    const oi = parseInt(el.dataset.idx);
    const opt = CFG.extra_options[oi];
    return {
      id: opt.id,
      name: document.getElementById('cfg_opt_name_'+oi) ? document.getElementById('cfg_opt_name_'+oi).value : opt.name,
      price: parseInt(document.getElementById('cfg_opt_price_'+oi) ? document.getElementById('cfg_opt_price_'+oi).value : opt.price)||0,
      desc: document.getElementById('cfg_opt_desc_'+oi) ? document.getElementById('cfg_opt_desc_'+oi).value : (opt.desc||''),
      active: true,
      photo: (CFG.extra_options[oi] && CFG.extra_options[oi].photo) || ''
    };
  });

  // 안내 문구
  newCFG.storage_tips = CFG.storage_tips.map(function(_,i){ return document.getElementById('cfg_storage_'+i) ? document.getElementById('cfg_storage_'+i).value : CFG.storage_tips[i]; });
  newCFG.transport_tips = CFG.transport_tips.map(function(_,i){ return document.getElementById('cfg_transport_'+i) ? document.getElementById('cfg_transport_'+i).value : CFG.transport_tips[i]; });
  newCFG.design_guide = document.getElementById('cfg_design_desc') ? document.getElementById('cfg_design_desc').value : CFG.design_guide;
  newCFG.size_photos = CFG.size_photos;

  toast('저장 중...');
  try {
    await saveSettings(newCFG);
    CFG = newCFG;
    closeSheet();
    toast('저장됐어요!');
  } catch(e) {
    toast('저장 실패');
  }
}
