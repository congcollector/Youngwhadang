<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영화당 · 주문</title>
<style>
:root {
  --bg: #f7f3f0;
  --bg2: #ede8e1;
  --card: #ffffff;
  --text: #1c1814;
  --text2: #8a837c;
  --text3: #c4bdb7;
  --sep: rgba(50,40,35,0.08);
  --r: 16px;
  --cake: #8b4a4a;
  --cake2: rgba(139,74,74,0.07);
  --hwa: #4a6b8b;
  --hwa2: rgba(74,107,139,0.07);
  --green: #34c759;
  --red: #ff3b30;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body {
  background:#f7f3f0;
  font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
  color:#1c1814;
  -webkit-font-smoothing:antialiased;
}

/* ── 헤더 ── */
.hdr {
background:rgba(247,243,240,0.94);
backdrop-filter:blur(24px) saturate(1.8);
-webkit-backdrop-filter:blur(24px) saturate(1.8);
border-bottom:0.5px solid rgba(50,40,35,0.1);
padding:54px 20px 0;
position:sticky; top:0; z-index:50;
}
.hdr-inner { max-width:480px; margin:0 auto; }
.hdr-top { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:12px; }
.hdr-eye { font-size:11px; font-weight:500; color:#b8a99e; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.hdr-ttl { font-size:26px; font-weight:700; letter-spacing:-0.8px; }
.pill { font-size:12px; font-weight:600; padding:5px 13px; border-radius:20px; }
.pill-g { background:rgba(139,74,74,0.08); color:#8b4a4a; }
.pill-a { background:#8b4a4a; color:#fff; }
.hdr-tabs { display:flex; border-top:0.5px solid rgba(50,40,35,0.08); }
.hdr-tab { flex:1; padding:12px 0; text-align:center; font-size:14px; font-weight:500; color:#b8a99e; border-bottom:2px solid transparent; cursor:pointer; transition:color 0.2s, border-color 0.2s; }
.hdr-tab.cake.on { color:#8b4a4a; border-bottom-color:#8b4a4a; font-weight:600; }
.hdr-tab.hwa.on  { color:#4a6b8b; border-bottom-color:#4a6b8b; font-weight:600; }

/* ── 레이아웃 ── */
.wrap { max-width:480px; margin:0 auto; padding:28px 0 110px; }
.loading { text-align:center; padding:80px 20px; color:#b8a99e; font-size:15px; }

/* ── 섹션 ── */
.sec { margin-bottom:28px; }
.sec-hdr { font-size:11px; font-weight:600; color:#b8a99e; letter-spacing:0.8px; text-transform:uppercase; padding:0 20px; margin-bottom:8px; }
.sec-foot { font-size:12px; color:#b8a99e; padding:8px 20px 0; line-height:1.6; }

/* ── 카드 ── */
.card { background:#fff; border-radius:var(–r); margin:0 16px; overflow:hidden; box-shadow:0 1px 0 rgba(50,40,35,0.06),0 2px 8px rgba(50,40,35,0.04); }

/* ── 행 입력 ── */
.row { display:flex; align-items:center; padding:0 16px; min-height:52px; border-bottom:0.5px solid rgba(50,40,35,0.07); }
.row:last-child { border-bottom:none; }
.row-lbl { font-size:15px; min-width:72px; color:#1c1814; }
.req { color:#ff3b30; font-size:11px; margin-left:2px; }
.inp { flex:1; border:none; outline:none; background:transparent; font-size:15px; font-family:inherit; color:#1c1814; text-align:right; padding:14px 0; }
.inp::placeholder { color:#d4cdc8; }

/* ── 주문 안내 ── */
.notice { background:#fff; border-radius:var(–r); padding:16px 18px; margin:0 16px; font-size:14px; color:#8a837c; line-height:1.75; box-shadow:0 1px 0 rgba(50,40,35,0.06),0 2px 8px rgba(50,40,35,0.04); }
.notice strong { color:#1c1814; font-weight:600; }

/* ── 사이즈 슬라이드 ── */
.sz-scroll { display:flex; gap:10px; overflow-x:auto; padding:4px 16px 6px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.sz-scroll::-webkit-scrollbar { display:none; }
.sz { flex-shrink:0; width:124px; background:#fff; border-radius:16px; padding:14px 12px; text-align:center; border:1.5px solid transparent; cursor:pointer; transition:all 0.18s cubic-bezier(0.4,0,0.2,1); box-shadow:0 1px 0 rgba(50,40,35,0.06),0 2px 8px rgba(50,40,35,0.04); }
.sz:active { transform:scale(0.97); }
.sz.on-cake { border-color:#8b4a4a; background:rgba(139,74,74,0.05); }
.sz.on-hwa  { border-color:#4a6b8b; background:rgba(74,107,139,0.05); }
.sz-e { font-size:24px; margin-bottom:7px; }
.sz-n { font-size:13px; font-weight:600; margin-bottom:2px; color:#1c1814; }
.sz-c { font-size:11px; color:#b8a99e; margin-bottom:7px; }
.sz-p { font-size:14px; font-weight:700; }
.sz-p-cake { color:#8b4a4a; }
.sz-p-hwa  { color:#4a6b8b; }

/* ── 토글 ── */
.tog { display:flex; align-items:center; padding:14px 16px; border-bottom:0.5px solid rgba(50,40,35,0.07); gap:12px; min-height:54px; }
.tog:last-child { border-bottom:none; }
.tog-bd { flex:1; }
.tog-l { font-size:15px; color:#1c1814; }
.tog-s { font-size:12px; color:#b8a99e; margin-top:2px; }
.sw { width:51px; height:31px; border-radius:16px; background:rgba(120,120,128,0.14); position:relative; flex-shrink:0; transition:background 0.22s; cursor:pointer; }
.sw.on-cake { background:#8b4a4a; }
.sw.on-hwa  { background:#4a6b8b; }
.sw-k { position:absolute; top:2px; left:2px; width:27px; height:27px; border-radius:50%; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.15),0 0.5px 1px rgba(0,0,0,0.1); transition:transform 0.24s cubic-bezier(0.34,1.56,0.64,1); }
.sw.on-cake .sw-k, .sw.on-hwa .sw-k { transform:translateX(20px); }

/* ── 결제 칩 ── */
.pay-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.pc { padding:9px 18px; border-radius:22px; font-size:14px; font-weight:500; font-family:inherit; border:1.5px solid rgba(50,40,35,0.12); cursor:pointer; background:#f7f3f0; color:#1c1814; transition:all 0.15s; }
.pc:active { transform:scale(0.96); }
.pc.on-cake { background:#8b4a4a; color:#fff; border-color:#8b4a4a; }
.pc.on-hwa  { background:#4a6b8b; color:#fff; border-color:#4a6b8b; }

/* ── 가격 ── */
.pr { display:flex; justify-content:space-between; align-items:center; padding:13px 16px; border-bottom:0.5px solid rgba(50,40,35,0.07); }
.pr:last-child { border-bottom:none; }
.pk { font-size:15px; color:#1c1814; }
.pv { font-size:15px; color:#b8a99e; }
.pkb { font-size:15px; font-weight:600; color:#1c1814; }
.pvb-cake { font-size:17px; font-weight:700; color:#8b4a4a; }
.pvb-hwa  { font-size:17px; font-weight:700; color:#4a6b8b; }

/* ── 버튼 ── */
.btn-cake { display:block; width:calc(100% - 32px); margin:0 16px; padding:17px; border-radius:16px; border:none; background:#8b4a4a; color:#fff; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; letter-spacing:-0.3px; transition:opacity 0.15s,transform 0.12s; box-shadow:0 4px 16px rgba(139,74,74,0.25); }
.btn-cake:active { opacity:.88; transform:scale(0.99); }
.btn-hwa  { display:block; width:calc(100% - 32px); margin:0 16px; padding:17px; border-radius:16px; border:none; background:#4a6b8b; color:#fff; font-size:17px; font-weight:600; font-family:inherit; cursor:pointer; letter-spacing:-0.3px; transition:opacity 0.15s,transform 0.12s; box-shadow:0 4px 16px rgba(74,107,139,0.25); }
.btn-hwa:active { opacity:.88; transform:scale(0.99); }

/* ── 오버레이/시트 ── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200; display:none; align-items:flex-end; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.overlay.show { display:flex; }
.sheet { background:#f7f3f0; border-radius:22px 22px 0 0; padding:0 0 44px; width:100%; animation:sheetUp 0.32s cubic-bezier(0.32,0.72,0,1); max-height:92vh; overflow-y:auto; }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sh-hw { padding:12px 0 6px; text-align:center; }
.sh-h  { display:inline-block; width:36px; height:4px; border-radius:2px; background:rgba(50,40,35,0.15); }
.sh-tw { padding:4px 20px 16px; border-bottom:0.5px solid rgba(50,40,35,0.08); }
.sh-t  { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
.sh-s  { font-size:13px; color:#b8a99e; margin-top:3px; }
.sh-cls { flex:1; padding:14px; border-radius:16px; background:rgba(120,120,128,0.09); border:none; color:#8a837c; font-size:14px; font-family:inherit; cursor:pointer; }
.sh-sav-cake { flex:1; padding:14px; border-radius:16px; background:#8b4a4a; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.sh-sav-hwa  { flex:1; padding:14px; border-radius:16px; background:#4a6b8b; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }

/* ── 디테일 행 ── */
.dl { background:#fff; border-radius:var(–r); overflow:hidden; box-shadow:0 1px 0 rgba(50,40,35,0.06); }
.dr { display:flex; padding:12px 16px; border-bottom:0.5px solid rgba(50,40,35,0.07); gap:12px; }
.dr:last-child { border-bottom:none; }
.dk { font-size:13px; color:#b8a99e; min-width:64px; padding-top:1px; }
.dv { font-size:14px; flex:1; line-height:1.5; }

/* ── 배지 ── */
.badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }
.b-pending   { background:rgba(255,149,0,0.1);  color:#b06800; }
.b-confirmed { background:rgba(52,199,89,0.1);  color:#1a7a33; }
.b-done      { background:rgba(0,122,255,0.1);  color:#0060c7; }
.b-cancel    { background:rgba(255,59,48,0.08); color:#ff3b30; }

/* ── 어드민 주문 카드 ── */
.order-card-cake { background:#fff; border-radius:var(–r); margin:0 16px 10px; overflow:hidden; cursor:pointer; border-left:3px solid #8b4a4a; box-shadow:0 1px 0 rgba(50,40,35,0.06),0 2px 8px rgba(50,40,35,0.04); transition:box-shadow 0.2s; }
.order-card-hwa  { background:#fff; border-radius:var(–r); margin:0 16px 10px; overflow:hidden; cursor:pointer; border-left:3px solid #4a6b8b; box-shadow:0 1px 0 rgba(50,40,35,0.06),0 2px 8px rgba(50,40,35,0.04); transition:box-shadow 0.2s; }
.order-price-cake { font-size:16px; font-weight:700; color:#8b4a4a; }
.order-price-hwa  { font-size:16px; font-weight:700; color:#4a6b8b; }

/* ── 필터 칩 ── */
.pill-btn { padding:7px 15px; border-radius:22px; font-size:13px; white-space:nowrap; cursor:pointer; border:none; font-family:inherit; flex-shrink:0; transition:all 0.15s; }
.btn-active-cake { background:#8b4a4a !important; color:#fff !important; font-weight:600 !important; }
.btn-active-hwa  { background:#4a6b8b !important; color:#fff !important; font-weight:600 !important; }
.btn-inactive    { background:transparent; color:#8a837c; font-weight:400; }
.btn-inactive-w  { background:#fff; color:#8a837c; font-weight:400; }

/* ── 세그먼트 ── */
.seg-btn { flex:1; padding:9px 0; border:none; border-radius:11px; font-size:14px; font-family:inherit; cursor:pointer; transition:all 0.18s cubic-bezier(0.4,0,0.2,1); letter-spacing:-0.2px; }
.adm-tab { flex:1; padding:9px; border-radius:11px; border:none; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; text-align:center; transition:all 0.18s; }
.adm-tab-cake { background:rgba(139,74,74,0.07); color:#8b4a4a; }
.adm-tab-cake.on { background:#8b4a4a; color:#fff; }
.adm-tab-hwa  { background:rgba(74,107,139,0.07); color:#4a6b8b; }
.adm-tab-hwa.on  { background:#4a6b8b; color:#fff; }

/* ── 아코디언 ── */
.acc-row { display:flex; align-items:center; padding:15px 16px; cursor:pointer; gap:12px; min-height:52px; }
.arr { font-size:14px; color:#c4bdb7; transition:transform 0.22s; flex-shrink:0; }
.arr.open { transform:rotate(90deg); }
.acc-bd { padding:4px 16px 14px 52px; border-top:0.5px solid rgba(50,40,35,0.07); }
.acc-it { font-size:13px; color:#8a837c; line-height:1.9; padding:1px 0; }

/* ── 옵션 칩 ── */
.opt-wrap { display:flex; gap:8px; flex-wrap:wrap; padding:14px 16px; }
.opt-chip { padding:9px 16px; border-radius:22px; font-size:14px; font-weight:500; font-family:inherit; border:1.5px solid rgba(50,40,35,0.12); cursor:pointer; background:#f7f3f0; color:#1c1814; transition:all 0.15s; }
.opt-chip:active { transform:scale(0.96); }
.opt-chip.on-cake { background:#8b4a4a; color:#fff; border-color:#8b4a4a; }
.opt-chip.on-hwa  { background:#4a6b8b; color:#fff; border-color:#4a6b8b; }

/* ── 레터링 ── */
.lc { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.lc-btn-cake { padding:7px 13px; border-radius:22px; border:1.5px solid rgba(139,74,74,0.18); background:rgba(139,74,74,0.05); color:#8b4a4a; font-size:12px; font-family:inherit; cursor:pointer; line-height:1.5; transition:all 0.15s; }
.lc-btn-cake.on { background:#8b4a4a; color:#fff; border-color:#8b4a4a; }

/* ── 성공 ── */
.succ { text-align:center; padding:64px 24px 32px; }
.succ-ic { font-size:54px; margin-bottom:20px; }
.succ-t  { font-size:24px; font-weight:700; letter-spacing:-0.5px; margin-bottom:8px; }
.succ-s  { font-size:15px; color:#8a837c; line-height:1.7; margin-bottom:28px; }

/* ── 토스트 ── */
.toast { position:fixed; bottom:34px; left:50%; transform:translateX(-50%); background:rgba(28,24,20,0.9); color:#fff; padding:12px 22px; border-radius:22px; font-size:14px; font-weight:500; z-index:400; opacity:0; transition:opacity 0.2s; pointer-events:none; white-space:nowrap; backdrop-filter:blur(8px); }
.toast.show { opacity:1; }

/* ── 빈 화면 ── */
.empty { text-align:center; padding:64px 20px; color:#b8a99e; }

/* ── 상태 버튼 ── */
.status-btn { padding:13px; border-radius:16px; font-size:14px; font-family:inherit; cursor:pointer; transition:all 0.15s; }
.status-btn-on-p  { border:2px solid #b06800; background:rgba(255,149,0,0.08);  color:#b06800;  font-weight:600; }
.status-btn-off-p { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.status-btn-on-c  { border:2px solid #1a7a33; background:rgba(52,199,89,0.08);  color:#1a7a33;  font-weight:600; }
.status-btn-off-c { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.status-btn-on-d  { border:2px solid #0060c7; background:rgba(0,122,255,0.08);  color:#0060c7;  font-weight:600; }
.status-btn-off-d { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.status-btn-on-x  { border:2px solid #ff3b30; background:rgba(255,59,48,0.08);  color:#ff3b30;  font-weight:600; }
.status-btn-off-x { border:1.5px solid rgba(50,40,35,0.1); background:#fff; color:#b8a99e; font-weight:400; }
.save-btn-cake { flex:2; padding:14px; border-radius:16px; background:#8b4a4a; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.save-btn-hwa  { flex:2; padding:14px; border-radius:16px; background:#4a6b8b; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.cfg-save-cake { flex:1; padding:13px; border-radius:16px; background:#8b4a4a; border:none; color:#fff; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
.memo-ta { width:100%; background:#fff; border:none; border-radius:var(–r); padding:13px 14px; font-size:14px; font-family:inherit; color:#1c1814; resize:none; height:80px; outline:none; line-height:1.5; }
.cfg-tabs { display:flex; border-bottom:0.5px solid rgba(50,40,35,0.08); margin-bottom:16px; }
.cfg-tab { flex:1; padding:12px 0; text-align:center; font-size:14px; font-weight:500; color:#b8a99e; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
.cfg-tab-cake.on { color:#8b4a4a; border-bottom-color:#8b4a4a; }
.cfg-tab-hwa.on  { color:#4a6b8b; border-bottom-color:#4a6b8b; }

/* ── 반응형 ── */
@media (min-width: 768px) {
.wrap { max-width:600px; padding:32px 0 120px; }
.hdr { padding:56px 28px 0; }
.hdr-inner { max-width:600px; }
.card { margin:0 20px; }
.sz-scroll { padding:4px 20px 6px; }
.btn-cake, .btn-hwa { width:calc(100% - 40px); margin:0 20px; }
.notice { margin:0 20px; }
}
@media (min-width: 1024px) {
body { background:#ede8e1; }
.wrap { max-width:680px; padding:40px 0 120px; }
.hdr { padding:48px 32px 0; }
.hdr-inner { max-width:680px; }
.card { margin:0 24px; border-radius:18px; }
.sz { width:140px; }
.btn-cake, .btn-hwa { width:calc(100% - 48px); margin:0 24px; border-radius:16px; }
.notice { margin:0 24px; border-radius:18px; }
.overlay { align-items:center; justify-content:center; }
.sheet { border-radius:22px; max-width:600px; width:100%; max-height:88vh; margin:0 auto; animation:sheetFade 0.22s ease; }
@keyframes sheetFade { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
}
@media (min-width: 1280px) {
.wrap { max-width:720px; }
.hdr-inner { max-width:720px; }
}
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-eye" id="hdrEye">영화당 · Younghwadang</div>
      <div class="hdr-ttl" id="hdrTtl">🌸 주문</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="pill" id="modePill"></div>
      <button id="settingsBtn" style="display:none;padding:6px 12px;border-radius:20px;background:rgba(139,74,74,0.1);border:none;color:#8b4a4a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;" onclick="showSettings()">⚙️</button>
    </div>
  </div>
  <div class="hdr-tabs" id="hdrTabs">
    <div class="hdr-tab cake on" onclick="switchTab('cake')">🎂 떡케이크</div>
    <div class="hdr-tab hwa" onclick="switchTab('hwa')">🌸 화과자</div>
  </div>
</div>

<div class="wrap" id="wrap"><div class="loading">불러오는 중...</div></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const SUPA = 'https://pithlzhuqezeesprcbze.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';
const H    = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function api(path, method, body) {
  return fetch(SUPA+path, {method:method||'GET', headers:H, body:body?JSON.stringify(body):undefined});
}
async function getOrders(type) {
  const r = await api('/cake_orders?order=created_at.desc&type=eq.'+type);
  return r.ok ? r.json() : [];
}
async function addOrder(o) {
  const r = await api('/cake_orders','POST',o);
  if (!r.ok) throw new Error('fail');
}
async function updateOrder(id,p) { await api('/cake_orders?id=eq.'+id,'PATCH',p); }
async function delOrder(id) { await api('/cake_orders?id=eq.'+id,'DELETE'); }

async function loadSettings() {
  try {
    const r = await api('/cake_photos2?id=eq.settings');
    if (!r.ok) return;
    const d = await r.json();
    if (d.length > 0) {

      if (saved.hwa_packing) {

// ── 예약 차단 체크 ──
function getBlockStatus(dateStr, timeStr) {
  const rules = CFG.block_rules || [];
  if (!rules.length) return null;
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay();
  for (let i = 0; i < rules.length; i++) {
    const r = rules[i];
    if (r.dow !== dow) continue;
    // 하루 종일 마감
    if (!r.after) return { type:'day', msg:'해당 날짜는 예약이 마감됐어요' };
    // 특정 시간 이후 마감
    if (timeStr && timeStr >= r.after) {
      return { type:'time', msg:r.after+' 이후 픽업은 예약이 마감됐어요' };
    }
    // 시간 미입력 시 날짜 경고만
    if (!timeStr) return { type:'warn', msg:'이 날짜는 '+r.after+' 이후 픽업이 불가해요 · 시간을 먼저 확인해주세요' };
  }
  return null;
}

async function submitCake() {
  if (!fd.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!fd.phone.trim()) { toast('전화번호를 입력해주세요'); return; }
  if (!fd.date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (!fd.time) { toast('픽업 시간을 선택해주세요'); return; }
  const _block = getBlockStatus(fd.date, fd.time);
  if (_block && _block.type !== 'warn') { toast(_block.msg); return; }
  const hasSel = fd.sizes && Object.keys(fd.sizes).some(function(k){ return fd.sizes[k]>0; });
  if (!hasSel) { toast('케이크 사이즈를 선택해주세요'); return; }
  if (!fd.pay) { toast('결제 방법을 선택해주세요'); return; }
  let cakeSub = 0;
  const sizeNames = [];
  CFG.sizes.forEach(function(s){ const q=fd.sizes[s.id]||0; if(q>0){cakeSub+=s.price*q; sizeNames.push(s.name+' x'+q);} });
  const total = cakeSub + (fd.choco?CFG.choco_price:0) + (fd.method==='delivery'?CFG.delivery_price:0);
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'c_'+Date.now(), type:'cake',
      name:fd.name, phone:fd.phone,
      pickup_date:fd.date, pickup_time:fd.time,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      design:fd.design||'', lettering:fd.lettering||'',
      payment:fd.pay, choco_deco:fd.choco,
      delivery:fd.method==='delivery', delivery_addr:fd.method==='delivery'?fd.addr||'':'',
      total_price:total, status:'pending', memo:'',
      photos:JSON.stringify(fd.photos||[]),
      created_at:Date.now()
    });
    fd.done = true; renderCake();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderCake(); }
}

  }
  h += '<\/div><\/div>';
  if (hasHwaSizes) {
    h += '<div class="sec"><div class="sec-hdr">결제 금액</div><div class="card">';
    CFG.hwa_sizes.forEach(function(s) {
      const qty = hf.sizes[s.id]||0;
      if (qty > 0) h += '<div class="pr"><span class="pk">화과자 '+s.name+' x'+qty+'<\/span><span class="pv">'+(s.price*qty).toLocaleString()+'원<\/span><\/div>';
    });
    hf.packing.forEach(function(pid) {
      const p = CFG.hwa_packing.find(function(x){ return x.id===pid; });
      if (p) h += '<div class="pr"><span class="pk">'+p.name+'<\/span><span class="pv">+'+p.price.toLocaleString()+'원<\/span><\/div>';
    });
    if (hf.method==='ship') h += '<div class="pr"><span class="pk">택배비<\/span><span class="pv">+'+CFG.hwa_delivery_price.toLocaleString()+'원<\/span><\/div>';
    if (hf.method==='delivery') h += '<div class="pr"><span class="pk">배달비<\/span><span class="pv">+'+CFG.hwa_delivery_price.toLocaleString()+'원<\/span><\/div>';
    h += '<div class="pr"><span class="pkb">총 결제 금액<\/span><span class="pvb-hwa">'+total.toLocaleString()+'원<\/span><\/div>';
    h += '<\/div><\/div>';
  }
  h += '<div class="sec"><button class="btn-hwa" onclick="submitHwa()">주문서 제출하기<\/button><\/div>';
  W(h);
}

function togglePacking(pid) {
  const idx = hf.packing.indexOf(pid);
  if (idx >= 0) hf.packing.splice(idx,1); else hf.packing.push(pid);
  renderHwa();
}

function renderHwaSuccess() {
  let h = '<div class="succ">';
  h += '<div class="succ-ic">🌸<\/div>';
  h += '<div class="succ-t">주문서가 전달됐어요<\/div>';
  h += '<div class="succ-s">확인 후 <strong>'+CFG.shop_phone+'<\/strong>으로 연락드릴게요 💛<\/div>';
  h += '<div class="notice" style="text-align:left;margin:0 0 24px;">💳 입금 계좌<br><strong class="hwa-accent">'+CFG.bank_account+' ('+CFG.bank_holder+')<\/strong><\/div>';
  h += '<button class="btn-hwa" onclick="resetHwa()">새 주문서 작성<\/button><\/div>';
  W(h);
}

async function submitHwa() {
  if (!hf.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!hf.phone.trim()) { toast('연락처를 입력해주세요'); return; }
  const hasHwaSel = hf.sizes && Object.keys(hf.sizes).some(function(k){ return hf.sizes[k]>0; });
  if (!hasHwaSel) { toast('화과자 수량을 선택해주세요'); return; }
  if (hf.method==='pickup' && !hf.pickup_date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (hf.method==='ship' && !hf.ship_addr.trim()) { toast('배송 주소를 입력해주세요'); return; }
  if (!hf.pay) { toast('결제 방법을 선택해주세요'); return; }
  let hwaSub = 0;
  const hwaSizeNames = [];
  CFG.hwa_sizes.forEach(function(s){ const q=hf.sizes[s.id]||0; if(q>0){hwaSub+=s.price*q; hwaSizeNames.push(s.name+' x'+q);} });
  let total = hwaSub;
  hf.packing.forEach(function(pid) {
    const p = CFG.hwa_packing.find(function(x){ return x.id===pid; });
    if (p) total += p.price;
  });
  if (hf.method==='ship') total += CFG.hwa_delivery_price;
  if (hf.method==='delivery') total += CFG.hwa_delivery_price;
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'h_'+Date.now(), type:'hwa',
      name:hf.name, phone:hf.phone,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      method:hf.method,
      pickup_date:hf.method==='pickup'?hf.pickup_date:hf.ship_date,
      pickup_time:hf.pickup_time||'',
      delivery_addr:hf.method==='ship'?hf.ship_addr:'',
      packing:JSON.stringify(hf.packing),
      packing_text:hf.packing_text||'',
      payment:hf.pay,
      total_price:total, status:'pending', memo:'',
      created_at:Date.now()
    });
    hf.done = true; renderHwa();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderHwa(); }
}

async function renderAdmin() {
  W('<div class="loading">불러오는 중...</div>');
  try {
    const cake = await getOrders('cake');
    const hwa  = await getOrders('hwa');
    adminOrders = (cake||[]).concat(hwa||[]);
    if (!Array.isArray(adminOrders)) adminOrders = [];
  } catch(e) { adminOrders = []; }
  renderAdminView();
}

function renderAdminView() {
  const isCake = adminTab === 'cake';
  const accentColor = isCake ? '#8b4a4a' : '#4a6b8b';
  const orders = adminOrders.filter(function(o){ return o.type === adminTab; });

  if (!adminSelDate) {
    const t = new Date();
    adminSelDate = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  }

  const selD = new Date(adminSelDate+'T00:00:00');
  const dow = selD.getDay();
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const weekStart = new Date(selD);
  weekStart.setDate(selD.getDate() + mondayOffset + adminWeekOffset * 7);

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    weekDays.push({ date:ds, day:d, label:['일','월','화','수','목','금','토'][d.getDay()] });
  }

  const today = (function(){ const t=new Date(); return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); })();

  const dayOrders = orders.filter(function(o){ return o.pickup_date === adminSelDate; });
  const tabOrders = aFilter === 'all' ? dayOrders : dayOrders.filter(function(o){ return o.status === aFilter; });

  const orderCountMap = {};
  orders.forEach(function(o){
    if (!orderCountMap[o.pickup_date]) orderCountMap[o.pickup_date] = 0;
    orderCountMap[o.pickup_date]++;
  });

  const monthLabel = (selD.getMonth()+1)+'월';
  const weekTotal = weekDays.reduce(function(s,d){ return s+(orderCountMap[d.date]||0); },0);

  let h = '';

  // ── 상단: 상품 탭 (떡케이크/화과자) ──
  h += '<div style="display:flex;gap:0;margin:16px 16px 0;background:#fff;border-radius:14px;overflow:hidden;padding:3px;box-shadow:0 1px 0 rgba(50,40,35,0.06);">';
  h += '<button onclick="adminTab=\'cake\';aFilter=\'all\';adminSelDate=null;renderAdminView()" class="seg-btn '+(isCake?'btn-active-cake':'btn-inactive-w')+'">🎂 떡케이크<\/button>';
  h += '<button onclick="adminTab=\'hwa\';aFilter=\'all\';adminSelDate=null;renderAdminView()" class="seg-btn '+(!isCake?'btn-active-hwa':'btn-inactive-w')+'">🌸 화과자<\/button>';
  h += '<\/div>';

  // ── 주간 캘린더 ──
  h += '<div style="background:rgba(247,243,240,0.96);position:sticky;top:52px;z-index:40;border-bottom:0.5px solid rgba(50,40,35,0.1);margin-top:12px;">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;">';
  h += '<div style="font-size:15px;font-weight:700;letter-spacing:-0.3px;">'+monthLabel+'<\/div>';
  h += '<div style="font-size:12px;color:#b8a99e;">이번주 '+weekTotal+'건<\/div>';
  h += '<\/div>';

  // 화살표 + 날짜 한 줄
  h += '<div style="display:flex;align-items:center;padding:0 4px 10px;gap:2px;">';
  h += '<button onclick="event.stopPropagation();adminWeekOffset--;renderAdminView()" style="width:36px;height:56px;border:none;background:transparent;color:#c4bdb7;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;">‹<\/button>';
  h += '<div style="flex:1;display:flex;gap:2px;">';
  weekDays.forEach(function(d) {
    const isSel = d.date === adminSelDate;
    const isToday = d.date === today;
    const cnt = orderCountMap[d.date] || 0;
    const bg = isSel ? accentColor : 'transparent';
    const textColor = isSel ? '#fff' : (isToday ? accentColor : '#1c1814');
    const labelColor = isSel ? 'rgba(255,255,255,0.65)' : '#b8a99e';
    h += '<div onclick="adminSelDate=\''+d.date+'\';aFilter=\'all\';renderAdminView()" style="flex:1;text-align:center;padding:7px 2px;border-radius:12px;cursor:pointer;background:'+bg+';transition:all 0.15s;">';
    h += '<div style="font-size:10px;color:'+labelColor+';margin-bottom:3px;font-weight:500;pointer-events:none;">'+d.label+'<\/div>';
    h += '<div style="font-size:17px;font-weight:700;color:'+textColor+';pointer-events:none;">'+d.day.getDate()+'<\/div>';
    h += cnt > 0
      ? '<div style="width:5px;height:5px;border-radius:50%;background:'+(isSel?'rgba(255,255,255,0.6)':accentColor)+';margin:3px auto 0;pointer-events:none;"><\/div>'
      : '<div style="width:5px;height:5px;margin:3px auto 0;pointer-events:none;"><\/div>';
    h += '<\/div>';
  });
  h += '<\/div>';
  h += '<button onclick="event.stopPropagation();adminWeekOffset++;renderAdminView()" style="width:36px;height:56px;border:none;background:transparent;color:#c4bdb7;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;">›<\/button>';
  h += '<\/div>';

  // 상태 탭
  const pendingCnt   = dayOrders.filter(function(o){return o.status==='pending';}).length;
  const confirmedCnt = dayOrders.filter(function(o){return o.status==='confirmed';}).length;
  const doneCnt      = dayOrders.filter(function(o){return o.status==='done';}).length;
  h += '<div style="display:flex;border-top:0.5px solid rgba(50,40,35,0.08);">';
  [{k:'all',l:'전체',cnt:dayOrders.length},{k:'pending',l:'확인중',cnt:pendingCnt},{k:'confirmed',l:'예약확정',cnt:confirmedCnt},{k:'done',l:'픽업완료',cnt:doneCnt}].forEach(function(t) {
    const isOn = aFilter === t.k;
    h += '<div onclick="aFilter=\''+t.k+'\';renderAdminView()" style="flex:1;text-align:center;padding:10px 0;font-size:12px;font-weight:'+(isOn?'700':'500')+';color:'+(isOn?accentColor:'#b8a99e')+';border-bottom:2px solid '+(isOn?accentColor:'transparent')+';cursor:pointer;transition:all 0.15s;">';
    h += t.l+(t.cnt>0?' '+t.cnt:'');
    h += '<\/div>';
  });
  h += '<\/div><\/div>';

  // ── 날짜 헤더 ──
  const selObj = new Date(adminSelDate+'T00:00:00');
  const dayNames = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const selLabel = (selObj.getMonth()+1)+'월 '+selObj.getDate()+'일 '+dayNames[selObj.getDay()];
  h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px;">';
  h += '<div style="font-size:17px;font-weight:700;letter-spacing:-0.3px;">'+selLabel+'<\/div>';
  h += '<div style="display:flex;align-items:center;gap:8px;">';
  if (adminSelDate === today) h += '<div style="background:'+accentColor+';color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;">오늘<\/div>';
  if (tabOrders.length > 0) h += '<div style="background:rgba(50,40,35,0.07);color:'+accentColor+';font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;">'+tabOrders.length+'건<\/div>';
  h += '<\/div><\/div>';

  // ── 주문 목록 ──
  if (!tabOrders.length) {
    h += '<div style="text-align:center;padding:60px 20px;">';
    h += '<div style="font-size:36px;margin-bottom:12px;">'+(isCake?'🎂':'🌸')+'<\/div>';
    h += '<div style="font-size:15px;color:#b8a99e;">'+selLabel+'<br>주문이 없어요<\/div><\/div>';
  } else {
    const sorted = tabOrders.slice().sort(function(a,b){ return (a.pickup_time||'').localeCompare(b.pickup_time||''); });
    sorted.forEach(function(o) {
      const sc = {pending:{bg:'rgba(255,149,0,0.1)',c:'#b06800',l:'확인중'},confirmed:{bg:'rgba(52,199,89,0.1)',c:'#1a7a33',l:'예약확정'},done:{bg:'rgba(50,40,35,0.07)',c:'#8a837c',l:'픽업완료'},cancel:{bg:'rgba(255,59,48,0.08)',c:'#ff3b30',l:'취소'}}[o.status]||{bg:'rgba(255,149,0,0.1)',c:'#b06800',l:'확인중'};
      const cardClass = isCake ? 'order-card-cake' : 'order-card-hwa';
      const priceClass = isCake ? 'order-price-cake' : 'order-price-hwa';
      h += '<div class="'+cardClass+'" onclick="openOrder(\''+o.id+'\')">'; 
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 14px 8px;">';
      h += '<div style="display:flex;align-items:center;gap:8px;">';
      h += '<div style="font-size:16px;font-weight:700;">'+o.name+'<\/div>';
      if (o.pickup_time) h += '<div style="font-size:13px;color:#b8a99e;font-weight:500;">'+o.pickup_time+'<\/div>';
      h += '<\/div>';
      h += '<div style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:'+sc.bg+';color:'+sc.c+';">'+sc.l+'<\/div>';
      h += '<\/div>';
      h += '<div style="padding:0 14px 10px;font-size:13px;color:#8a837c;line-height:1.7;">'+o.cake_size;
      if (o.design) h += '<br>'+o.design.substring(0,40)+(o.design.length>40?'…':'');
      h += '<\/div>';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:0.5px solid rgba(50,40,35,0.07);">';
      h += '<div style="font-size:13px;color:#b8a99e;">'+o.phone+'<\/div>';
      h += '<div class="'+priceClass+'">'+(o.total_price||0).toLocaleString()+'원<\/div>';
      h += '<\/div><\/div>';
    });
  }
  h += '<div style="height:40px;"><\/div>';
  W(h);
}

  h += '<button onclick="closeSheet()" style="padding:14px 18px;border-radius:14px;background:rgba(50,40,35,0.07);border:none;color:#8a837c;font-size:14px;font-family:inherit;cursor:pointer;">닫기<\/button>';

function resizeImage(file, maxW, maxH, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveSettingsFromForm() {
  const newCFG = Object.assign({}, CFG);
  if (cfgTab === 'cake') {

    newCFG.choco_price = parseInt(document.getElementById('cfg_choco') ? document.getElementById('cfg_choco').value : '3000')||3000;

    const optEls = CFG.extra_options || [];

      return {
        id: opt.id || ('opt_'+oi),

        price: parseInt(document.getElementById('cfg_opt_price_'+oi) ? document.getElementById('cfg_opt_price_'+oi).value : opt.price) || opt.price,

        active: true
      };
    });
    newCFG.design_desc = document.getElementById('cfg_design_desc') ? document.getElementById('cfg_design_desc').value : CFG.design_desc;
    newCFG.design_placeholder = document.getElementById('cfg_design_ph') ? document.getElementById('cfg_design_ph').value : CFG.design_placeholder;
    newCFG.sizes = CFG.sizes.map(function(s,i) {
      return {id:s.id, e:s.e, name:document.getElementById('cfg_sz_name_'+i).value, cm:document.getElementById('cfg_sz_cm_'+i).value, price:parseInt(document.getElementById('cfg_sz_price_'+i).value)||s.price};
    });
    newCFG.storage_tips = CFG.storage_tips.map(function(_,i){ return document.getElementById('cfg_storage_'+i).value; });
    newCFG.transport_tips = CFG.transport_tips.map(function(_,i){ return document.getElementById('cfg_transport_'+i).value; });
    newCFG.lets = CFG.lets.map(function(_,i){ return document.getElementById('cfg_let_'+i).value; });

    newCFG.block_rules = Array.from(blockEls).map(function(el) {
      const ri = el.id.replace('cfg_block_dow_','');
      const typeEl  = document.getElementById('cfg_block_type_'+ri);
      const afterEl = document.getElementById('cfg_block_after_'+ri);
      const isAfter = typeEl && typeEl.value === 'after';
      return { dow: parseInt(el.value), after: isAfter && afterEl ? afterEl.value : null };
    });
  } else {
    newCFG.hwa_sizes = CFG.hwa_sizes.map(function(s,i) {
      return {id:s.id, name:document.getElementById('cfg_hwa_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_price_'+i).value)||s.price, desc:document.getElementById('cfg_hwa_desc_'+i).value};
    });
    newCFG.hwa_photos = CFG.hwa_photos || {};
    newCFG.hwa_packing = CFG.hwa_packing.map(function(p,i) {
      return {id:p.id, name:document.getElementById('cfg_hwa_pk_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_pk_price_'+i).value)||p.price, desc:document.getElementById('cfg_hwa_pk_desc_'+i)?document.getElementById('cfg_hwa_pk_desc_'+i).value:(p.desc||''), popup_desc:document.getElementById('cfg_hwa_pk_popup_'+i)?document.getElementById('cfg_hwa_pk_popup_'+i).value:(p.popup_desc||''), photo:p.photo||''};
    });
    newCFG.hwa_sizes = CFG.hwa_sizes.map(function(s,i) {
      return {id:s.id, name:document.getElementById('cfg_hwa_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_price_'+i).value)||s.price, desc:document.getElementById('cfg_hwa_desc_'+i).value};
    });
    newCFG.hwa_delivery_price = parseInt(document.getElementById('cfg_hwa_delivery').value)||4000;
    newCFG.hwa_storage = CFG.hwa_storage.map(function(_,i){ return document.getElementById('cfg_hwa_storage_'+i).value; });
    newCFG.hwa_notice = document.getElementById('cfg_hwa_notice').value;
    const shipDesc = document.getElementById('cfg_ship_desc');
    if (shipDesc) newCFG.ship_packing_desc = shipDesc.value;
    newCFG.ship_packing_photo = CFG.ship_packing_photo || '';
  }
  await saveSettings(newCFG);
  CFG = newCFG;
  toast('설정이 저장됐어요 ✅');
  closeSheet();
  if (IS_ADMIN) renderAdmin(); else { if(curTab==='cake') renderCake(); else renderHwa(); }
}

// ── 시작 ──
function render() {
  if (IS_ADMIN) renderAdmin();
  else { if (curTab==='cake') renderCake(); else renderHwa(); }
}

loadSettings().then(function(){ render(); }).catch(function(){ render(); });
</script>
