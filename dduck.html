<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영화당 · 주문</title>
<style>
:root {
  --bg:#f7f3f0; --card:#fff; --text:#1c1c1e; --text2:#6b6b70; --text3:#aeaeb2;
  --sep:rgba(60,60,67,0.12); --green:#34c759; --red:#ff3b30; --r:14px;
  --cake:#8b4a4a; --cake2:rgba(139,74,74,0.1);
  --hwa:#4a6b8b;  --hwa2:rgba(74,107,139,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:-apple-system,'Helvetica Neue',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.hdr{background:rgba(247,243,240,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--sep);padding:52px 20px 0;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.hdr-eye{font-size:11px;font-weight:600;letter-spacing:0.5px;margin-bottom:2px;}
.hdr-ttl{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.pill{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;}
.pill-g{background:rgba(139,74,74,0.1);color:var(--cake);}
.pill-a{background:var(--cake);color:#fff;}
.hdr-tabs{display:flex;border-top:0.5px solid var(--sep);}
.hdr-tab{flex:1;padding:10px 0;text-align:center;font-size:14px;font-weight:500;color:var(--text2);border-bottom:2.5px solid transparent;cursor:pointer;transition:all 0.15s;}
.hdr-tab.cake.on{color:var(--cake);border-bottom-color:var(--cake);}
.hdr-tab.hwa.on{color:var(--hwa);border-bottom-color:var(--hwa);}
.wrap{max-width:480px;margin:0 auto;padding:20px 0 100px;}
.loading{text-align:center;padding:80px 20px;color:var(--text2);font-size:15px;}
.sec{margin-bottom:28px;}
.sec-hdr{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;padding:0 20px;margin-bottom:8px;}
.sec-foot{font-size:12px;color:var(--text2);padding:7px 20px 0;line-height:1.6;}
.card{background:var(--card);border-radius:var(--r);margin:0 16px;overflow:hidden;}
.row{display:flex;align-items:center;padding:0 16px;min-height:46px;border-bottom:0.5px solid var(--sep);}
.row:last-child{border-bottom:none;}
.row-lbl{font-size:15px;min-width:80px;}
.req{color:var(--red);font-size:12px;}
.inp{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:inherit;color:var(--text);text-align:right;padding:12px 0;}
.inp::placeholder{color:var(--text3);}
.notice{background:var(--card);border-radius:var(--r);padding:14px 16px;margin:0 16px;font-size:13px;color:var(--text2);line-height:1.8;}
.notice strong{font-weight:600;}
.cake-accent{color:var(--cake);}
.hwa-accent{color:var(--hwa);}
/* SIZE */
.sz-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.sz-scroll::-webkit-scrollbar{display:none;}
.sz{flex-shrink:0;width:128px;background:var(--card);border-radius:var(--r);padding:14px 10px;text-align:center;border:2px solid transparent;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.06);transition:all 0.15s;}
.sz.on-cake{border-color:var(--cake);background:rgba(139,74,74,0.05);}
.sz.on-hwa{border-color:var(--hwa);background:rgba(74,107,139,0.05);}
.sz-e{font-size:28px;margin-bottom:6px;}
.sz-n{font-size:13px;font-weight:600;margin-bottom:2px;}
.sz-c{font-size:11px;color:var(--text2);margin-bottom:6px;}
.sz-p{font-size:14px;font-weight:700;}
.sz-p-cake{color:var(--cake);}
.sz-p-hwa{color:var(--hwa);}
/* TOGGLE */
.tog{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--sep);min-height:48px;}
.tog:last-child{border-bottom:none;}
.tog-bd{flex:1;}
.tog-l{font-size:15px;}
.tog-s{font-size:12px;color:var(--text2);margin-top:1px;}
.sw{width:51px;height:31px;border-radius:16px;background:rgba(120,120,128,0.2);position:relative;flex-shrink:0;transition:background 0.2s;cursor:pointer;}
.sw.on-cake{background:var(--green);}
.sw.on-hwa{background:var(--hwa);}
.sw-k{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);}
.sw.on-cake .sw-k,.sw.on-hwa .sw-k{transform:translateX(20px);}
/* PAY CHIPS */
.pay-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;}
.pc{padding:7px 16px;border-radius:20px;font-size:14px;font-weight:500;font-family:inherit;border:none;cursor:pointer;background:rgba(120,120,128,0.1);color:var(--text);transition:all 0.15s;}
.pc.on-cake{background:var(--cake);color:#fff;}
.pc.on-hwa{background:var(--hwa);color:#fff;}
/* PRICE */
.pr{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:0.5px solid var(--sep);}
.pr:last-child{border-bottom:none;}
.pk{font-size:15px;}.pv{font-size:15px;color:var(--text2);}
.pkb{font-size:15px;font-weight:600;}.pvb-cake{font-size:17px;font-weight:700;color:var(--cake);}
.pvb-hwa{font-size:17px;font-weight:700;color:var(--hwa);}
/* BUTTONS */
.btn-cake{display:block;width:calc(100% - 32px);margin:0 16px;padding:15px;border-radius:var(--r);border:none;background:var(--cake);color:#fff;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-hwa{display:block;width:calc(100% - 32px);margin:0 16px;padding:15px;border-radius:var(--r);border:none;background:var(--hwa);color:#fff;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.overlay.show{display:flex;}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:0 0 40px;width:100%;animation:up 0.28s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-hw{padding:10px 0 6px;text-align:center;}
.sh-h{display:inline-block;width:36px;height:5px;border-radius:3px;background:rgba(60,60,67,0.2);}
.sh-tw{padding:4px 20px 16px;border-bottom:0.5px solid var(--sep);}
.sh-t{font-size:17px;font-weight:600;}
.sh-s{font-size:13px;color:var(--text2);margin-top:2px;}
.sh-act{display:flex;gap:10px;padding:16px 16px 0;}
.sh-del{flex:1;padding:13px;border-radius:var(--r);background:rgba(255,59,48,0.1);border:none;color:#cc2a22;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.sh-cls{flex:1;padding:13px;border-radius:var(--r);background:rgba(120,120,128,0.12);border:none;color:var(--text2);font-size:14px;font-family:inherit;cursor:pointer;}
.sh-sav-cake{flex:1;padding:13px;border-radius:var(--r);background:var(--cake);border:none;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.sh-sav-hwa{flex:1;padding:13px;border-radius:var(--r);background:var(--hwa);border:none;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.dl{background:var(--card);border-radius:var(--r);overflow:hidden;}
.dr{display:flex;padding:11px 16px;border-bottom:0.5px solid var(--sep);gap:12px;}
.dr:last-child{border-bottom:none;}
.dk{font-size:13px;color:var(--text2);min-width:68px;}
.dv{font-size:14px;flex:1;line-height:1.5;}
/* STATUS BADGES */
.stb{padding:8px 16px;border-radius:20px;border:none;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.stb-p{background:rgba(255,149,0,0.12);color:#c07000;}
.stb-c{background:rgba(52,199,89,0.12);color:#1a8a3a;}
.stb-d{background:rgba(0,122,255,0.12);color:#0060cc;}
.stb-x{background:rgba(255,59,48,0.12);color:#cc2a22;}
.stb.act{font-weight:700;box-shadow:0 0 0 1.5px currentColor inset;}
.stb:not(.act){opacity:0.45;}
.memo-ta{width:100%;background:var(--card);border:none;border-radius:var(--r);padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);resize:none;height:80px;outline:none;line-height:1.5;}
/* ADMIN STATS */
.stats{display:flex;gap:10px;}
.stat{flex:1;background:var(--card);border-radius:var(--r);padding:12px 8px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500;}
/* FILTER */
.flt{display:flex;gap:8px;overflow-x:auto;padding:0 16px;margin-bottom:14px;scrollbar-width:none;}
.flt::-webkit-scrollbar{display:none;}
.fc{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:var(--card);color:var(--text2);white-space:nowrap;cursor:pointer;border:none;font-family:inherit;flex-shrink:0;}
.fc.on-cake{background:var(--cake);color:#fff;}
.fc.on-hwa{background:var(--hwa);color:#fff;}
/* ORDER CARDS */
.oc{background:var(--card);border-radius:var(--r);margin:0 16px 10px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.oc-top{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 10px;border-bottom:0.5px solid var(--sep);}
.oc-nm{font-size:16px;font-weight:600;}
.oc-bd{padding:10px 16px 13px;font-size:13px;color:var(--text2);line-height:1.8;}
.oc-ft{display:flex;justify-content:space-between;padding:10px 16px;border-top:0.5px solid var(--sep);}
.oc-ph{font-size:13px;color:var(--text2);}
.oc-tt-cake{font-size:16px;font-weight:700;color:var(--cake);}
.oc-tt-hwa{font-size:16px;font-weight:700;color:var(--hwa);}
.oc-cake{border-left:4px solid var(--cake);}
.oc-hwa{border-left:4px solid var(--hwa);}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.b-pending{background:rgba(255,149,0,0.12);color:#c07000;}
.b-confirmed{background:rgba(52,199,89,0.12);color:#1a8a3a;}
.b-done{background:rgba(0,122,255,0.12);color:#0060cc;}
.b-cancel{background:rgba(255,59,48,0.12);color:#cc2a22;}
/* ACCORDION */
.acc-row{display:flex;align-items:center;padding:13px 16px;cursor:pointer;gap:10px;min-height:50px;}
.arr{font-size:18px;color:var(--text3);transition:transform 0.22s;flex-shrink:0;}
.arr.open{transform:rotate(90deg);}
.acc-bd{padding:4px 16px 14px 56px;border-top:0.5px solid var(--sep);background:rgba(0,0,0,0.015);}
.acc-it{font-size:13px;color:var(--text2);line-height:1.8;padding:2px 0;}
/* SUCCESS */
.succ{text-align:center;padding:60px 24px 32px;}
.succ-ic{font-size:64px;margin-bottom:18px;}
.succ-t{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.succ-s{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:28px;}
/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,0.92);color:#fff;padding:11px 22px;border-radius:20px;font-size:14px;font-weight:500;z-index:400;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
/* LETTERING CHIPS */
.lc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.lc-btn-cake{padding:5px 11px;border-radius:20px;border:1px solid rgba(139,74,74,0.25);background:rgba(139,74,74,0.07);color:var(--cake);font-size:11px;font-family:inherit;cursor:pointer;line-height:1.5;}
.lc-btn-cake.on{background:var(--cake);color:#fff;border-color:var(--cake);}
/* ADMIN TABS */
.adm-tabs{display:flex;gap:8px;padding:0 16px;margin-bottom:14px;}
.adm-tab{flex:1;padding:10px;border-radius:var(--r);border:none;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;text-align:center;transition:all 0.15s;}
.adm-tab-cake{background:var(--cake2);color:var(--cake);}
.adm-tab-cake.on{background:var(--cake);color:#fff;}
.adm-tab-hwa{background:var(--hwa2);color:var(--hwa);}
.adm-tab-hwa.on{background:var(--hwa);color:#fff;}
/* CFG TABS */
.cfg-tabs{display:flex;border-bottom:0.5px solid var(--sep);margin-bottom:16px;}
.cfg-tab{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;}
.cfg-tab-cake.on{color:var(--cake);border-bottom-color:var(--cake);}
.cfg-tab-hwa.on{color:var(--hwa);border-bottom-color:var(--hwa);}
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
/* OPTION CHIPS */
.opt-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;}
.opt-chip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;font-family:inherit;border:1.5px solid var(--sep);cursor:pointer;background:var(--bg);color:var(--text);transition:all 0.15s;}
.opt-chip.on-hwa{background:var(--hwa);color:#fff;border-color:var(--hwa);}
.opt-chip.on-cake{background:var(--cake);color:#fff;border-color:var(--cake);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-eye" id="hdrEye">영화당 · Younghwadang</div>
      <div class="hdr-ttl" id="hdrTtl">🌸 주문</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="pill" id="modePill"></div>
      <button id="settingsBtn" style="display:none;padding:6px 12px;border-radius:20px;background:rgba(139,74,74,0.1);border:none;color:#8b4a4a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;" onclick="showSettings()">⚙️</button>
    </div>
  </div>
  <div class="hdr-tabs" id="hdrTabs">
    <div class="hdr-tab cake on" onclick="switchTab('cake')">🎂 떡케이크</div>
    <div class="hdr-tab hwa" onclick="switchTab('hwa')">🌸 화과자</div>
  </div>
</div>

<div class="wrap" id="wrap"><div class="loading">불러오는 중...</div></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const SUPA = 'https://pithlzhuqezeesprcbze.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';
const H    = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function api(path, method, body) {
  return fetch(SUPA+path, {method:method||'GET', headers:H, body:body?JSON.stringify(body):undefined});
}
async function getOrders(type) {
  const r = await api('/cake_orders?order=created_at.desc&type=eq.'+type);
  return r.ok ? r.json() : [];
}
async function addOrder(o) {
  const r = await api('/cake_orders','POST',o);
  if (!r.ok) throw new Error('fail');
}
async function updateOrder(id,p) { await api('/cake_orders?id=eq.'+id,'PATCH',p); }
async function delOrder(id) { await api('/cake_orders?id=eq.'+id,'DELETE'); }

async function loadSettings() {
  try {
    const r = await api('/cake_photos2?id=eq.settings');
    if (!r.ok) return;
    const d = await r.json();
    if (d.length > 0) {
      const saved = JSON.parse(d[0].data);
      CFG = Object.assign({}, DEFAULT_CFG, saved);
      if (saved.sizes) CFG.sizes = saved.sizes;
      if (saved.lets) CFG.lets = saved.lets;
      if (saved.storage_tips) CFG.storage_tips = saved.storage_tips;
      if (saved.transport_tips) CFG.transport_tips = saved.transport_tips;
      if (saved.size_photos) CFG.size_photos = saved.size_photos;
      if (saved.hwa_sizes) CFG.hwa_sizes = saved.hwa_sizes;
      if (saved.hwa_packing) {
        CFG.hwa_packing = saved.hwa_packing.map(function(p,i) {
          const def = DEFAULT_CFG.hwa_packing[i] || {};
          return Object.assign({}, def, p);
        });
      }
      if (saved.hwa_photos) CFG.hwa_photos = saved.hwa_photos;
      if (saved.ship_packing_photo !== undefined) CFG.ship_packing_photo = saved.ship_packing_photo;
      if (saved.ship_packing_desc !== undefined) CFG.ship_packing_desc = saved.ship_packing_desc;
    }
  } catch(e) {}
}
async function saveSettings(data) {
  await api('/cake_photos2?id=eq.settings','DELETE');
  await api('/cake_photos2','POST',{id:'settings', data: JSON.stringify(data)});
}

// ── 기본 설정 ──
const DEFAULT_CFG = {
  // 떡케이크
  shop_name:'영화당', shop_phone:'010-5496-0736',
  bank_account:'농협 3511-2979-4311-3', bank_holder:'김은영',
  pickup_notice:'픽업 약 3시간 전 제작 시작 · 예약 시간에 맞춰 방문해주세요',
  storage_tips:['📌 당일 섭취 권장','🌸 앙금꽃 → 냉장 보관 (최대 1주일)','🍡 떡 → 냉동 후 자연해동'],
  transport_tips:['⏰ 픽업 약 3시간 전 제작 시작','🧑\u200d🤝\u200d🧑 동행자와 함께 조수석에서 손으로 받쳐 이동','🚚 배달 가능 (5,000원)'],
  sizes:[
    {id:'s1',e:'🎂',name:'1호',cm:'지름 15cm',price:55000},
    {id:'s2',e:'🎂',name:'2호',cm:'지름 18cm',price:70000},
    {id:'sn',e:'🔢',name:'숫자케이크',cm:'세로 7cm',price:90000},
    {id:'s2t',e:'✨',name:'2단케이크',cm:'2호 + 미니',price:130000}
  ],
  choco_price:3000, delivery_price:5000,
  choco_photo:'', size_photos:{},
  lets:['어머님의 60년 세월을 존경하고 사랑합니다','지금처럼 건강하고 오래 곁에 있어주세요','아버님의 세 번째 스무 살을 축하드립니다','팔팔한 80세 팔순을 축하드립니다','늘 건강하고 행복하게 함께해요 사랑합니다'],
  design_desc:'원하는 색감이나 스타일을 적어주세요. 참고 사진을 함께 올려주시면 최대한 가깝게 제작해드려요 🌸',
  design_placeholder:'예) 핑크 파스텔톤, 노랑색, 파란색 계열...',
  // 화과자
  hwa_sizes:[
    {id:'h9',name:'9구',price:38000,desc:'쑥/흑임자/인절미'},
    {id:'h15',name:'15구',price:64000,desc:'쑥/흑임자/인절미/무화과/완두'},
    {id:'h20',name:'20구',price:85000,desc:'쑥/흑임자/인절미/무화과/완두/밤'}
  ],
  hwa_photos:{},
  hwa_packing:[

function changeCakeQty(id, delta) {

async function submitCake() {
  if (!fd.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!fd.phone.trim()) { toast('전화번호를 입력해주세요'); return; }
  if (!fd.date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (!fd.time) { toast('픽업 시간을 선택해주세요'); return; }
  const hasSel = fd.sizes && Object.keys(fd.sizes).some(function(k){ return fd.sizes[k]>0; });
  if (!hasSel) { toast('케이크 사이즈를 선택해주세요'); return; }
  if (!fd.pay) { toast('결제 방법을 선택해주세요'); return; }
  let cakeSub = 0;
  const sizeNames = [];
  CFG.sizes.forEach(function(s){ const q=fd.sizes[s.id]||0; if(q>0){cakeSub+=s.price*q; sizeNames.push(s.name+' x'+q);} });
  const total = cakeSub + (fd.choco?CFG.choco_price:0) + (fd.method==='delivery'?CFG.delivery_price:0);
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'c_'+Date.now(), type:'cake',
      name:fd.name, phone:fd.phone,
      pickup_date:fd.date, pickup_time:fd.time,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      design:fd.design||'', lettering:fd.lettering||'',
      payment:fd.pay, choco_deco:fd.choco,
      delivery:fd.method==='delivery', delivery_addr:fd.method==='delivery'?fd.addr||'':'',
      total_price:total, status:'pending', memo:'',
      photos:JSON.stringify(fd.photos||[]),
      created_at:Date.now()
    });
    fd.done = true; renderCake();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderCake(); }
}

}

function togglePacking(pid) {
  const idx = hf.packing.indexOf(pid);
  if (idx >= 0) hf.packing.splice(idx,1); else hf.packing.push(pid);
  renderHwa();
}

function renderHwaSuccess() {
  let h = '<div class="succ">';
  h += '<div class="succ-ic">🌸<\/div>';
  h += '<div class="succ-t">주문서가 전달됐어요<\/div>';
  h += '<div class="succ-s">확인 후 <strong>'+CFG.shop_phone+'<\/strong>으로 연락드릴게요 💛<\/div>';
  h += '<div class="notice" style="text-align:left;margin:0 0 24px;">💳 입금 계좌<br><strong class="hwa-accent">'+CFG.bank_account+' ('+CFG.bank_holder+')<\/strong><\/div>';
  h += '<button class="btn-hwa" onclick="resetHwa()">새 주문서 작성<\/button><\/div>';
  W(h);
}

async function submitHwa() {
  if (!hf.name.trim()) { toast('성함을 입력해주세요'); return; }
  if (!hf.phone.trim()) { toast('연락처를 입력해주세요'); return; }
  const hasHwaSel = hf.sizes && Object.keys(hf.sizes).some(function(k){ return hf.sizes[k]>0; });
  if (!hasHwaSel) { toast('화과자 수량을 선택해주세요'); return; }
  if (hf.method==='pickup' && !hf.pickup_date) { toast('픽업 날짜를 선택해주세요'); return; }
  if (hf.method==='ship' && !hf.ship_addr.trim()) { toast('배송 주소를 입력해주세요'); return; }
  if (!hf.pay) { toast('결제 방법을 선택해주세요'); return; }
  let hwaSub = 0;
  const hwaSizeNames = [];
  CFG.hwa_sizes.forEach(function(s){ const q=hf.sizes[s.id]||0; if(q>0){hwaSub+=s.price*q; hwaSizeNames.push(s.name+' x'+q);} });
  let total = hwaSub;
  hf.packing.forEach(function(pid) {
    const p = CFG.hwa_packing.find(function(x){ return x.id===pid; });
    if (p) total += p.price;
  });
  if (hf.method==='ship') total += CFG.hwa_delivery_price;
  if (hf.method==='delivery') total += CFG.hwa_delivery_price;
  W('<div class="loading">주문서 전송 중...</div>');
  try {
    await addOrder({
      id:'h_'+Date.now(), type:'hwa',
      name:hf.name, phone:hf.phone,
      cake_size:sizeNames.join(', '), cake_price:cakeSub,
      sizes:JSON.stringify(fd.sizes),
      method:hf.method,
      pickup_date:hf.method==='pickup'?hf.pickup_date:hf.ship_date,
      pickup_time:hf.pickup_time||'',
      delivery_addr:hf.method==='ship'?hf.ship_addr:'',
      packing:JSON.stringify(hf.packing),
      packing_text:hf.packing_text||'',
      payment:hf.pay,
      total_price:total, status:'pending', memo:'',
      created_at:Date.now()
    });
    hf.done = true; renderHwa();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderHwa(); }
}

async function renderAdmin() {
  W('<div class="loading">주문 목록 불러오는 중...</div>');
  let allOrders = [];
  try {
    const r = await api('/cake_orders?order=created_at.desc');
    if (r.ok) allOrders = await r.json();
  } catch(e) {}
  if (!Array.isArray(allOrders)) allOrders = [];

  const cakeOrders = allOrders.filter(function(o){ return o.type==='cake'; });
  const hwaOrders  = allOrders.filter(function(o){ return o.type==='hwa'; });
  const orders = adminTab==='cake' ? cakeOrders : hwaOrders;
  const color = adminTab==='cake' ? 'cake' : 'hwa';

      const d = o.pickup_date;

      if (aDateEnd && d > aDateEnd) return false;
      return true;
    });

  const filt = aFilter==='all' ? dateFiltered : dateFiltered.filter(function(o){ return o.status===aFilter; });

  let h = '<div class="sec" style="padding-top:8px;">';

  h += '<\/div><\/div>';

function resizeImage(file, maxW, maxH, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function addDesignPhotos(e) {
  const files = Array.from(e.target.files).slice(0, 3-(fd.photos||[]).length);
  let n = 0;
  if (!files.length) return;
  if (!fd.photos) fd.photos = [];
  files.forEach(function(f) {
    resizeImage(f, 1200, 1200, function(data) {
      fd.photos.push(data);
      if (++n === files.length) renderCake();
    });
  });
}

    h += '<div class="dl" style="margin-bottom:14px;">';
    CFG.hwa_storage.forEach(function(t,i) {
      h += '<div class="dr"><div class="dk">보관'+(i+1)+'<\/div><div class="dv"><input id="cfg_hwa_storage_'+i+'" style="border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);background:transparent;width:100%;" value="'+t+'"><\/div><\/div>';
    });
    h += '<\/div>';
    h += '<div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;">주문 안내 문구<\/div>';
    h += '<div class="dl" style="margin-bottom:14px;">';
    h += '<div class="dr"><div class="dk">안내<\/div><div class="dv"><textarea id="cfg_hwa_notice" style="border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);background:transparent;width:100%;resize:none;height:50px;line-height:1.5;">'+(CFG.hwa_notice||'')+'<\/textarea><\/div><\/div>';
    h += '<\/div>';
  }
  h += '<\/div>';
  h += '<div class="sh-act"><button class="sh-cls" onclick="closeSheet()">닫기<\/button><button class="sh-sav-'+(cfgTab==='cake'?'cake':'hwa')+'" onclick="saveSettingsFromForm()">저장<\/button><\/div>';
  showSheet(h);
}

async function saveSettingsFromForm() {
  const newCFG = Object.assign({}, CFG);
  if (cfgTab === 'cake') {
    newCFG.shop_name = document.getElementById('cfg_shop_name').value;
    newCFG.shop_phone = document.getElementById('cfg_phone').value;
    newCFG.bank_account = document.getElementById('cfg_account').value;
    newCFG.bank_holder = document.getElementById('cfg_holder').value;
    newCFG.pickup_notice = document.getElementById('cfg_pickup').value;
    newCFG.choco_price = parseInt(document.getElementById('cfg_choco').value)||3000;
    newCFG.delivery_price = parseInt(document.getElementById('cfg_delivery').value)||5000;
    newCFG.design_desc = document.getElementById('cfg_design_desc') ? document.getElementById('cfg_design_desc').value : CFG.design_desc;
    newCFG.design_placeholder = document.getElementById('cfg_design_ph') ? document.getElementById('cfg_design_ph').value : CFG.design_placeholder;
    newCFG.sizes = CFG.sizes.map(function(s,i) {
      return {id:s.id, e:s.e, name:document.getElementById('cfg_sz_name_'+i).value, cm:document.getElementById('cfg_sz_cm_'+i).value, price:parseInt(document.getElementById('cfg_sz_price_'+i).value)||s.price};
    });
    newCFG.storage_tips = CFG.storage_tips.map(function(_,i){ return document.getElementById('cfg_storage_'+i).value; });
    newCFG.transport_tips = CFG.transport_tips.map(function(_,i){ return document.getElementById('cfg_transport_'+i).value; });
    newCFG.lets = CFG.lets.map(function(_,i){ return document.getElementById('cfg_let_'+i).value; });
  } else {
    newCFG.hwa_sizes = CFG.hwa_sizes.map(function(s,i) {
      return {id:s.id, name:document.getElementById('cfg_hwa_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_price_'+i).value)||s.price, desc:document.getElementById('cfg_hwa_desc_'+i).value};
    });
    newCFG.hwa_photos = CFG.hwa_photos || {};
    newCFG.hwa_packing = CFG.hwa_packing.map(function(p,i) {
      return {id:p.id, name:document.getElementById('cfg_hwa_pk_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_pk_price_'+i).value)||p.price, desc:document.getElementById('cfg_hwa_pk_desc_'+i)?document.getElementById('cfg_hwa_pk_desc_'+i).value:(p.desc||''), popup_desc:document.getElementById('cfg_hwa_pk_popup_'+i)?document.getElementById('cfg_hwa_pk_popup_'+i).value:(p.popup_desc||''), photo:p.photo||''};
    });
    newCFG.hwa_sizes = CFG.hwa_sizes.map(function(s,i) {
      return {id:s.id, name:document.getElementById('cfg_hwa_name_'+i).value, price:parseInt(document.getElementById('cfg_hwa_price_'+i).value)||s.price, desc:document.getElementById('cfg_hwa_desc_'+i).value};
    });
    newCFG.hwa_delivery_price = parseInt(document.getElementById('cfg_hwa_delivery').value)||4000;
    newCFG.hwa_storage = CFG.hwa_storage.map(function(_,i){ return document.getElementById('cfg_hwa_storage_'+i).value; });
    newCFG.hwa_notice = document.getElementById('cfg_hwa_notice').value;
    const shipDesc = document.getElementById('cfg_ship_desc');
    if (shipDesc) newCFG.ship_packing_desc = shipDesc.value;
    newCFG.ship_packing_photo = CFG.ship_packing_photo || '';
  }
  await saveSettings(newCFG);
  CFG = newCFG;
  toast('설정이 저장됐어요 ✅');
  closeSheet();
  if (IS_ADMIN) renderAdmin(); else { if(curTab==='cake') renderCake(); else renderHwa(); }
}

// ── 시작 ──
function render() {
  if (IS_ADMIN) renderAdmin();
  else { if (curTab==='cake') renderCake(); else renderHwa(); }
}

loadSettings().then(function(){ render(); }).catch(function(){ render(); });
</script>
