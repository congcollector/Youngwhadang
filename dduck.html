<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영화당 · 떡케이크 주문</title>
<style>
:root { --bg:#f7f3f0; --card:#fff; --accent:#8b4a4a; --text:#1c1c1e; --text2:#6b6b70; --text3:#aeaeb2; --sep:rgba(60,60,67,0.12); --green:#34c759; --red:#ff3b30; --r:14px; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);font-family:-apple-system,'Helvetica Neue',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.hdr{background:rgba(247,243,240,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--sep);padding:52px 20px 14px;position:sticky;top:0;z-index:50;}
.hdr-in{display:flex;align-items:flex-end;justify-content:space-between;}
.hdr-eye{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:0.5px;margin-bottom:2px;}
.hdr-ttl{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.pill{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;}
.pill-g{background:rgba(139,74,74,0.1);color:var(--accent);}
.pill-a{background:var(--accent);color:#fff;}
.wrap{max-width:480px;margin:0 auto;padding:20px 0 100px;}
.loading{text-align:center;padding:80px 20px;color:var(--text2);font-size:15px;}
.sec{margin-bottom:28px;}
.sec-hdr{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;padding:0 20px;margin-bottom:8px;}
.sec-foot{font-size:12px;color:var(--text2);padding:7px 20px 0;line-height:1.6;}
.card{background:var(--card);border-radius:var(--r);margin:0 16px;overflow:hidden;}
.row{display:flex;align-items:center;padding:0 16px;min-height:46px;border-bottom:0.5px solid var(--sep);}
.row:last-child{border-bottom:none;}
.row-lbl{font-size:15px;min-width:72px;}
.req{color:var(--red);font-size:12px;}
.inp{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:inherit;color:var(--text);text-align:right;padding:12px 0;}
.inp::placeholder{color:var(--text3);}
.notice{background:var(--card);border-radius:var(--r);padding:14px 16px;margin:0 16px;font-size:13px;color:var(--text2);line-height:1.8;}
.notice strong{color:var(--accent);font-weight:600;}
.sz-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.sz-scroll::-webkit-scrollbar{display:none;}
.sz{flex-shrink:0;width:128px;background:var(--card);border-radius:var(--r);padding:14px 10px;text-align:center;border:2px solid transparent;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.06);transition:all 0.15s;}
.sz.on{border-color:var(--accent);background:rgba(139,74,74,0.05);}
.sz-e{font-size:28px;margin-bottom:6px;}
.sz-n{font-size:13px;font-weight:600;margin-bottom:2px;}
.sz-c{font-size:11px;color:var(--text2);margin-bottom:6px;}
.sz-p{font-size:14px;font-weight:700;color:var(--accent);}
.tog{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--sep);min-height:48px;}
.tog:last-child{border-bottom:none;}
.tog-bd{flex:1;}
.tog-l{font-size:15px;}
.tog-s{font-size:12px;color:var(--text2);margin-top:1px;}
.sw{width:51px;height:31px;border-radius:16px;background:rgba(120,120,128,0.2);position:relative;flex-shrink:0;transition:background 0.2s;cursor:pointer;}
.sw.on{background:var(--green);}
.sw-k{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);}
.sw.on .sw-k{transform:translateX(20px);}
.pay-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;}
.pc{padding:7px 16px;border-radius:20px;font-size:14px;font-weight:500;font-family:inherit;border:none;cursor:pointer;background:rgba(120,120,128,0.1);color:var(--text);transition:all 0.15s;}
.pc.on{background:var(--accent);color:#fff;}
.pr{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:0.5px solid var(--sep);}
.pr:last-child{border-bottom:none;}
.pk{font-size:15px;}.pv{font-size:15px;color:var(--text2);}
.pkb{font-size:15px;font-weight:600;}.pvb{font-size:17px;font-weight:700;color:var(--accent);}
.btn{display:block;width:calc(100% - 32px);margin:0 16px;padding:15px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.ov.show{display:flex;}
.sh{background:var(--bg);border-radius:20px 20px 0 0;padding:0 0 40px;width:100%;animation:up 0.28s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-hw{padding:10px 0 6px;text-align:center;}
.sh-h{display:inline-block;width:36px;height:5px;border-radius:3px;background:rgba(60,60,67,0.2);}
.sh-tw{padding:4px 20px 16px;border-bottom:0.5px solid var(--sep);}
.sh-t{font-size:17px;font-weight:600;}
.sh-s{font-size:13px;color:var(--text2);margin-top:2px;}
.sh-act{display:flex;gap:10px;padding:16px 16px 0;}
.sh-del{flex:1;padding:13px;border-radius:var(--r);background:rgba(255,59,48,0.1);border:none;color:#cc2a22;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.sh-cls{flex:1;padding:13px;border-radius:var(--r);background:rgba(120,120,128,0.12);border:none;color:var(--text2);font-size:14px;font-family:inherit;cursor:pointer;}
.sh-sav{flex:1;padding:13px;border-radius:var(--r);background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.dl{background:var(--card);border-radius:var(--r);overflow:hidden;}
.dr{display:flex;padding:11px 16px;border-bottom:0.5px solid var(--sep);gap:12px;}
.dr:last-child{border-bottom:none;}
.dk{font-size:13px;color:var(--text2);min-width:68px;}
.dv{font-size:14px;flex:1;line-height:1.5;}
.stb{padding:8px 16px;border-radius:20px;border:none;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.stb-p{background:rgba(255,149,0,0.12);color:#c07000;}
.stb-c{background:rgba(52,199,89,0.12);color:#1a8a3a;}
.stb-d{background:rgba(0,122,255,0.12);color:#0060cc;}
.stb-x{background:rgba(255,59,48,0.12);color:#cc2a22;}
.stb.act{font-weight:700;box-shadow:0 0 0 1.5px currentColor inset;}
.stb:not(.act){opacity:0.45;}
.memo-ta{width:100%;background:var(--card);border:none;border-radius:var(--r);padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);resize:none;height:80px;outline:none;line-height:1.5;}
.stats{display:flex;gap:10px;margin:0 16px 16px;}
.stat{flex:1;background:var(--card);border-radius:var(--r);padding:12px 8px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;color:var(--accent);}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500;}
.flt{display:flex;gap:8px;overflow-x:auto;padding:0 16px;margin-bottom:14px;scrollbar-width:none;}
.flt::-webkit-scrollbar{display:none;}
.fc{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:var(--card);color:var(--text2);white-space:nowrap;cursor:pointer;border:none;font-family:inherit;flex-shrink:0;}
.fc.on{background:var(--accent);color:#fff;}
.oc{background:var(--card);border-radius:var(--r);margin:0 16px 10px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.oc-top{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 10px;border-bottom:0.5px solid var(--sep);}
.oc-nm{font-size:16px;font-weight:600;}
.oc-bd{padding:10px 16px 13px;font-size:13px;color:var(--text2);line-height:1.8;}
.oc-ft{display:flex;justify-content:space-between;padding:10px 16px;border-top:0.5px solid var(--sep);}
.oc-ph{font-size:13px;color:var(--text2);}
.oc-tt{font-size:16px;font-weight:700;color:var(--accent);}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.b-pending{background:rgba(255,149,0,0.12);color:#c07000;}
.b-confirmed{background:rgba(52,199,89,0.12);color:#1a8a3a;}
.b-done{background:rgba(0,122,255,0.12);color:#0060cc;}
.b-cancel{background:rgba(255,59,48,0.12);color:#cc2a22;}
.acc-row{display:flex;align-items:center;padding:13px 16px;cursor:pointer;gap:10px;min-height:50px;}
.arr{font-size:18px;color:var(--text3);transition:transform 0.22s;flex-shrink:0;}
.arr.open{transform:rotate(90deg);}
.acc-bd{padding:4px 16px 14px 56px;border-top:0.5px solid var(--sep);background:rgba(0,0,0,0.015);}
.acc-it{font-size:13px;color:var(--text2);line-height:1.8;padding:2px 0;}
.succ{text-align:center;padding:60px 24px 32px;}
.succ-ic{font-size:64px;margin-bottom:18px;}
.succ-t{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.succ-s{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:28px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,0.92);color:#fff;padding:11px 22px;border-radius:20px;font-size:14px;font-weight:500;z-index:400;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.lc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.lc-btn{padding:5px 11px;border-radius:20px;border:1px solid rgba(139,74,74,0.25);background:rgba(139,74,74,0.07);color:var(--accent);font-size:11px;font-family:inherit;cursor:pointer;line-height:1.5;}
.lc-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div>
      <div class="hdr-eye">영화당 · Younghwadang</div>
      <div class="hdr-ttl">🌸 떡케이크 주문</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="pill" id="modePill"></div>
      <button id="settingsBtn" style="display:none;padding:6px 12px;border-radius:20px;background:rgba(139,74,74,0.1);border:none;color:#8b4a4a;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;" onclick="showSettings()">⚙️</button>
    </div>
  </div>
</div>
<div class="wrap" id="wrap"><div class="loading">불러오는 중...</div></div>
<div class="ov" id="ov"><div class="sh" id="sh"></div></div>
<div class="toast" id="toast"></div>

<script>
const SUPA = 'https://pithlzhuqezeesprcbze.supabase.co/rest/v1';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';
const H    = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function api(path, method, body) {
  return fetch(SUPA+path, {method:method||'GET', headers:H, body:body?JSON.stringify(body):undefined});
}
async function getOrders() {
  const r = await api('/cake_orders?order=created_at.desc');
  return r.ok ? r.json() : [];
}
async function addOrder(o) {
  const r = await api('/cake_orders','POST',o);
  if (!r.ok) throw new Error('fail');
}
async function updateOrder(id,p) { await api('/cake_orders?id=eq.'+id,'PATCH',p); }
async function delOrder(id) { await api('/cake_orders?id=eq.'+id,'DELETE'); }

// 설정 기본값
const DEFAULT_SETTINGS = {
  shop_name: '영화당',
  shop_phone: '010-5496-0736',
  bank_account: '농협 3511-2979-4311-3',
  bank_holder: '김은영',
  pickup_notice: '픽업 약 3시간 전 제작 시작 · 예약 시간에 맞춰 방문해주세요',
  storage_tips: ['📌 당일 섭취 권장','🌸 앙금꽃 → 냉장 보관 (최대 1주일)','🍡 떡 → 냉동 후 자연해동'],
  transport_tips: ['⏰ 픽업 약 3시간 전 제작 시작','🧑\u200d🤝\u200d🧑 동행자와 함께 조수석에서 손으로 받쳐 이동','🚚 배달 가능 (5,000원)'],
  sizes: [
    {id:'s1', e:'🎂', name:'1호',      cm:'지름 15cm',  price:55000},
    {id:'s2', e:'🎂', name:'2호',      cm:'지름 18cm',  price:70000},
    {id:'sn', e:'🔢', name:'숫자케이크', cm:'세로 7cm',   price:90000},
    {id:'s2t',e:'✨', name:'2단케이크', cm:'2호 + 미니', price:130000}
  ],
  choco_price: 3000,
  delivery_price: 5000,
  lets: ['어머님의 60년 세월을 존경하고 사랑합니다','지금처럼 건강하고 오래 곁에 있어주세요','아버님의 세 번째 스무 살을 축하드립니다','팔팔한 80세 팔순을 축하드립니다','늘 건강하고 행복하게 함께해요 사랑합니다']
};

let CFG = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));

async function loadSettings() {
  try {
    const r = await api('/cake_photos2?id=eq.settings');
    if (!r.ok) return;
    const d = await r.json();
    if (d.length > 0) {
      const saved = JSON.parse(d[0].data);
      CFG = Object.assign({}, DEFAULT_SETTINGS, saved);
      // sizes 병합
      if (saved.sizes) CFG.sizes = saved.sizes;
      if (saved.lets) CFG.lets = saved.lets;
      if (saved.storage_tips) CFG.storage_tips = saved.storage_tips;
      if (saved.transport_tips) CFG.transport_tips = saved.transport_tips;
    }
  } catch(e) {}
}

async function saveSettings(data) {
  await api('/cake_photos2?id=eq.settings','DELETE');
  await api('/cake_photos2','POST',{id:'settings', data: JSON.stringify(data)});
}

const IS_ADMIN = location.hash === '#admin-younghwadang';
const PAYS = ['계좌이체','굿뜨래페이','카드'];
const ST   = {pending:'확인중',confirmed:'예약확정',done:'픽업완료',cancel:'취소'};

let fd = {name:'',phone:'',date:'',time:'',size:'',design:'',lettering:'',pay:'',choco:false,delivery:false,addr:'',photos:[],done:false};
let acc = {s:false,t:false};
let curId = null;
let aFilter = 'all';
let aDateStart = '';
let aDateEnd = '';

const pill = document.getElementById('modePill');
pill.textContent = IS_ADMIN ? '사장님 🔑' : '주문하기';
pill.className   = 'pill ' + (IS_ADMIN ? 'pill-a' : 'pill-g');
if (IS_ADMIN) {
  const sb = document.getElementById('settingsBtn');
  if (sb) sb.style.display = 'block';
}

function W(h) { document.getElementById('wrap').innerHTML = h; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function showSheet(h) {
  document.getElementById('sh').innerHTML = h;
  document.getElementById('ov').className = 'ov show';
}
function closeSheet() { document.getElementById('ov').className = 'ov'; }

function addDesignPhotos(e) {
  const files = Array.from(e.target.files).slice(0, 3 - (fd.photos||[]).length);
  let n = 0;
  if (!files.length) return;
  if (!fd.photos) fd.photos = [];
  files.forEach(function(f) {
    resizeImage(f, 1200, 1200, function(data) {
      fd.photos.push(data);
      if (++n === files.length) renderGuest();
    });
  });
}

function selLet(idx) {
  const lt = CFG.lets[parseInt(idx)];
  fd.lettering = (fd.lettering === lt ? '' : lt);
  renderGuest();
}
function resetForm() {
  fd = {name:'',phone:'',date:'',time:'',size:'',design:'',lettering:'',pay:'',choco:false,delivery:false,addr:'',photos:[],done:false};
  renderGuest();
}

function renderGuest() {
  if (fd.done) { renderSuccess(); return; }
  const sel   = CFG.sizes.find(s => s.id === fd.size);
  const total = (sel ? sel.price : 0) + (fd.choco ? CFG.choco_price : 0) + (fd.delivery ? CFG.delivery_price : 0);
  let h = '';

  h += '<div class="sec"><div class="sec-hdr">주문 안내<\/div>';
  h += '<div class="notice">주문서 제출 후 <strong>'+CFG.shop_phone+'<\/strong>으로 확인 연락드려요.<br>입금 계좌: <strong>'+CFG.bank_account+' ('+CFG.bank_holder+')<\/strong><\/div><\/div>';

  h += '<div class="sec"><div class="sec-hdr">기본 정보<\/div><div class="card">';
  h += '<div class="row"><div class="row-lbl">성함 <span class="req">*<\/span><\/div><input class="inp" placeholder="주문자 성함" value="'+fd.name+'" oninput="fd.name=this.value"><\/div>';
  h += '<div class="row"><div class="row-lbl">전화번호 <span class="req">*<\/span><\/div><input class="inp" type="tel" placeholder="010-0000-0000" value="'+fd.phone+'" oninput="fd.phone=this.value"><\/div>';
  h += '<\/div><\/div>';

  h += '<div class="sec"><div class="sec-hdr">픽업 일정<\/div><div class="card">';
  h += '<div class="row"><div class="row-lbl">날짜 <span class="req">*<\/span><\/div><input class="inp" type="date" value="'+fd.date+'" oninput="fd.date=this.value"><\/div>';
  h += '<div class="row"><div class="row-lbl">시간 <span class="req">*<\/span><\/div><input class="inp" type="time" value="'+fd.time+'" oninput="fd.time=this.value"><\/div>';
  h += '<\/div><div class="sec-foot">'+CFG.pickup_notice+'<\/div><\/div>';

  h += '<div class="sec"><div class="sec-hdr">케이크 사이즈<\/div><div class="sz-scroll">';
  CFG.sizes.forEach(function(s, si) {
    const photos = (CFG.size_photos && CFG.size_photos[s.id]) || [];
    const pidKey = 'sp_'+s.id;
    if (!window._szPhotoIdx) window._szPhotoIdx = {};
    const pidx = window._szPhotoIdx[s.id] || 0;
    h += '<div class="sz'+(fd.size===s.id?' on':'')+'" onclick="fd.size=\''+s.id+'\';renderGuest()">';
    if (photos.length > 0) {
      h += '<div style="width:100%;height:80px;border-radius:8px;overflow:hidden;margin-bottom:4px;position:relative;">';
      h += '<img src="'+photos[pidx]+'" onclick="event.stopPropagation();showSzPhotoModal(\''+s.id+'\',' +pidx+')" style="width:100%;height:100%;object-fit:cover;cursor:pointer;">';
      if (photos.length > 1) {
        h += '<div onclick="event.stopPropagation();prevSzPhoto(\''+s.id+'\','+photos.length+')" style="position:absolute;left:2px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;">‹<\/div>';
        h += '<div onclick="event.stopPropagation();nextSzPhoto(\''+s.id+'\','+photos.length+')" style="position:absolute;right:2px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;">›<\/div>';
        h += '<div style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:3px;">';
        for (let pi=0; pi<photos.length; pi++) {
          h += '<div style="width:5px;height:5px;border-radius:50%;background:'+(pi===pidx?'white':'rgba(255,255,255,0.5)')+';display:inline-block;"><\/div>';
        }
        h += '<\/div>';
      }
      h += '<\/div>';
    } else {
      h += '<div class="sz-e">'+s.e+'<\/div>';
    }

async function doSubmit() {
  if (!fd.name.trim())  { toast('성함을 입력해주세요'); return; }
  if (!fd.phone.trim()) { toast('전화번호를 입력해주세요'); return; }
  if (!fd.date)         { toast('픽업 날짜를 선택해주세요'); return; }
  if (!fd.time)         { toast('픽업 시간을 선택해주세요'); return; }
  if (!fd.size)         { toast('케이크 사이즈를 선택해주세요'); return; }
  if (!fd.pay)          { toast('결제 방법을 선택해주세요'); return; }
  const sel   = CFG.sizes.find(s => s.id === fd.size);
  const total = sel.price + (fd.choco?CFG.choco_price:0) + (fd.delivery?CFG.delivery_price:0);
  W('<div class="loading">주문서 전송 중...<\/div>');
  try {
    await addOrder({
      id:'o_'+Date.now(), name:fd.name, phone:fd.phone,
      pickup_date:fd.date, pickup_time:fd.time,
      cake_size:sel.name, cake_price:sel.price,
      design:fd.design||'', lettering:fd.lettering||'',
      payment:fd.pay, choco_deco:fd.choco,
      delivery:fd.delivery, delivery_addr:fd.addr||'',
      total_price:total, status:'pending', memo:'',
      photos: JSON.stringify(fd.photos||[]),
      created_at:Date.now()
    });
    fd.done = true; renderGuest();
  } catch(e) { toast('전송 실패, 다시 시도해주세요'); renderGuest(); }
}

// ── 사진 헬퍼 함수 ──
function resizeImage(file, maxW, maxH, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function addSzPhoto(e, idx) {
  const file = e.target.files[0];
  if (!file) return;
  resizeImage(file, 400, 400, function(data) {
    if (!CFG.size_photos) CFG.size_photos = {};
    const sizeId = CFG.sizes[idx].id;
    if (!CFG.size_photos[sizeId]) CFG.size_photos[sizeId] = [];
    if (CFG.size_photos[sizeId].length >= 3) { toast('최대 3장까지 가능해요'); return; }
    CFG.size_photos[sizeId].push(data);
    saveSettings(Object.assign({}, CFG)).then(function() {
      toast('사진 추가됐어요 ✅');
      showSettings();
    });
  });
}

function removeSzPhoto(idx, photoIdx) {
  const sizeId = CFG.sizes[idx].id;
  if (CFG.size_photos && CFG.size_photos[sizeId]) {
    CFG.size_photos[sizeId].splice(photoIdx, 1);
    saveSettings(Object.assign({}, CFG)).then(function() {

}

async function saveSettingsFromForm() {

    shop_name: document.getElementById('cfg_shop_name').value,

    bank_account: document.getElementById('cfg_account').value,

    delivery_price: parseInt(document.getElementById('cfg_delivery').value)||5000,
    choco_photo: CFG.choco_photo || '',
    size_photos: CFG.size_photos || {},
    design_desc: document.getElementById('cfg_design_desc') ? document.getElementById('cfg_design_desc').value : (CFG.design_desc||''),
    design_placeholder: document.getElementById('cfg_design_ph') ? document.getElementById('cfg_design_ph').value : (CFG.design_placeholder||''),
    sizes: CFG.sizes.map(function(s,i) {
      return {
        id: s.id, e: s.e,

        cm: document.getElementById('cfg_sz_cm_'+i).value,
        price: parseInt(document.getElementById('cfg_sz_price_'+i).value)||s.price
      };
    }),
    storage_tips: CFG.storage_tips.map(function(_,i) { return document.getElementById('cfg_storage_'+i).value; }),
    transport_tips: CFG.transport_tips.map(function(_,i) { return document.getElementById('cfg_transport_'+i).value; }),
    lets: CFG.lets.map(function(_,i) { return document.getElementById('cfg_let_'+i).value; })
  };
  await saveSettings(newCFG);
  CFG = newCFG;
  toast('설정이 저장됐어요 ✅');

  renderAdmin();
}
