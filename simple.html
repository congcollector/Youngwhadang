<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>테스트3</title>
<style>
:root { --bg: #f7f3f0; --card: #ffffff; --accent: #8b4a4a; --text: #1c1c1e; --sep: rgba(60,60,67,0.12); --r: 14px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); font-family: -apple-system, sans-serif; }
.wrap { max-width: 480px; margin: 0 auto; padding: 20px; }
.card { background: var(--card); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
</style>
</head>
<body>
<h1 style="padding:20px;">타이틀</h1>
<div class="wrap" id="wrap">초기값</div>
<script>
var h = '';
h += '<div class="card">카드1</div>';
h += '<div class="card">카드2</div>';
document.getElementById('wrap').innerHTML = h;
</script>
</body>
</html>
