<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동탄 빨간머리앤 · 케이크 주문</title>
<style>
:root{--bg:#faf7f4;--card:#fff;--text:#2c1f14;--text2:#9a8878;--text3:#c8bdb4;--sep:rgba(44,31,20,0.08);--r:16px;--acc:#b07050;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#faf7f4;font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;color:#2c1f14;-webkit-font-smoothing:antialiased;}
.hdr{background:rgba(250,247,244,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:0.5px solid rgba(44,31,20,0.1);padding:54px 20px 0;position:sticky;top:0;z-index:50;}
.hdr-inner{max-width:480px;margin:0 auto;}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.hdr-eye{font-size:11px;font-weight:500;color:#c8bdb4;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.hdr-ttl{font-size:26px;font-weight:700;letter-spacing:-0.8px;}
.pill{font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;}
.pill-g{background:rgba(176,112,80,0.1);color:#b07050;}
.pill-a{background:#b07050;color:#fff;}
.wrap{max-width:480px;margin:0 auto;padding:28px 0 110px;}
.loading{text-align:center;padding:80px 20px;color:#c8bdb4;font-size:15px;}
.sec{margin-bottom:28px;}
.sec-hdr{font-size:11px;font-weight:600;color:#9a8878;letter-spacing:0.8px;text-transform:uppercase;padding:0 20px;margin-bottom:8px;}
.card{background:#fff;border-radius:16px;margin:0 16px;overflow:hidden;box-shadow:0 1px 0 rgba(44,31,20,0.06),0 2px 8px rgba(44,31,20,0.04);}
.row{display:flex;align-items:center;padding:0 16px;min-height:52px;border-bottom:0.5px solid rgba(44,31,20,0.07);}
.row:last-child{border-bottom:none;}
.row-lbl{font-size:15px;min-width:72px;}
.req{color:#ff3b30;font-size:11px;margin-left:2px;}
.inp{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:inherit;color:#2c1f14;text-align:right;padding:14px 0;}
.inp::placeholder{color:#d4cdc8;}
.cake-card{background:#fff;border-radius:14px;margin:0 16px 10px;padding:16px;box-shadow:0 1px 0 rgba(44,31,20,0.06),0 2px 8px rgba(44,31,20,0.04);cursor:pointer;border:1.5px solid transparent;transition:all 0.18s;}
.cake-card.on{border-color:#b07050;background:rgba(176,112,80,0.05);}
.sub-hdr{font-size:11px;font-weight:600;color:#9a8878;letter-spacing:0.6px;text-transform:uppercase;margin:10px 0 6px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{padding:8px 14px;border-radius:22px;font-size:13px;font-weight:500;border:1.5px solid rgba(44,31,20,0.12);background:transparent;color:#2c1f14;cursor:pointer;transition:all 0.15s;}
.chip.on{border-color:#b07050;background:rgba(176,112,80,0.08);color:#b07050;font-weight:600;}
.tog{display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid rgba(44,31,20,0.07);gap:12px;cursor:pointer;}
.tog:last-child{border-bottom:none;}
.tog-bd{flex:1;}
.tog-l{font-size:15px;}
.tog-s{font-size:12px;color:#c8bdb4;margin-top:2px;}
.sw{width:51px;height:31px;border-radius:16px;background:rgba(120,120,128,0.14);position:relative;flex-shrink:0;transition:background 0.22s;}
.sw.on{background:#b07050;}
.sw-k{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:transform 0.24s cubic-bezier(0.34,1.56,0.64,1);}
.sw.on .sw-k{transform:translateX(20px);}
.ta{width:100%;border:1.5px solid rgba(44,31,20,0.1);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:#2c1f14;background:#faf7f4;outline:none;resize:none;line-height:1.5;}
.time-wrap{display:flex;gap:7px;overflow-x:auto;padding:4px 16px 10px;scrollbar-width:none;}
.time-wrap::-webkit-scrollbar{display:none;}
.tc{flex-shrink:0;padding:8px 14px;border-radius:22px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid rgba(44,31,20,0.12);background:transparent;color:#2c1f14;white-space:nowrap;transition:all 0.15s;}
.tc.on{border-color:#b07050;background:rgba(176,112,80,0.08);color:#b07050;font-weight:600;}
.pay-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:14px 16px;}
.pay-chip{padding:9px 18px;border-radius:22px;font-size:13px;font-weight:500;font-family:inherit;border:1.5px solid rgba(44,31,20,0.12);cursor:pointer;background:#faf7f4;color:#2c1f14;transition:all 0.15s;}
.pay-chip.on{background:#b07050;color:#fff;border-color:#b07050;}
.pr{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:0.5px solid rgba(44,31,20,0.07);}
.pr:last-child{border-bottom:none;}
.notice{background:#fff;border-radius:16px;padding:16px 18px;margin:0 16px;font-size:14px;color:#9a8878;line-height:1.75;box-shadow:0 1px 0 rgba(44,31,20,0.06),0 2px 8px rgba(44,31,20,0.04);}
.notice strong{color:#2c1f14;font-weight:600;}
.btn{display:block;width:calc(100% - 32px);margin:0 16px;padding:17px;border-radius:14px;border:none;background:#b07050;color:#fff;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(176,112,80,0.3);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(6px);}
.overlay.show{display:flex;}
.sheet{background:#faf7f4;border-radius:22px 22px 0 0;padding:0 0 44px;width:100%;animation:su 0.32s cubic-bezier(0.32,0.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-h{padding:12px 0 6px;text-align:center;}
.sh-hh{display:inline-block;width:36px;height:4px;border-radius:2px;background:rgba(44,31,20,0.15);}
.toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);background:rgba(44,31,20,0.9);color:#fff;padding:12px 22px;border-radius:22px;font-size:14px;z-index:400;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.oc{background:#fff;border-radius:16px;margin:0 16px 10px;overflow:hidden;cursor:pointer;border-left:3px solid #b07050;box-shadow:0 1px 0 rgba(44,31,20,0.05),0 2px 12px rgba(44,31,20,0.05);}
</style>
</head>

<script>
var SUPA = 'https://pithlzhuqezeesprcbze.supabase.co/rest/v1';
var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGhsemh1cWV6ZWVzcHJjYnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1NjgsImV4cCI6MjA4OTU4MzU2OH0.GFBnUKHQ_B_GQEQIy9nBWr38gnok_b__fAyTX7v7tNQ';

  return fetch(SUPA+path, {method:method||'GET', headers:H, body:body?JSON.stringify(body):undefined});
}
async function getOrders() {
  var r = await api('/anne_orders?order=pickup_date.asc,pickup_time.asc');

}

  var r = await api('/anne_orders','POST',o);

var MENUS = [
  {id:'fruit',  e:'🍊', name:'미니생과일',        desc:'신선한 제철 과일 토핑',     flavors:[], sizes:['미니'],            prices:{미니:33000}},
  {id:'straw',  e:'🍓', name:'미니딸기',          desc:'딸기 듬뿍 미니케이크',      flavors:[], sizes:['미니'],            prices:{미니:35000}},
  {id:'dome',   e:'🌸', name:'생화돔케이크',       desc:'생화로 꾸민 돔형 케이크',   flavors:['우유','딸기'], sizes:['미니','1호','2호'], prices:{우유:{미니:32000,'1호':43000,'2호':55000},딸기:{미니:36000,'1호':52000,'2호':65000}}},
  {id:'letter', e:'💬', name:'할말은많은데케이크', desc:'미니 전용 · 레터링 특화',   flavors:['우유','딸기'], sizes:['미니'],            prices:{우유:{미니:32000},딸기:{미니:36000}}},
  {id:'hydra',  e:'💙', name:'수국케이크',         desc:'수국 꽃장식 · 1호까지 가능',flavors:['우유','딸기'], sizes:['미니','1호'],       prices:{우유:{미니:33000,'1호':45000},딸기:{미니:38000,'1호':60000}}},
];

var adminOrders=[], adminSelDate=null, adminWeekOffset=0, aFilter='all', curId=null;

function W(h){ document.getElementById('wrap').innerHTML = h; }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2400); }
function showSheet(h){ document.getElementById('sheet').innerHTML=h; document.getElementById('overlay').className='overlay show'; }
function closeSheet(){ document.getElementById('overlay').className='overlay'; }

function calcPrice(){
  if(!fd.mid) return 0;
  var m = null;
  for(var i=0;i<MENUS.length;i++){ if(MENUS[i].id===fd.mid){m=MENUS[i];break;} }
  if(!m) return 0;
  var base=0;
  if(eventOn){ var ep={미니:30000,'1호':40000,'2호':50000}; base=ep[fd.size]||0; }
  else if(!m.flavors.length){ base=m.prices[fd.size]||0; }
  else{ if(!fd.flavor||!fd.size) return 0; base=(m.prices[fd.flavor]&&m.prices[fd.flavor][fd.size])||0; }
  if(base>0 && fd.pay==='계좌이체') return Math.floor(base*0.9/100)*100;
  return base;
}

function buildTimeChips(cur){
  var slots=[], open='09:00', close='23:00';
  for(var h=9;h<=23;h++) for(var m=0;m<60;m+=30){
    var t=(h<10?'0':'')+h+':'+(m===0?'00':m);
    if(t>=open&&t<=close) slots.push(t);
  }
  var html='<div class="time-wrap">';
  for(var i=0;i<slots.length;i++){
    html+='<div class="tc'+(cur===slots[i]?' on':'')+'" onclick="fd.time=\''+slots[i]+'\';renderOrder()">'+slots[i]+'</div>';
  }
  return html+'</div>';
}

function renderOrder(){
  if(fd.done){ renderSuccess(); return; }
  var price=calcPrice();
  var h='';

  h+='<div class="sec"><div class="sec-hdr">안내</div>';
  h+='<div class="notice"><strong>📌 100% 주문제작 · 입금 후 제작 시작</strong><br>사전 계좌이체 → 10% 할인가<br>픽업 시 결제 → 정가<br>아침 9시 ~ 저녁 11시 픽업 가능';
  if(eventOn) h+='<br><br><strong>🎉 이달의 케이크 345 이벤트</strong><br>미니 3만원 / 1호 4만원 / 2호 5만원';
  h+='</div></div>';

  h+='<div class="sec"><div class="sec-hdr">주문자 <span class="req">*</span></div><div class="card">';
  h+='<div class="row"><div class="row-lbl">이름</div><input class="inp" placeholder="이름" value="'+fd.name+'" oninput="fd.name=this.value"></div>';
  h+='<div class="row"><div class="row-lbl">연락처</div><input class="inp" type="tel" placeholder="010-0000-0000" value="'+fd.phone+'" oninput="fd.phone=this.value"></div>';
  h+='</div></div>';

  h+='<div class="sec"><div class="sec-hdr">케이크 선택 <span class="req">*</span></div>';
  for(var i=0;i<MENUS.length;i++){
    var m=MENUS[i], isOn=fd.mid===m.id;
    h+='<div class="cake-card'+(isOn?' on':'')+'" onclick="fd.mid=\''+m.id+'\';fd.size=\'\';fd.flavor=\'\';renderOrder()">';
    h+='<div style="font-size:16px;font-weight:600;">'+m.e+' '+m.name+'</div>';
    h+='<div style="font-size:12px;color:#9a8878;margin-top:2px;">'+m.desc+'</div>';
    if(isOn){
      h+='<div onclick="event.stopPropagation()">';
      h+='<div class="sub-hdr">사이즈</div><div class="chips">';
      for(var j=0;j<m.sizes.length;j++){
        var sz=m.sizes[j], p='';
        if(!m.flavors.length&&m.prices[sz]) p=' ('+(m.prices[sz]/10000).toFixed(1).replace('.0','')+'만원)';
        else if(fd.flavor&&m.prices[fd.flavor]&&m.prices[fd.flavor][sz]) p=' ('+(m.prices[fd.flavor][sz]/10000).toFixed(1).replace('.0','')+'만원)';
        h+='<div class="chip'+(fd.size===sz?' on':'')+'" onclick="fd.size=\''+sz+'\';renderOrder()">'+sz+p+'</div>';
      }
      h+='</div>';
      if(m.flavors.length){
        h+='<div class="sub-hdr">맛</div><div class="chips">';
        for(var k=0;k<m.flavors.length;k++){
          var fl=m.flavors[k], fp='';
          if(fd.size&&m.prices[fl]&&m.prices[fl][fd.size]) fp=' ('+(m.prices[fl][fd.size]/10000).toFixed(1).replace('.0','')+'만원)';
          h+='<div class="chip'+(fd.flavor===fl?' on':'')+'" onclick="fd.flavor=\''+fl+'\';renderOrder()">'+fl+fp+'</div>';
        }
        h+='</div>';
      }
      if(price>0){
        h+='<div style="margin-top:10px;padding:10px 12px;background:rgba(176,112,80,0.08);border-radius:10px;display:flex;justify-content:space-between;">';
        h+='<span style="font-size:13px;color:#9a8878;">선택 금액</span><span style="font-size:16px;font-weight:700;color:#b07050;">'+price.toLocaleString()+'원</span></div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';

  var lim=(fd.mid==='letter')?18:(LLIMIT[fd.size]||12), ll=fd.letter.length;
  h+='<div class="sec"><div class="sec-hdr">레터링</div><div class="card">';
  h+='<div style="padding:14px 16px;"><textarea class="ta" rows="2" placeholder="케이크에 쓸 문구 (선택)" maxlength="'+lim+'" oninput="fd.letter=this.value.substring(0,'+lim+');this.value=fd.letter;">'+fd.letter+'</textarea>';

h+=’<div style="font-size:12px;color:#9a8878;margin-top:4px;text-align:right;">’+ll+’/’+lim+‘자</div></div>’;
h+=’<div class="row"><div class="row-lbl">초 개수</div><input class="inp" type="number" min="0" max="20" placeholder="0" value="'+(fd.candles||'')+'" oninput="fd.candles=parseInt(this.value)||0"></div>’;
h+=’</div></div>’;

h+=’<div class="sec"><div class="sec-hdr">추가 옵션</div><div class="card">’;
h+=’<div class="tog" onclick="fd.flower=!fd.flower;renderOrder()"><div class="tog-bd"><div class="tog-l">💐 생화 추가</div><div class="tog-s">시장 상황에 따라 달라질 수 있어요</div></div><div class="sw'+(fd.flower?' on':'')+'"><div class="sw-k"></div></div></div>’;
h+=’<div class="tog" onclick="fd.choco=!fd.choco;renderOrder()"><div class="tog-bd"><div class="tog-l">🍫 초코시트 변경</div><div class="tog-s">기본 우유시트 → 초코시트 · 무료</div></div><div class="sw'+(fd.choco?' on':'')+'"><div class="sw-k"></div></div></div>’;
h+=’</div></div>’;

h+=’<div class="sec"><div class="sec-hdr">디자인 요청</div><div class="card"><div style="padding:14px 16px;">’;
h+=’<textarea class="ta" rows="2" placeholder="원하는 디자인 설명" oninput="fd.memo=this.value">’+fd.memo+’</textarea></div></div></div>’;

h+=’<div class="sec"><div class="sec-hdr">픽업 일시 <span class="req">*</span></div><div class="card">’;
h+=’<div class="row"><div class="row-lbl">날짜</div><input class="inp" type="date" value="'+fd.date+'" oninput="fd.date=this.value;renderOrder()"></div>’;
h+=’<div style="padding:8px 0 0;border-top:0.5px solid rgba(44,31,20,0.07);"><div style="font-size:12px;color:#9a8878;padding:8px 16px 4px;">시간</div>’;
h+=buildTimeChips(fd.time);
h+=’</div></div></div>’;

h+=’<div class="sec"><div class="sec-hdr">결제 방법 <span class="req">*</span></div><div class="card">’;
h+=’<div style="padding:10px 16px 4px;font-size:13px;color:#9a8878;line-height:1.8;">사전 계좌이체 → 10% 할인가<br>픽업 시 결제 → 정가</div>’;
h+=’<div class="pay-wrap">’;
var pays=[[‘계좌이체’,‘💳 계좌이체 (사전할인)’],[‘카드’,‘💳 카드 (정가)’],[‘지역화폐’,‘🏷️ 지역화폐 (정가)’]];
for(var pi=0;pi<pays.length;pi++){
h+=’<button class="pay-chip'+(fd.pay===pays[pi][0]?' on':'')+'" onclick="fd.pay=\''+pays[pi][0]+'\';renderOrder()">’+pays[pi][1]+’</button>’;
}
h+=’</div>’;
if(fd.pay===‘계좌이체’){
h+=’<div style="margin:0 16px 14px;padding:12px 14px;background:#faf7f4;border-radius:12px;border:1.5px solid rgba(176,112,80,0.2);">’;
h+=’<div style="font-size:13px;font-weight:600;color:#b07050;margin-bottom:4px;">입금 계좌</div>’;
h+=’<div style="font-size:15px;font-weight:700;">신한 110-360-768887</div>’;
h+=’<div style="font-size:13px;color:#9a8878;">예금주: 최지윤</div>’;
h+=’<div style="font-size:12px;color:#c8bdb4;margin-top:6px;">입금 후 카카오톡 또는 문자로 입금자 성함 알려주세요</div></div>’;
}
h+=’</div></div>’;

h+=’<div class="sec"><div class="sec-hdr">주문 요약</div><div class="card">’;
var m2=null; for(var mi=0;mi<MENUS.length;mi++){if(MENUS[mi].id===fd.mid){m2=MENUS[mi];break;}}
h+=’<div class="pr"><span style="font-size:15px;">케이크</span><span style="font-size:15px;color:#9a8878;">’+(m2?m2.name+(fd.size?’ · ‘+fd.size:’’)+(fd.flavor?’ · ‘+fd.flavor:’’):‘미선택’)+’</span></div>’;
if(fd.pay===‘계좌이체’&&price>0) h+=’<div class="pr"><span style="font-size:15px;">할인</span><span style="font-size:15px;color:#1a7a33;">사전예약 10% 할인</span></div>’;

async function submitOrder(){
if(!fd.name.trim()){toast(‘이름을 입력해주세요’);return;}
if(!fd.phone.trim()){toast(‘연락처를 입력해주세요’);return;}
if(!fd.mid){toast(‘케이크를 선택해주세요’);return;}
if(!fd.size){toast(‘사이즈를 선택해주세요’);return;}
var m=null; for(var i=0;i<MENUS.length;i++){if(MENUS[i].id===fd.mid){m=MENUS[i];break;}}
if(m&&m.flavors.length&&!fd.flavor){toast(‘맛을 선택해주세요’);return;}
if(!fd.date){toast(‘픽업 날짜를 선택해주세요’);return;}
if(!fd.time){toast(‘픽업 시간을 선택해주세요’);return;}
if(!fd.pay){toast(‘결제 방법을 선택해주세요’);return;}
var price=calcPrice();
var btn=document.querySelector(’.btn’);
if(btn){btn.disabled=true;btn.textContent=‘제출 중…’;}
try{
await addOrder({name:fd.name.trim(),phone:fd.phone.trim(),cake_type:fd.mid,cake_flavor:fd.flavor||null,cake_size:fd.size,lettering:fd.letter||null,candles:fd.candles||0,add_flower:fd.flower,add_choco:fd.choco,design_memo:fd.memo||null,pickup_date:fd.date,pickup_time:fd.time,payment:fd.pay,total_price:price,photos:[],status:‘pending’,is_event:eventOn});
fd.done=true; renderSuccess();
}catch(e){
toast(‘오류가 발생했어요. 다시 시도해주세요.’);
if(btn){btn.disabled=false;btn.textContent=‘주문서 제출하기’;}
}
}

}

}

}

async function chgStatus(id,s){
await updateOrder(id,{status:s});
for(var i=0;i<adminOrders.length;i++){if(adminOrders[i].id===id){adminOrders[i].status=s;break;}}
toast(‘상태 변경됐어요’); openOrder(id); renderAdminView();
}

async function saveOrder(id){
var memo=document.getElementById(‘memoTa’);
await updateOrder(id,{memo:memo?memo.value:’’});
for(var i=0;i<adminOrders.length;i++){if(adminOrders[i].id===id){adminOrders[i].memo=memo?memo.value:’’;break;}}
toast(‘저장됐어요’); closeSheet(); renderAdminView();
}
